# =====================================================================
#  Exemple de vhost Nginx pour PIXEL PANIC (pixel.fbc.fr)
#  À adapter dans ta conf Nginx existante.
#
#  ⚠️ POINT CRITIQUE : l'appli utilise du SSE (Server-Sent Events) pour
#  le temps réel. Il FAUT désactiver le buffering, sinon la BORNE et les
#  téléphones ne se mettent jamais à jour.
#
#  Remplace 192.168.1.50 par l'IP de ton conteneur LXC.
# =====================================================================

upstream pixel_panic {
    server 192.168.1.50:8080;   # <-- IP du conteneur LXC
}

server {
    listen 80;
    server_name pixel.fbc.fr;

    # (Si tu gères le SSL ici avec certbot, il ajoutera le bloc 443 et la
    #  redirection. Sinon mets ton listen 443 ssl habituel.)

    location / {
        proxy_pass http://pixel_panic;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # --- indispensable pour le flux temps réel (SSE) ---
        proxy_set_header Connection '';
        proxy_buffering   off;
        proxy_cache       off;
        chunked_transfer_encoding off;
        proxy_read_timeout 3600s;   # garde le flux /events ouvert longtemps
    }
}
