        ${head}
        <div class="pill neon-yellow">🙈 C'EST TOI QUI DEVINES</div>
        <p class="big" style="margin-top:10px">Ne regarde pas la BORNE ! Les autres préparent leurs indices…</p>
        <p class="muted mt">${act.clueCount}/${act.neededCount} ont écrit leur indice</p>
      </div>`;
    }
    if (act.sub==='guess'){
      const survivors = act.survivors||[];
      return `<div class="card center glow-box">
        ${head}
        <div class="pill neon-yellow">🙈 À TOI DE DEVINER</div>
        <p class="muted mt">Indices proposés par l'équipe :</p>
        <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:10px 0">
          ${survivors.map(t=>`<span class="pill neon-cyan" style="font-size:16px">${esc(t)}</span>`).join('') || '<span class="muted">Aucun indice n\'a survécu…</span>'}
        </div>
        <input id="joGuessInput" type="text" placeholder="Ta réponse…" style="width:100%;box-sizing:border-box;padding:10px;font-size:16px;border-radius:8px;margin-top:8px" onkeydown="if(event.key==='Enter')justoneGuess()">
        <button class="btn mt" onclick="justoneGuess()">✅ Valider ma réponse</button>
      </div>`;
    }
    if (act.sub==='reveal'){
      return `<div class="card center glow-box" style="border-color:var(--neon3)">
        ${head}
        <h2 class="${act.guessCorrect?'neon-cyan':'neon-pink'}">${act.guessCorrect?'✅ TROUVÉ !':'❌ RATÉ…'}</h2>
        <p class="big">Le mot était : <b class="neon-yellow">${esc(act.secretWord||'')}</b></p>
        <p class="muted">Ta réponse : « ${esc(act.guess||'')} »</p>
        <p class="muted mt">Manche suivante dans un instant… 📺</p>
      </div>`;
    }
  }

  // ---- Je suis un INDICEUR (je connais le mot secret) ----
  if (act.sub==='clue'){
    const mine = act.myClue;
    return `<div class="card center glow-box">
      ${head}
      <p class="muted">Mot secret pour <b>${esc(act.guesserName||'')}</b> :</p>
      <h2 class="neon-yellow" style="margin:6px 0">${esc(act.secretWord||'')}</h2>
      ${mine
        ? `<p class="neon-cyan mt">Ton indice : <b>${esc(mine)}</b> ✔ (envoyé)</p>`
        : `<input id="joClueInput" type="text" placeholder="Un seul mot…" style="width:100%;box-sizing:border-box;padding:10px;font-size:16px;border-radius:8px;margin-top:8px" onkeydown="if(event.key==='Enter')justoneClue()">
           <button class="btn mt" onclick="justoneClue()">Envoyer mon indice</button>
           <p class="muted mt" style="font-size:12px">Un seul mot — s'il est identique (même approximativement) à celui d'un autre joueur, les deux seront annulés !</p>`}
      <p class="muted mt">${act.clueCount}/${act.neededCount} ont proposé un indice</p>
    </div>`;
  }
  if (act.sub==='guess'){
    return `<div class="card center glow-box">
      ${head}
      <p class="muted">${esc(act.guesserName||'')} réfléchit…</p>
      <p class="big neon-cyan blink">🤔 En attente de sa réponse</p>
    </div>`;
  }
  if (act.sub==='reveal'){
    return `<div class="card center glow-box" style="border-color:var(--neon3)">
      ${head}
      <h2 class="${act.guessCorrect?'neon-cyan':'neon-pink'}">${act.guessCorrect?'✅ TROUVÉ !':'❌ RATÉ…'}</h2>
      <p class="big">Le mot était : <b class="neon-yellow">${esc(act.secretWord||'')}</b></p>
      <p class="muted">${esc(act.guesserName||'')} a répondu : « ${esc(act.guess||'')} »</p>
      <p class="muted mt">Regarde la BORNE pour le détail des indices 📺</p>
    </div>`;
  }
  return `<div class="card center"><h2>🧠 UN SEUL MOT !?</h2><p>Regarde la BORNE.</p></div>`;
}
// TTCQ « TU TE METS COMBIEN ? » — choisis ton niveau, réponds à la question
function ttcqController(act){
  const me = STATE.me || {};
  const adulte = act.level==='adulte';
  const pill = `<div class="pill ${adulte?'neon-pink':'neon-cyan'}">🎯 TTCQ · ${esc(act.levelLabel||'')} · manche ${act.round}/${act.totalRounds}</div>`;
  const themeName = act.currentTheme ? esc(act.currentTheme.name) : '?';

  // ---- FIN DE PARTIE ----
  if (act.sub==='final'){
    const board = act.finalBoard||[];
    const myPos = board.findIndex(p=>p.id===me.id);
    const myRow = myPos>=0 ? board[myPos] : null;
    return `<div class="card center glow-box" style="border-color:var(--neon3)">
      ${pill}
      <h2 class="neon-yellow pixel">🏁 TERMINÉ !</h2>
      ${myRow?`<p class="big">Tu finis <b>${myPos+1}${myPos===0?'er':'e'}</b> — case ${myRow.position} · 🪙${myRow.coins}</p>`:''}
      <p class="muted">Classement complet sur la BORNE 📺</p>
    </div>`;
  }

  // ---- CHOIX DE LA THÉMATIQUE (la carte à l'intérieur est piochée au hasard) ----
  if (act.sub==='theme_pick'){
    const iAmPicker = act.themePickerId === me.id;
    if (iAmPicker){
      const cats = act.availableCategories||[];
      return `<div class="card center glow-box">
        ${pill}
        <h2 class="neon-yellow">👑 Choisis la thématique !</h2>
        <p class="muted">La carte sera piochée au hasard dedans — surprise !</p>
        <div style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-height:60vh;overflow-y:auto">
          ${cats.map(c=>`<button class="btn" style="font-size:14px;padding:8px 14px" onclick="ttcqSelect('${esc(c).replace(/'/g,"\\'")}')">${esc(c)}</button>`).join('')}
        </div>
        ${!cats.length?'<p class="neon-pink">⚠️ Plus de thématiques disponibles</p>':''}
      </div>`;
    }
    return `<div class="card center glow-box">
      ${pill}
      <h2 class="neon-cyan">Attends le choix du thème…</h2>
      <p class="big">👑 <b class="neon-yellow">${esc(act.themePickerName||'?')}</b> choisit</p>
      <p class="muted">Regarde la BORNE 📺</p>
    </div>`;
  }

  // ---- MISE (choix du niveau 1-8) ----
  if (act.sub==='bet'){
    const myBet = act.myBet;
    return `<div class="card center glow-box">
      ${pill}
      <p class="big">📖 ${themeName}</p>
      <p class="neon-cyan" style="margin:6px 0">Tu te mets combien ?</p>
      <div class="row" style="justify-content:center;flex-wrap:wrap;gap:6px">
        ${Array.from({length: act.betMax||8}, (_,i)=>i+1).map(n=>{
          const sel = myBet === n;
          const cls = ['','neon-green','neon-green','neon-cyan','neon-cyan','neon-yellow','neon-yellow','neon-pink','neon-pink'][n];
          return `<button class="btn ${sel?'secondary':''}" style="min-width:48px;font-size:20px;font-weight:800" onclick="ttcqBet(${n},this)">
            <span class="${sel?'':cls}">${n}</span>
          </button>`;
        }).join('')}
      </div>
      ${myBet?`<p class="neon-cyan mt">✅ Tu te mets <b>${myBet}/8</b> ${myBet<=2?'👍':myBet<=4?'💪':myBet<=6?'🤔':'😱'}</p>`:`<p class="muted mt">1 = facile · 8 = extrême</p>`}
      <p class="muted">${act.betCount}/${act.playerCount} ont misé</p>
    </div>`;
  }

  // ---- QUESTION + RÉPONSE ----
  if (act.sub==='answer' || act.sub==='reveal'){
    const q = act.myQuestion;
    const bet = act.myBet||1;
    if (act.sub==='answer' && q){
      const already = act.myAnswer!=null && act.myAnswer!=='';
      const isQcm = Array.isArray(q.choices) && q.choices.length>1;
      let inputHtml;
      if (already){
        inputHtml = `<p class="neon-cyan mt">✅ Réponse envoyée : « ${esc(act.myAnswer)} »</p>`;
      } else if (isQcm){
        // QCM : le joueur choisit une proposition, on renvoie son TEXTE.
        inputHtml = `<div class="ttcq-choices" style="display:flex;flex-direction:column;gap:8px;margin-top:8px">`
          + q.choices.map(c=>`<button class="btn" style="width:100%" onclick="ttcqPickChoice(this.dataset.v,this)" data-v="${esc(c)}">${esc(c)}</button>`).join('')
          + `</div>`;
      } else {
        // Saisie libre (nombre ou mot court).
        inputHtml = `<input id="ttcqAnswerInput" type="text" maxlength="24" autocomplete="off" autocapitalize="off" placeholder="Ta réponse (un mot ou un nombre)…"
               style="width:100%;box-sizing:border-box;padding:12px;font-size:20px;text-align:center;border-radius:10px;margin-top:8px"
               onkeydown="if(event.key==='Enter')ttcqSubmitAnswer()">
             <button id="ttcqAnswerBtn" class="btn mt" onclick="ttcqSubmitAnswer()">✅ Valider ma réponse</button>`;
      }
      return `<div class="card center glow-box">
        ${pill}
        <div class="pill ${adulte?'neon-pink':'neon-cyan'}">Niveau ${bet}/8</div>
        <p class="big" style="margin:12px 0">📖 ${themeName}</p>
        <p style="font-size:18px;margin:10px 0"><i>${esc(q.question)}</i></p>
        ${inputHtml}
        <p class="muted mt">${act.answerCount}/${act.playerCount} ont répondu</p>
      </div>`;
    }
    // Révélation
    if (act.sub==='reveal'){
      const myRes = act.myResult;
      const qq = q || myRes || {};
      const ca = act.myCorrectAnswer;
      return `<div class="card center glow-box" style="border-color:var(--neon3)">
        ${pill}
        <p class="big">📖 ${themeName}</p>
        <p style="margin:8px 0"><i>${esc(qq.question||myRes?.question||'')}</i></p>
        ${ca!=null?`<p class="big neon-cyan" style="margin:6px 0">✔️ Réponse : <b>${esc(ca)}</b></p>`:''}
        ${myRes?`<p class="muted">Ta réponse : « ${esc(myRes.given||'—')} »</p>`:''}
        ${myRes?`<p class="big" style="margin:8px 0">${myRes.correct?'✅ Bon !':'❌ Faux !'} · misé ${myRes.bet} · avance <b class="neon-cyan">+${myRes.gained}</b></p>`:`<p class="muted">Pas de réponse</p>`}
        <p class="muted">Prochaine manche dans <span id="privacyCountdown" class="neon-yellow">${act.autoNextSeconds||20}</span>s</p>
      </div>`;
    }
  }

  return `<div class="card center"><h2>🎯 TTCQ</h2><p>Regarde la BORNE 📺</p></div>`;
}
function ttcqSelect(category){ api('/api/ttcq/selectCategory', { category }); }
function ttcqBet(level, btn){ pressAnswerBtn(btn, api('/api/ttcq/bet', { level })); }
function ttcqSubmitAnswer(){
  const el = document.getElementById('ttcqAnswerInput'); if (!el) return;
  const text = el.value.trim(); if (!text) return;
  pressAnswerBtn(document.getElementById('ttcqAnswerBtn'), api('/api/ttcq/answer', { text }));
}
function ttcqPickChoice(v, btn){ if (v==null||v==='') return; pressAnswerBtn(btn, api('/api/ttcq/answer', { text: v })); }
function submitCode(){
  const v = document.getElementById('codeInput').value;
  api('/api/code', { code: v }).then(r=>{
    const m = document.getElementById('codeMsg');
    if (m) m.innerHTML = r.ok ? '<span class="neon-cyan pixel" style="font-size:11px">✔ DÉBLOQUÉ !</span>'
                              : `<span class="pixel" style="font-size:10px;color:var(--danger)">${esc(r.reason||'NON')}</span>`;
  });
}
function gmGage(){
  const t = document.getElementById('gmTarget').value;
  api('/api/gm/gage', { targetId: t });
}
// Demande d'indice : la borne diffuse la vidéo du monde courant.
function askHint(){
  api('/api/hint', {}).then(r=>{
    const m = document.getElementById('hintMsg');
    if (m) m.textContent = r.ok ? '📺 Indice lancé sur la borne — regardez l’écran !' : (r.reason || 'Pas d’indice ici.');
  });
}

// =================== MANETTE NES — Séquence légendaire (Monde 1, Konami) ===================
let _konamiSeq = [];
const _KON_LABEL = { up:'▲', down:'▼', left:'◀', right:'▶', b:'B', a:'A' };
const _KON_TOKEN = { up:'HAUT', down:'BAS', left:'GAUCHE', right:'DROITE', b:'B', a:'A' };
function konamiSeqText(){ return _konamiSeq.length ? _konamiSeq.map(k=>_KON_LABEL[k]).join('  ') : '· · · · · · · · · ·'; }
function _konamiRefresh(){ const d = document.getElementById('konamiSeq'); if (d) d.textContent = konamiSeqText(); }
function konamiPush(k){
  _konamiSeq.push(k);
  _konamiRefresh();
  try { if (navigator.vibrate) navigator.vibrate(25); } catch(_){}
}
function konamiClear(){
  _konamiSeq = [];
  _konamiRefresh();
  const m = document.getElementById('codeMsg'); if (m) m.innerHTML = '';
}
function konamiSubmit(){ _konamiSend('/api/code'); }
// Monde 6 : chaque joueur valide SA propre séquence sur sa manette.
function konamiSubmitW6(){ _konamiSend('/api/w6/konami'); }
function _konamiSend(path){
  const code = _konamiSeq.map(k=>_KON_TOKEN[k]).join(' ');
  api(path, { code }).then(r=>{
    const m = document.getElementById('codeMsg');
    if (m) m.innerHTML = r.ok ? '<span class="neon-cyan pixel" style="font-size:11px">✔ SÉQUENCE VALIDÉE !</span>'
                              : `<span class="pixel" style="font-size:10px;color:var(--danger)">${esc(r.reason||'SÉQUENCE REFUSÉE')}</span>`;
    _konamiSeq = [];
    if (!r.ok) _konamiRefresh();
  });
}
// Monde 6 : porte « Konami collectif » puis commande de redémarrage (en LEET).
function w6GateHTML(w, me){
  const g = STATE.w6 || {};
  if (!g.gateComplete){
    if (me.konamiDone){
      return `<div class="card center" style="border-color:var(--neon2);background:#021a16">
        <div class="pill neon-cyan">✔ SÉQUENCE SAISIE</div>
        <p class="big neon-yellow">« UN POUR TOUS ET TOUS POUR UN »</p>
        <p>En attente des autres joueurs… <b>${g.doneCount||0}/${g.total||0}</b></p>
      </div>`;
    }
    return konamiPadHTML({
      submit: 'konamiSubmitW6',
      intro: 'Reconstituez la séquence et validez-la sur ta manette.',
      validLabel: '🎮 VALIDER MA SÉQUENCE',
    }) + (g.hint ? `<div class="card center" style="border-color:var(--neon3);background:#1a1400">
      <p class="neon-yellow">🤝 Indice : « UN POUR TOUS ET TOUS POUR UN »</p></div>` : '');
  }
  // Porte ouverte : tout le monde a saisi le Konami → la commande de redémarrage.
  return `<div class="card" style="border-color:var(--neon3);background:#1a1400">
    <div class="pill neon-yellow">⌨️ COMMANDE DE REDÉMARRAGE</div>
    <p>La porte est ouverte ! Entrez la <b>commande pour redémarrer</b> la réalité.</p>
    ${g.rebootHint ? `<p class="neon-pink">Presque… mais il faut la saisir en <b>LEET</b> 🔢</p>` : ''}
    <input id="codeInput" type="text" placeholder="COMMANDE" />
    <button class="btn secondary mt" onclick="submitCode()">⚡ REDÉMARRER</button>
    <div id="codeMsg" class="center mt"></div>
  </div>`;
}
function konamiPadHTML(opts){
  opts = opts || {};
  const submitFn = opts.submit || 'konamiSubmit';
  const intro = opts.intro || 'Rassemble les touches de tous les joueurs et entre la séquence sur la manette. Toi seul (PLAYER ONE) peux valider.';
  const validLabel = opts.validLabel || '👑 VALIDER';
  const dpad = 'width:38px;height:38px;background:#1a1a1a;color:#fff;border:none;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0';
  const ab = 'width:48px;height:48px;border-radius:50%;background:#c01b3a;color:#fff;border:3px solid #7c1226;font-family:var(--pixel);font-size:13px;cursor:pointer';
  return `<div class="card" style="border-color:var(--neon3);background:#1a1400">
    <div class="pill neon-yellow">🎮 SÉQUENCE LÉGENDAIRE</div>
    <p class="muted" style="font-size:12px;margin:4px 0 8px">${esc(intro)}</p>
    <div id="konamiSeq" style="font-size:18px;color:var(--neon3);text-align:center;letter-spacing:2px;min-height:24px;margin-bottom:10px;word-break:break-word">${konamiSeqText()}</div>
    <div style="display:flex;justify-content:center;align-items:center;gap:20px;background:#cfcfcf;border:3px solid #222;border-radius:14px;padding:14px;max-width:330px;margin:0 auto">
      <div style="display:grid;grid-template-columns:repeat(3,38px);grid-template-rows:repeat(3,38px)">
        <span></span>
        <button onclick="konamiPush('up')" style="${dpad}">▲</button>
        <span></span>
        <button onclick="konamiPush('left')" style="${dpad}">◀</button>
        <span style="background:#1a1a1a"></span>
        <button onclick="konamiPush('right')" style="${dpad}">▶</button>
        <span></span>
        <button onclick="konamiPush('down')" style="${dpad}">▼</button>
        <span></span>
      </div>
      <div style="display:flex;gap:12px;align-items:center">
        <button onclick="konamiPush('b')" style="${ab}">B</button>
        <button onclick="konamiPush('a')" style="${ab}">A</button>
      </div>
    </div>
    <div class="grid mt" style="max-width:330px;margin:10px auto 0">
      <button class="btn" onclick="konamiClear()">⟲ Effacer</button>
      <button class="btn secondary" onclick="${submitFn}()">${validLabel}</button>
    </div>
    <div id="codeMsg" class="center mt"></div>
  </div>`;
}
let fbRating = 0;
function setRating(s){ fbRating=s; document.getElementById('ratingLabel').textContent='⭐ '.repeat(s)+'('+s+'/5)'; }
async function submitFeedback(){
  const st=document.getElementById('fbStatus');
  if(!fbRating){ st.textContent='Choisis une note.'; return; }
  st.textContent='Envoi…';
  try{
    const r=await fetch(API+'/api/feedback', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ token:TOKEN, rating:fbRating, comment:document.getElementById('fbComment').value.trim() }) });
    const d=await r.json();
    if(!r.ok){ st.textContent=d.error||'Erreur'; return; }
    st.textContent='✓ Merci pour ton avis !';
    setTimeout(()=>render(),1500);
  }catch(e){ st.textContent='Erreur réseau.'; }
}
</script>
