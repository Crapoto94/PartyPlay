<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>PartyPlay — Joueur</title>
<meta name="robots" content="noindex, nofollow">
<meta property="og:title" content="PartyPlay — Page Joueur">
<meta property="og:type" content="website">
<meta property="og:site_name" content="PartyPlay">
<meta name="twitter:card" content="summary">
<script src="/static/fullscreen.js"></script>
<script src="/static/pacman-render.js"></script>
<script src="/static/sound.js"></script>
<style>
  .dpad { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; max-width:300px; margin:12px auto 0; }
  .dpad button { font-size:30px; padding:18px 0; border:3px solid #000; border-radius:12px;
    background:var(--neon4); color:#fff; box-shadow:0 5px 0 #3a2bd0; }
  .dpad button:active { transform:translateY(4px); box-shadow:0 1px 0 #3a2bd0; }
  .dpad .empty { visibility:hidden; }
  .tbtn { font-size:26px; padding:16px 0; border:3px solid #000; border-radius:12px;
    background:var(--neon4); color:#fff; box-shadow:0 5px 0 #3a2bd0; touch-action:manipulation; }
  .tbtn:active { transform:translateY(4px); box-shadow:0 1px 0 #3a2bd0; }
  /* Retour tactile instantané au clic sur un bouton de réponse : reste "enfoncé"
     tant que le serveur n'a pas confirmé (utile quand la connexion lag un peu). */
  .btn-pressed { transform:translateY(3px) !important; filter:brightness(.85); opacity:.9; transition:none !important; }
  .btn-pressed.btn-acked { outline:2px solid var(--ok, #2ee6a6); outline-offset:-2px; filter:none; opacity:1; }
</style>
</head>
<body class="scanlines">
<!-- Barre flottante Game Master (Vincent) : visible pendant les activités du Monde 4
     pour stopper l'activité en cours et revenir à la checklist des missions. -->
<div id="gmbar" style="display:none;position:fixed;left:0;right:0;bottom:0;z-index:50;padding:8px;background:#14001aee;border-top:2px solid var(--neon);text-align:center"></div>
<div id="pxlQuickLinks" style="display:none;position:fixed;top:8px;right:8px;z-index:50;flex-direction:column;gap:4px;align-items:flex-end"></div>
<div class="wrap" id="app">
  <div class="card center"><span class="pixel blink">CONNEXION…</span></div>
</div>

<script>
const TOKEN = location.pathname.split('/').pop();
const EVENT = window.__EVENT__ || {};
const API = '/e/' + EVENT.id;            // base event-scopée pour toutes les requêtes
const app = document.getElementById('app');
let STATE = null;

function api(path, body) {
  return fetch(API + path, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ token: TOKEN, ...body })
  }).then(r => r.json());
}

// --- Retour tactile instantané sur les boutons de réponse (jeux + quiz) ---
// Le clic déclenche TOUT DE SUITE côté client — avant même que la requête
// réseau parte — l'effet "enfoncé" + une vibration, pour que le joueur sente
// que son tap est pris en compte même si la connexion lag un peu. Un petit ✓
// (contour vert) s'ajoute une fois que le serveur a accusé réception ; le
// prochain re-render (état serveur synchronisé) prend ensuite le relais.
function hapticTap(){ try { if (navigator.vibrate) navigator.vibrate(15); } catch(_){} }
function pressAnswerBtn(btn, promise){
  if (!btn) return promise;
  hapticTap();
  btn.classList.add('btn-pressed');
  const group = btn.parentElement;
  if (group) group.querySelectorAll('button').forEach(b => { if (b !== btn) b.disabled = true; });
  return promise.then(r => { btn.classList.add('btn-acked'); return r; });
}

// --- Flux temps réel (SSE) + repli en polling si un proxy bufferise le flux ---
let lastSse = 0;
// On ne redessine QUE si l'état a vraiment changé : sinon le polling (~1/s)
// recréerait l'<input> et effacerait le code en cours de frappe + le focus.
let _lastJoueurJson = null;
let _prevEnqCount = -1;
let _tingCtx = null;
function _getTingCtx(){
  if (!_tingCtx) try { _tingCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(_){}
  if (_tingCtx && _tingCtx.state === 'suspended') _tingCtx.resume().catch(()=>{});
  return _tingCtx;
}
// Crée + résume l'AudioContext dès le premier geste (obligatoire iOS/Android)
['click','touchstart'].forEach(ev => document.addEventListener(ev, () => {
  if (!_tingCtx) try { _tingCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(_){}
  if (_tingCtx && _tingCtx.state === 'suspended') _tingCtx.resume().catch(()=>{});
  // Débloque aussi l'élément <audio> du blind-test (sans borne, c'est le
  // téléphone du GM qui joue le son) : play()+pause() immédiat au premier tap.
  try { const el = _ensureBtAudio(); el.muted = true; el.play().then(()=>{ el.pause(); el.muted = false; }).catch(()=>{ el.muted = false; }); } catch(_){}
}, { passive: true, once: true }));

// --- Blind-test sans borne : le téléphone du GM (avec une enceinte
// Bluetooth connectée dessus) prend le relais de la BORNE pour jouer le son
// ET moissonner les playlists YouTube (les thèmes par défaut sont des
// playlists YouTube, pas des extraits Deezer — sans ça aucune chanson ne
// serait jamais détectée si personne n'a la BORNE ouverte). ---
let _prevBtPlayReq = 0;
let _btAudioEl = null;
function _ensureBtAudio(){
  if (!_btAudioEl) { _btAudioEl = new Audio(); _btAudioEl.preload = 'auto'; }
  return _btAudioEl;
}
let _ytApiReady = false, _ytApiRequested = false, _ytApiCallbacks = [];
function _loadYtApi(cb){
  if (_ytApiReady) { cb(); return; }
  _ytApiCallbacks.push(cb);
  if (_ytApiRequested) return;
  _ytApiRequested = true;
  if (window.YT && window.YT.Player) { _onYtApiReady(); return; }
  const prevCb = window.onYouTubeIframeAPIReady;
  window.onYouTubeIframeAPIReady = function(){ if (typeof prevCb === 'function') prevCb(); _onYtApiReady(); };
  const s = document.createElement('script'); s.src = 'https://www.youtube.com/iframe_api';
  document.head.appendChild(s);
}
function _onYtApiReady(){ _ytApiReady = true; _ytApiCallbacks.splice(0).forEach(cb => cb()); }
function _ytHost(id){
  let host = document.getElementById(id);
  if (!host) { host = document.createElement('div'); host.id = id; host.style.cssText = 'position:fixed;top:-9999px;width:1px;height:1px;opacity:0;pointer-events:none'; document.body.appendChild(host); }
  return host;
}
// Lecteur de LECTURE : joue la chanson précise piochée par le serveur.
let _ytBt = null, _ytPendingVideoId = null;
function _initYtBt(){
  if (_ytBt) return;
  _ytHost('jytbt');
  _ytBt = new YT.Player('jytbt', { height:'1', width:'1', playerVars:{ autoplay:0, controls:0 }, events:{ onReady(){
    if (_ytPendingVideoId){ const id=_ytPendingVideoId; _ytPendingVideoId=null; _ytBt.loadVideoById(id); _ytBt.unMute(); _ytBt.playVideo(); }
  } } });
}
// Moissonneur : charge la playlist du thème en cours (muette, mélangée, en
// boucle) et poste chaque titre détecté au serveur — identique au mécanisme
// de borne.html, ne tourne que pour LE thème actif (pas tous les thèmes).
let _btHarvestTheme = null, _ytHarvester = null;
function _startBtHarvest(theme, listId){
  _ytHost('jytbth');
  _ytHarvester = new YT.Player('jytbth', {
    height:'1', width:'1',
    playerVars:{ listType:'playlist', list:listId, autoplay:1, loop:1, controls:0, disablekb:1, fs:0, modestbranding:1, mute:1 },
    events:{
      onReady(e){ try{ e.target.setShuffle(true); e.target.mute(); e.target.playVideo(); }catch(_){} },
      onStateChange(e){
        if (e.data === YT.PlayerState.PLAYING) {
          try {
            const d = e.target.getVideoData();
            if (d && d.video_id && d.title) {
              fetch(API + '/api/blindtest/addtrack', { method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({ theme, videoId: d.video_id, videoTitle: d.title }) }).catch(()=>{});
            }
          } catch(_){}
        }
        if (e.data === YT.PlayerState.ENDED) e.target.nextVideo();
      }
    }
  });
}
function ensureBlindtestHarvest(a){
  if (!a || a.type !== 'blindtest' || a.source !== 'youtube' || !a.theme) return;
  if (_btHarvestTheme === a.theme) return;
  _btHarvestTheme = a.theme;
  fetch(API + '/api/ytconfig').then(r=>r.json()).then(cfg=>{
    const listId = cfg && cfg.blindtest && cfg.blindtest[a.theme];
    if (!listId) return;
    _loadYtApi(() => _startBtHarvest(a.theme, listId));
  }).catch(()=>{});
}
function checkBlindtestAudio(s){
  // Seule la page du GM joue le son, et seulement si la fête n'a pas de borne
  // (sinon c'est la BORNE qui joue déjà — on éviterait de jouer deux fois).
  if (!s || !s.isGM || s.hasBorne) return;
  const a = s.activity;
  if (!a || a.type !== 'blindtest') return;
  ensureBlindtestHarvest(a);
  if (!a.playRequestedAt || a.playRequestedAt === _prevBtPlayReq) return;
  _prevBtPlayReq = a.playRequestedAt;
  try {
    if (a.playAudioUrl) {
      const el = _ensureBtAudio();
      el.muted = false; el.src = a.playAudioUrl; el.currentTime = 0; el.play().catch(()=>{});
    } else if (a.playVideoId) {
      _loadYtApi(() => {
        if (_ytBt) { _ytBt.loadVideoById(a.playVideoId); _ytBt.unMute(); _ytBt.playVideo(); }
        else { _ytPendingVideoId = a.playVideoId; _initYtBt(); }
      });
    }
  } catch(_){}
}
function playTing(){
  try {
    const ctx = _getTingCtx(); if (!ctx) return;
    const osc = ctx.createOscillator(); const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(1047, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1568, ctx.currentTime + 0.04);
    gain.gain.setValueAtTime(0.55, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.4);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 1.4);
  } catch(_){}
}
function checkEnqHint(s){
  const a = s && s.activity;
  if (!a || a.type !== 'enquete'){ _prevEnqCount = -1; return; }
  const eq = a.enquete;
  if (!eq){ _prevEnqCount = -1; return; }
  const cur = (eq.hintList||[]).length + (eq.myFragments||[]).length;
  if (_prevEnqCount >= 0 && cur > _prevEnqCount) playTing();
  _prevEnqCount = cur;
}
function updateQuickLinks(s){
  const bar = document.getElementById('pxlQuickLinks');
  if (!bar) return;
  let html = '';
  if (s.isGM && !s.gmDedicatedDevice) {
    html += `<a class="btn secondary" style="width:auto;font-size:11px;padding:6px 10px" href="/e/${s.eventId}/admin" target="_blank">⚙️ Console GM</a>`;
  }
  if (s.hasBorne && s.playersRemote) {
    html += `<a class="btn secondary" style="width:auto;font-size:11px;padding:6px 10px" href="/e/${s.eventId}/borne" target="_blank">📺 Voir la BORNE</a>`;
  }
  bar.innerHTML = html;
  bar.style.display = html ? 'flex' : 'none';
}
let _prevTtcqRevealAt = 0;
function checkTtcqReveal(s){
  const a = s && s.activity;
  if (!a || a.type !== 'ttcq'){ _prevTtcqRevealAt = 0; return; }
  if (a.sub !== 'reveal' || !a.revealAt || a.revealAt === _prevTtcqRevealAt) return;
  _prevTtcqRevealAt = a.revealAt;
  if (a.myResult && a.myResult.correct) playTing();
  showTtcqResultsPopup(a);
}
function showTtcqResultsPopup(act){
  const existing = document.getElementById('ttcqResultsPopup');
  if (existing) existing.remove();
  const rows = (act.leaderboard||[]).map(p=>{
    const r = (act.results||{})[p.id];
    let status;
    if (!r || r.given === '') status = '<span class="muted">⏳ N\'a pas répondu</span>';
    else status = r.correct ? '<span class="neon-cyan">✅ Bonne réponse</span>' : '<span class="neon-pink">❌ Mauvaise réponse</span>';
    return `<div style="display:flex;justify-content:space-between;gap:10px;padding:6px 0;border-bottom:1px solid #ffffff14">
      <span>${esc(p.name)}</span>${status}
    </div>`;
  }).join('');
  const div = document.createElement('div');
  div.id = 'ttcqResultsPopup';
  div.style.cssText = 'position:fixed;inset:0;z-index:9998;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center';
  div.onclick = () => div.remove();
  div.innerHTML = `<div class="card" style="max-width:340px;width:90%;max-height:70vh;overflow-y:auto" onclick="event.stopPropagation()">
    <h3 class="neon-yellow" style="margin-top:0">📋 Résultats de la manche</h3>
    ${rows}
    <p class="muted" style="font-size:11px;margin-top:10px;text-align:center">Touche l'écran pour fermer</p>
  </div>`;
  document.body.appendChild(div);
  setTimeout(()=>{ const el=document.getElementById('ttcqResultsPopup'); if(el) el.remove(); }, 8000);
}
function applyState(s){
  const j = JSON.stringify(s);
  if (j === _lastJoueurJson) return;
  _lastJoueurJson = j;
  checkEnqHint(s);
  checkTtcqReveal(s);
  checkBlindtestAudio(s);
  updateQuickLinks(s);
  STATE = s; render();
  detectPianoDemo(s); // surligne mes touches si la borne (re)joue la mélodie
  checkPhotoReminder(s); // relance « pense à tes photos » 1 h après le début de la fête
}
const es = new EventSource(API + '/events?token=' + encodeURIComponent(TOKEN));
es.onmessage = (e) => { lastSse = Date.now(); applyState(JSON.parse(e.data)); };
es.onerror = () => { /* l'EventSource se reconnecte tout seul */ };
function poll(){ fetch(API + '/api/state?token=' + encodeURIComponent(TOKEN)).then(r=>r.json()).then(applyState).catch(()=>{}); }
poll(); // rendu immédiat dès le chargement (ne reste pas bloqué sur CONNEXION)
setInterval(() => { if (Date.now() - lastSse > 1500) poll(); }, 1000);

function h(strings, ...vals) { return strings.map((s,i)=>s+(vals[i]??'')).join(''); }
function esc(s){ return String(s==null?'':s).replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

let pacKey = null;
let mosKey = null;
let videoKey = null;
let tetKey = null;
let tronKey = null;
let g2048Key = null;
let pongKey = null;
let drawKey = null;
let _drawStrokes = [];
let _drawCur = null;
let _drawSendT = null;

// --- Upload photo (input caché, réutilisé) ---
let _photoMissionIdx = 0;
const _photoInput = (() => {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'image/*'; inp.style.display = 'none';
  document.body.appendChild(inp);
  inp.addEventListener('change', async () => {
    const file = inp.files[0]; if (!file) return;
    const btn = document.getElementById('photo-btn-' + _photoMissionIdx);
    if (btn) { btn.disabled = true; btn.textContent = '⏳ Envoi…'; }
    const fd = new FormData();
    fd.append('photo', file);
    fd.append('token', TOKEN);
    fd.append('missionIdx', String(_photoMissionIdx));
    try {
      const r = await fetch(API + '/api/photo/upload', { method: 'POST', body: fd });
      const d = await r.json();
      if (d.ok) poll();
    } catch (_) {}
    inp.value = '';
  });
  return inp;
})();
function uploadPhoto(idx) { _photoMissionIdx = idx; _photoInput.click(); }
function render() {
  if (!STATE) return;
  const me = STATE.me;
  if (!me) { app.innerHTML = `<div class="card center"><h2 class="neon-pink">TOKEN INVALIDE</h2><p>Scanne ton QR code perso.</p></div>`; return; }
  updateHeroBar(me);

  // --- PAC-MAN : contrôleur plein écran ---
  if (STATE.phase === 'activity' && STATE.activity && STATE.activity.type === 'pacman' && STATE.pacman) {
    renderPacmanPlayer(me); return;
  }
  pacKey = null;
  // --- TETRIS : ma grille + manette ---
  if (STATE.phase === 'activity' && STATE.activity && STATE.activity.type === 'tetris' && STATE.tetris) {
    renderTetrisPlayer(me); return;
  }
  tetKey = null;
  // --- TRON : manette directionnelle ---
  if (STATE.phase === 'activity' && STATE.activity && STATE.activity.type === 'tron' && STATE.tron) {
    renderTronPlayer(me); return;
  }
  tronKey = null;
  // --- 2048 : glissements ---
  if (STATE.phase === 'activity' && STATE.activity && STATE.activity.type === '2048' && STATE.g2048) {
    render2048Player(me); return;
  }
  g2048Key = null;
  // --- PONG : raquette (appui maintenu) ---
  if (STATE.phase === 'activity' && STATE.activity && STATE.activity.type === 'pong' && STATE.pong) {
    renderPongPlayer(me); return;
  }
  pongKey = null;
  // --- DESSINE-MOI : dessinateur ou devineur ---
  if (STATE.phase === 'activity' && STATE.activity && STATE.activity.type === 'draw') {
    renderDrawPlayer(me); return;
  }
  drawKey = null;
  // --- MOSAÏQUE : fragment plein écran ---
  if (STATE.phase === 'activity' && STATE.activity && STATE.activity.type === 'mosaic') {
    renderMosaicPlayer(me); return;
  }
  mosKey = null;
  // --- DIFFUSION VIDÉO : vidéo plein écran + bandeau ---
  if (STATE.phase === 'activity' && STATE.activity && STATE.activity.type === 'videoshow') {
    if (STATE.activity.borneOnly) {
      main.innerHTML = `<div class="card center" style="margin-top:40px">
        <div style="font-size:48px">🎬</div>
        <div class="pixel neon-yellow" style="font-size:22px;margin-top:12px">${esc(STATE.activity.topLabel||'VIDÉO')}</div>
        <div class="muted mt">${esc(STATE.activity.chyron||'Regardez la borne !')}</div>
      </div>`;
      return;
    }
    renderVideoPlayer(me); return;
  }
  if (videoKey){ videoKey = null; document.body.classList.add('scanlines'); } // sorti de la vidéo : rétablit l'effet CRT

  const av = me.avatarInfo;
  const hearts = '❤️'.repeat(me.lives) + '🖤'.repeat(Math.max(0,3-me.lives));

  let html = `
  <div class="card" style="border-color:${av.color}">
    <div class="row" style="align-items:center">
      <div style="flex:0 0 auto;font-size:46px">${av.emoji}</div>
      <div style="flex:1">
        <div class="pixel" style="color:${av.color};font-size:14px">${esc(av.name)}</div>
        <div class="muted">${esc(me.name)}</div>
      </div>
    </div>
    <div class="row mt">
      <div class="hearts">${hearts}</div>
      <div class="coins center">🪙 ${me.coins}</div>
    </div>
    <div class="muted mt" style="font-size:16px">${esc(av.tagline)}</div>
  </div>`;

  // --- Activité BORNE en cours : la page devient une manette ---
  if (STATE.phase === 'activity' && STATE.activity) {
    html += controllerView(STATE.activity);
    app.innerHTML = html + footer();
    return;
  }

  // --- Vote / résultats photo ---
  if (STATE.photoPhase === 'vote') {
    html += photoVoteView(me);
    app.innerHTML = html + footer();
    return;
  }
  if (STATE.photoPhase === 'results') {
    html += `<div class="card center glow-box"><div class="pill neon-yellow">🏆 PALMARÈS PHOTO</div><p class="big">Regarde la BORNE ! 📺</p></div>`;
    html += photoSection(me);
    app.innerHTML = html + footer();
    return;
  }

  // --- Fête terminée ---
  if (STATE.closed && STATE.phase === 'lobby') {
    html += `
    <div class="card center" style="border-color:var(--neon2)">
      <div style="font-size:48px">🎉</div>
      <h2 class="neon-cyan">FÊTE TERMINÉE</h2>
      <p>Merci d'avoir joué à <strong>${esc(STATE.eventName)}</strong> !</p>
      <p class="muted">Les jeux ne sont plus disponibles. Donne ton avis ci-dessous ⭐</p>
    </div>`;
  }

  // --- Lobby ---
  if (STATE.phase === 'lobby') {
    html += `
    <div class="card center">
      <h2 class="neon-cyan">SALLE D'ATTENTE</h2>
      <p>La BORNE chauffe… Prépare-toi, ${esc(me.name)}.</p>
      <button class="btn ${me.ready?'secondary':''}" onclick="toggleReady()">
        ${me.ready ? '✔ PRÊT' : 'JE SUIS PRÊT'}
      </button>
    </div>`;
  }

  // --- En jeu : monde courant ---
  if ((STATE.phase === 'world') && STATE.world) {
    const w = STATE.world;
    html += `
    <div class="card glow-box">
      <div class="pill neon-yellow">MONDE ${w.num}/${STATE.worldCount}</div>
      <h2 class="neon-pink">${esc(w.titre)}</h2>
      <p>${esc(w.enigme)}</p>
      <p class="muted">📦 Colis ${w.colis} livré par les Pixels.</p>`;

    if (me.indices) {
      html += `<div class="card" style="background:#1a0b00;border-color:${av.color}">
        <div class="pill" style="color:${av.color}">TON INDICE SECRET</div>
        <ul>${(Array.isArray(me.indices)?me.indices:[me.indices]).filter(Boolean).map(i=>`<li>${esc(i)}</li>`).join('')}</ul>
      </div>`;
    }

    if (w.enqueteWorld) {
      // Monde 5 : LA GRANDE ENQUÊTE se joue en activité — rien à saisir ici.
      html += `<div class="card center" style="border-color:var(--neon2)">
        <div class="pill neon-cyan">🕵️ LA GRANDE ENQUÊTE</div>
        <p>L'enquête démarre sur la BORNE 📺 — suivez les actes et tapez les codes !</p>
      </div>`;
    } else {
      if (w.pianoWorld && STATE.piano) {
        // Monde 3 : piano réparti intégré — chaque téléphone a ses touches.
        html += pianoController(STATE.piano);
      } else if (w.konamiGate) {
        // Monde 6 : TOUS les joueurs saisissent le Konami, puis la commande en LEET.
        html += w6GateHTML(w, me);
      } else if (w.heroOnly && !me.isHero) {
        // Énigme réservée au PLAYER ONE : les autres transmettent leurs touches.
        html += `<div class="card" style="border-color:var(--neon3);background:#1a1400">
          <div class="pill neon-yellow">🎮 SÉQUENCE LÉGENDAIRE</div>
          <p>Donne tes touches à <b>VINCENT (Player One)</b> — lui seul peut valider la séquence sur la borne.</p>
        </div>`;
      } else if (w.heroOnly) {
        // Monde 1 (Konami) : Vincent (PLAYER ONE) entre la séquence sur une MANETTE NES.
        html += konamiPadHTML();
      } else {
        html += `
        <input id="codeInput" type="text" placeholder="CODE" />
        <button class="btn secondary mt" onclick="submitCode()">VALIDER LE CODE</button>
        <div id="codeMsg" class="center mt"></div>`;
      }
    }
    // Vidéo-indice : disponible si le monde en propose une (ex. Monde 1).
    if (w.hintVideo) {
      html += `<div class="center mt">
        <button class="btn" onclick="askHint()">💡 Un indice ?</button>
        <div id="hintMsg" class="muted mt" style="font-size:12px"></div>
      </div>`;
    }
    html += `</div>`;
  }

  // --- Carnet secret : mission perso + indice sur un autre joueur ---
  if (me.mission || me.secretClue) {
    html += `<div class="card" style="border-color:var(--neon2);background:#021a16">
      <div class="pill neon-cyan">🤫 TON CARNET SECRET</div>
      ${me.mission ? `<p><b class="neon-cyan">Ta mission :</b> ${esc(me.mission)}</p>` : ''}
      ${me.secretClue ? `<p><b class="neon-cyan">Ton indice :</b> ${esc(me.secretClue)}</p>` : ''}
      <p class="muted">Pour toi seul·e. Sers-t'en au bon moment 😉</p>
    </div>`;
  }

  // --- Panneau Game Master (Vincent éveillé) ou hôte (Marc) ---
  if (me.gameMaster || me.isHost) {
    html += gmPlayerPanel(me);
  }

  // --- Gage en cours ---
  if (STATE.currentGage) html += gageView(STATE.currentGage, me);

  // --- Défis photo (toujours visibles hors activité) ---
  html += photoSection(me);

  // --- Feedback post-fête ---
  if (STATE.closed) {
    const fb = me.myFeedback;
    if (fb) {
      html += `<div class="card center" style="border-color:var(--neon2)">
        <div class="pill neon-green">✅ Avis envoyé</div>
        <p class="muted">Merci pour ton retour ! ⭐ ${fb.rating||'—'}/5</p>
        ${fb.comment ? `<p style="font-style:italic">« ${esc(fb.comment)} »</p>` : ''}
      </div>`;
    } else {
      html += `<div class="card center" style="border-color:var(--neon2)">
        <div class="pill neon-yellow">⭐ Donne ton avis</div>
        <p class="muted">La fête est finie ! Note PartyPlay et laisse un commentaire.</p>
        <div style="display:flex;gap:4px;justify-content:center;margin:8px 0" id="starRating">
          ${[1,2,3,4,5].map(s => `<button class="btn" style="width:auto;font-size:22px;padding:4px 10px" onclick="setRating(${s})">${s>3?'⭐':'★'}</button>`).join('')}
        </div>
        <p style="font-size:13px;margin:4px 0"><span id="ratingLabel">Sélectionne une note</span></p>
        <textarea id="fbComment" placeholder="Un commentaire ? (optionnel)" rows="3" style="width:100%"></textarea>
        <button class="btn mt" onclick="submitFeedback()">💬 Envoyer mon avis</button>
        <div id="fbStatus" class="muted mt" style="font-size:13px"></div>
      </div>`;
    }
  }

  app.innerHTML = html + footer();
}

function footer() {
  return `<div class="card log"><div class="muted pixel" style="font-size:9px">JOURNAL</div>
    ${(STATE.log||[]).map(l=>`<div>${esc(l.msg)}</div>`).join('')}</div>`;
}

function controllerView(act) {
  // BRIEFING : on invite à regarder la borne
  if (act.type === 'briefing') {
    return `<div class="card center glow-box">
      <div class="pill neon-cyan">📖 BRIEFING</div>
      <h2 class="neon-pink">Regarde la BORNE 📺</h2>
      <p>Le scénario et ton rôle sont en train d'être présentés…</p>
    </div>`;
  }
  // SÉQUENCE MUSICALE : les pads de notes du joueur
  if (act.type === 'music_seq') {
    return musicController(act);
  }
  if (act.type === 'piano') {
    return pianoController(act);
  }
  // QUIZ / BLIND-TEST / QUIZ VINCENT : QCM (question sur la BORNE, réponse ici)
  if (act.type === 'quiz' || act.type === 'quiz_vincent' || act.type === 'blindtest') {
    return quizController(act);
  }
  // ENQUÊTE : pièces à conviction perso + saisie de code
  if (act.type === 'enquete') {
    return enqueteController(act);
  }
  // GAGE DU ROI : attribué par le roi à un joueur
  // REACTION RACE : gros buzzer
  if (act.type === 'reaction_race') {
    const buzzed = (act.buzzes||[]).find(b=>b.id===STATE.me.id);
    return `<div class="card center glow-box">
      <h2 class="neon-cyan">REACTION RACE</h2>
      <p>Regarde la BORNE puis BUZZE !</p>
      <button class="btn-buzz" ${buzzed?'disabled':''} onclick="buzz(this)">${buzzed?'BUZZÉ ✔':'BUZZ'}</button>
    </div>`;
  }
  if (act.type === 'spotlight') {
    const d = act.data || {};
    const target = d.targetName || '?';
    const isTarget = d.targetId && d.targetId === STATE.me.id;
    // Résultat
    if (act.sub === 'result') {
      const win = act.verdict === 'ok';
      return `<div class="card center glow-box">
        <h2 class="${win?'neon-cyan':'neon-pink'}">${win?'👏 RÉUSSI !':'💀 RATÉ !'}</h2>
        <p><b>${esc(target)}</b> — ${esc(d.defi||'')}</p>
        <p class="muted">👏 ${act.okCount||0} · 💀 ${act.koCount||0}${(!win&&isTarget)?' — tu perds une vie 💔':''}</p>
      </div>`;
    }
    // Phase défi (avant le vote) ou défi en cours
    if (isTarget) {
      return `<div class="card center glow-box" style="border-color:var(--neon3)">
        <h2 class="neon-yellow">🔦 C'EST TON DÉFI !</h2>
        <p class="big">${esc(d.defi||'Relève le défi !')}</p>
        <p class="muted">${act.sub==='vote'?'La salle vote… croise les doigts !':'Relève-le devant tout le monde 🎤'}</p>
      </div>`;
    }
    if (act.sub === 'vote') {
      const my = act.votes && act.votes[STATE.me.id];
      return `<div class="card center glow-box">
        <h2 class="neon-yellow">🔦 VERDICT</h2>
        <p><b>${esc(target)}</b> a tenté : <i>${esc(d.defi||'')}</i></p>
        <p>A-t-il/elle réussi ?</p>
        <div class="row">
          <button class="btn ${my==='ok'?'secondary':''}" onclick="spotlightVote('ok',this)">RÉUSSI 👏</button>
          <button class="btn ${my==='ko'?'danger':''}" onclick="spotlightVote('ko',this)">RATÉ 💀</button>
        </div>
        ${my?'<p class="neon-cyan mt">Vote enregistré ✔ (modifiable)</p>':''}
      </div>`;
    }
    return `<div class="card center glow-box">
      <h2 class="neon-yellow">🔦 SPOTLIGHT</h2>
      <p><b>${esc(target)}</b> relève un défi…</p>
      <p class="muted">${esc(d.defi||'')}</p>
      <p class="muted">Regarde, tu voteras juste après ! 👀</p>
    </div>`;
  }
  if (act.type === 'anecdote') {
    return `<div class="card center glow-box" style="border-color:var(--neon3)">
      <div class="pill neon-pink">🔴 BREAKING NEWS</div>
      <h2 class="neon-yellow">${esc(act.titre||'')}</h2>
      <p class="big">📺 Tous les yeux sur la BORNE !</p>
    </div>`;
  }
  // SANS FILTRE !? : réponse secrète OUI/NON, puis pari sur le nombre de OUI
  if (act.type === 'privacy') {
    return privacyController(act);
  }
  // BOUCHE-TROU !? : joue une carte de ta main ; l'arbitre élit la plus drôle
  if (act.type === 'carton') {
    return cartonController(act);
  }
  // TTCQ « TU TE METS COMBIEN ? » : choisis ton niveau, réponds, avance
  if (act.type === 'ttcq') {
    return ttcqController(act);
  }
  // UN SEUL MOT !? : indice à un mot (ou devine si c'est ton tour)
  if (act.type === 'justone') {
    return justoneController(act);
  }
  if (act.type === 'heroquiz') {
    return heroQuizController(act);
  }
  return `<div class="card center"><h2>ACTIVITÉ EN COURS</h2><p>Regarde la BORNE.</p></div>`;
}
// Anecdote 3 : seul VINCENT (le héros) saisit les initiales.
function heroQuizController(act){
  const me = STATE.me || {};
  if (act.sub === 'win'){
    return `<div class="card center glow-box" style="border-color:var(--neon3)">
      <div class="pill neon-yellow">🎆 BRAVO VINCENT !</div>
      <p class="big">${me.isHero?'Tu as trouvé ! 🏆':'Vincent a trouvé ! 🏆'}</p>
      <p class="muted">Regarde la BORNE 📺</p>
    </div>`;
  }
  if (act.sub === 'play'){
    return `<div class="card center glow-box" style="border-color:var(--neon3)">
      <div class="pill neon-pink">💡 ANECDOTE</div>
      <p class="big">Regarde la BORNE 📺</p>
      <p class="muted">La question arrive dans quelques secondes…</p>
    </div>`;
  }
  if (!me.isHero){
    return `<div class="card center glow-box" style="border-color:var(--neon3)">
      <div class="pill neon-pink">💡 ANECDOTE</div>
      <p class="big">Regarde la BORNE 📺</p>
      <p>C'est à <b class="neon-yellow">VINCENT</b> de deviner !</p>
    </div>`;
  }
  const wrong = act.lastWrong && (Date.now()-act.lastWrong < 3000)
    ? '<p class="pixel" style="font-size:11px;color:var(--danger)">✘ Pas tout à fait… réessaie !</p>' : '';
  return `<div class="card glow-box" style="border-color:var(--neon3)">
    <div class="pill neon-pink">💡 ANECDOTE — À TOI, VINCENT 👑</div>
    <p style="font-size:15px"><b class="neon-pink">${esc(act.question||'Qui est-ce ?')}</b></p>
    <p class="muted" style="font-size:13px">Réponse attendue : ${esc(act.hintLabel||'la réponse')}.</p>
    <input id="hqInput" type="text" placeholder="INITIALES" style="text-transform:uppercase"
      onkeydown="if(event.key==='Enter')heroQuizAnswer()" autocomplete="off" />
    <button class="btn warn mt" onclick="heroQuizAnswer()">🔓 VALIDER</button>
    <div id="hqMsg" class="center mt">${wrong}</div>
  </div>`;
}
function heroQuizAnswer(){
  const el = document.getElementById('hqInput'); const v = el ? el.value : '';
  api('/api/heroquiz/answer', { answer: v }).then(r=>{
    const m = document.getElementById('hqMsg');
    if (m) m.innerHTML = r.ok ? '<span class="neon-cyan pixel" style="font-size:11px">✔ BRAVO !</span>'
                              : `<span class="pixel" style="font-size:10px;color:var(--danger)">${esc(r.reason||'NON')}</span>`;
  });
}

function mosaicGuessSend(){
  const inp=document.getElementById('mosans'); if(!inp) return;
  const txt=inp.value.trim(); if(!txt) return;
  api('/api/mosaic/guess', { text: txt }).then(r=>{ const fb=document.getElementById('mosfb');
    if(fb) fb.innerHTML = (r&&r.correct)?'<span class="neon-cyan">🎉 BONNE RÉPONSE !</span>':`<span class="neon-pink">Raté… ${r&&r.wrong?'('+r.wrong+' erreur(s))':''}</span>`;
    if(!(r&&r.correct)) inp.value='';
  });
}
function renderMosaicPlayer(me) {
  const a = STATE.activity;
  const mine = a.mine;
  const key = (a.round||1) + '-' + (mine ? mine.slice : 'x') + '-' + (a.reveal?1:0) + '-' + (a.solved?'s':'') + (a.failed?'f':'');
  if (mosKey === key) return; // statique : on ne redessine pas à chaque SSE
  mosKey = key;
  // Résolu / échoué : on affiche le résultat (le mot)
  if (a.solved || a.failed){
    app.innerHTML = `<div class="card center glow-box">
      <h2 class="${a.solved?'neon-cyan':'neon-pink'}">${a.solved?'✅ RÉSOLU !':'⏱ Réponse révélée'}</h2>
      <div class="big pixel neon-yellow" style="letter-spacing:6px">${esc(a.answer||'')}</div>
      ${a.solved&&a.solvedBy?`<p class="muted">Trouvé par ${esc(a.solvedBy)}</p>`:''}
      <p class="muted">Regarde la BORNE 📺</p>
    </div>`;
    return;
  }
  if (!mine) { app.innerHTML = `<div class="card center"><h2 class="neon-cyan">🧩 MOSAÏQUE</h2><p>En attente…</p></div>`; return; }
  const rows = mine.rows || 1;
  const bandH = Math.max(70, Math.min(150, Math.floor((window.innerHeight - 96) / rows)));
  const bands = (mine.bands || []).map((s, r) => {
    const ok = r === mine.correctRow;
    const bg = ok ? `hsl(${mine.hue},85%,32%)` : '#0a0a14';
    const col = ok ? '#ffe600' : '#3a3a52';
    const sh = ok ? 'text-shadow:0 0 10px #000' : '';
    return `<div style="height:${bandH}px;display:flex;align-items:center;justify-content:center;background:${bg};border-bottom:2px solid #000;font-family:var(--pixel);font-size:${Math.floor(bandH*0.42)}px;color:${col};letter-spacing:8px;${sh}">${esc(s)}</div>`;
  }).join('');
  const hint = rows > 1
    ? (a.reveal
        ? `La ligne <b style="color:#ffe600">colorée</b> est la bonne. Décale ton téléphone (en escalier) pour l'aligner avec celles des voisins.`
        : `UNE seule des ${rows} lignes est la bonne. Trouvez-la en équipe et placez-vous en quinconce. <span class="muted">(le MJ peut révéler un indice couleur)</span>`)
    : `Place-toi au bon endroit dans la rangée pour reconstituer le mot.`;
  app.innerHTML = `
    <div class="center">
      <div class="pixel neon-cyan" style="font-size:12px;margin:4px">🧩 ${rows>1?'ALIGNE EN QUINCONCE':'ALIGNE TON ÉCRAN'}</div>
      <div style="border:2px solid #222;border-radius:8px;overflow:hidden;margin:0 auto;max-width:520px">${bands}</div>
      <p class="muted" style="font-size:14px;margin-top:8px">${hint}</p>
      <div class="card" style="border-color:var(--neon3);margin-top:8px">
        <div class="pill neon-yellow">🔤 VOTRE RÉPONSE</div>
        <div class="row mt">
          <input id="mosans" type="text" placeholder="Le mot reconstitué…" style="flex:1" />
          <button class="btn secondary" onclick="mosaicGuessSend()">Valider</button>
        </div>
        <div id="mosfb" class="center mt"></div>
      </div>
    </div>`;
  const gi = document.getElementById('mosans');
  if (gi) gi.addEventListener('keydown', (e)=>{ if(e.key==='Enter') mosaicGuessSend(); });
}

function renderPacmanPlayer(me) {

      msg.innerHTML = `<span class="neon-cyan">${role}</span> <b>${lives}</b>`;
    }
  }
}
function pacDir(d){ if(window.SFX) {} api('/api/pacman/dir', { dir: d }); }

// =================== TETRIS (manette joueur) ===================
const TCOLORS = ['#15092e','#2effd5','#ffe600','#b15cff','#38ff9c','#ff2e88','#3a7bff','#ff9a3c'];
function tetGrid(cells, cell){
  let html = `<div style="display:inline-grid;grid-template-columns:repeat(10,${cell}px);grid-template-rows:repeat(20,${cell}px);gap:1px;background:#0a0420;padding:3px;border:3px solid var(--neon4);border-radius:8px">`;
  for(const row of (cells||[])){ for(const ch of row){ const v=+ch; html += `<div style="background:${TCOLORS[v]||'#15092e'};border-radius:2px"></div>`; } }
  return html + '</div>';
}
function tetMini(next, cell){
  if(!next || !next.mat) return '<span class="muted">—</span>';
  const cols = next.mat[0].length;
  let html = `<div style="display:inline-grid;grid-template-columns:repeat(${cols},${cell}px);gap:1px;padding:3px;background:#0a0420;border-radius:6px">`;
  for(const row of next.mat){ for(const v of row){ html += `<div style="width:${cell}px;height:${cell}px;background:${v?TCOLORS[next.color]:'transparent'};border-radius:2px"></div>`; } }
  return html + '</div>';
}
function tetrisMove(dir){ if(window.SFX){SFX.unlock();} api('/api/tetris/move', { dir }); }
function renderTetrisPlayer(me){
  const t = STATE.tetris;
  const mine = t.players.find(p=>p.id===me.id);
  if (tetKey !== STATE.activity.startedAt){
    tetKey = STATE.activity.startedAt;
    const cell = Math.max(14, Math.floor((Math.min(window.innerWidth-26,300)-8)/10));
    app._tcell = cell;
    app.innerHTML = `
      <div class="center">
        <div style="display:flex;align-items:center;justify-content:center;gap:14px;margin:4px 0">
          <div id="tetinfo" class="pixel" style="font-size:12px"></div>
          <div style="text-align:center"><div class="muted" style="font-size:11px">SUIVANT</div><div id="tetnext"></div></div>
        </div>
        <div id="tetgrid"></div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-width:340px;margin:10px auto 0">
          <button class="tbtn" data-d="left">◀</button>
          <button class="tbtn" data-d="rotate">⟳</button>
          <button class="tbtn" data-d="right">▶</button>
          <button class="tbtn" data-d="down">▼</button>
        </div>
        <button class="tbtn" data-d="drop" style="width:100%;max-width:340px;margin:8px auto 0">⏬ POSER</button>
      </div>`;
    app.querySelectorAll('.tbtn[data-d]').forEach(b=>{
      const f=(ev)=>{ ev.preventDefault(); tetrisMove(b.dataset.d); };
      b.addEventListener('touchstart', f, {passive:false});
      b.addEventListener('mousedown', f);
    });
  }
  const cell = app._tcell || 24;
  const info = document.getElementById('tetinfo');
  const grid = document.getElementById('tetgrid');
  const nextEl = document.getElementById('tetnext');
  if (info){
    if (t.status!=='playing'){
      const w=(t.ranking||[])[0];
      info.innerHTML = (w&&w.id===me.id) ? '<span class="neon-yellow">🏆 TU GAGNES !</span>'
        : (w?('🏆 '+esc(w.name)+' gagne — '+w.lines+' lignes'):'Terminé');
    } else if (mine && mine.eliminated){
      info.innerHTML = '<span class="neon-pink">☠️ ÉLIMINÉ — regarde la borne !</span>';
    } else {
      info.innerHTML = mine ? `<span class="neon-cyan">${mine.lines} lignes · ${mine.score} pts</span><br><span class="muted">Niveau ${t.level||1}</span>` : '';
    }
  }
  if (nextEl) nextEl.innerHTML = (mine && !mine.eliminated && t.status==='playing') ? tetMini(mine.next, Math.max(8,Math.floor(cell*0.6))) : '';
  if (grid && mine) grid.innerHTML = tetGrid(mine.cells, cell);
}

function tronDir(d){ api('/api/tron/move', { dir: d }); }

let _pongHold = null;
function pongHold(dir){ pongRelease(); pongMoveOnce(dir); _pongHold = setInterval(()=>pongMoveOnce(dir), 70); }
function pongRelease(){ if(_pongHold){ clearInterval(_pongHold); _pongHold=null; } }
function pongMoveOnce(dir){ api('/api/pong/move', { dir }); }
function pongDrawJ(ctx, S, t, mineSide){
  const k=S/t.size; ctx.fillStyle='#05010f'; ctx.fillRect(0,0,S,S);
  ctx.strokeStyle='#1b1060'; ctx.lineWidth=2; ctx.strokeRect(2,2,S-4,S-4);
  const m=t.margin*k, pad=t.pad*k;
  t.players.forEach(p=>{ if(!p.alive)return; ctx.fillStyle=p.color; const c=p.pos*k;
    if(p.side==='top') ctx.fillRect(c-pad/2,m-3,pad,6);
    if(p.side==='bottom') ctx.fillRect(c-pad/2,S-m-3,pad,6);
    if(p.side==='left') ctx.fillRect(m-3,c-pad/2,6,pad);
    if(p.side==='right') ctx.fillRect(S-m-3,c-pad/2,6,pad);
    if(p.side===mineSide){ ctx.strokeStyle='#fff'; ctx.lineWidth=2;
      if(p.side==='top') ctx.strokeRect(c-pad/2-1,m-5,pad+2,9);
      if(p.side==='bottom') ctx.strokeRect(c-pad/2-1,S-m-5,pad+2,9);
      if(p.side==='left') ctx.strokeRect(m-5,c-pad/2-1,9,pad+2);
      if(p.side==='right') ctx.strokeRect(S-m-5,c-pad/2-1,9,pad+2);
    }
  });
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(t.ball.x*k,t.ball.y*k,t.ballr*k,0,7); ctx.fill();
}
function renderPongPlayer(me){
  const t = STATE.pong;
  const mine = t.players.find(p=>p.id===me.id);
  if (pongKey !== STATE.activity.startedAt){

  const info=document.getElementById('ponginfo');
  if(info){
    if (t.status!=='playing'){ const w=(t.ranking||[])[0]; info.innerHTML=(w&&w.id===me.id)?'<span class="neon-yellow">🏆 TU GAGNES !</span>':(w?('🏆 '+esc(w.name)+' gagne'):'Terminé'); }

  }
}

// =================== DESSINE-MOI (manette joueur) ===================
function drawStrokesJ(ctx, W, H, strokes){
  ctx.fillStyle='#fdf6e3'; ctx.fillRect(0,0,W,H);
  ctx.lineCap='round'; ctx.lineJoin='round';
  for(const s of (strokes||[])){ const pts=s.p||[]; if(!pts.length) continue;
    ctx.strokeStyle=s.c||'#160a2e'; ctx.lineWidth=(s.w||3);
    ctx.beginPath(); ctx.moveTo(pts[0][0]*W, pts[0][1]*H);
    for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0]*W, pts[i][1]*H);
    if(pts.length===1) ctx.lineTo(pts[0][0]*W+0.1, pts[0][1]*H+0.1);
    ctx.stroke();
  }
}
function drawSendNow(){ api('/api/draw/update', { strokes: _drawStrokes }); }
function drawSendThrottled(){ if(_drawSendT) return; _drawSendT=setTimeout(()=>{ _drawSendT=null; drawSendNow(); }, 120); }

  }
}

  let whiteH = '', blackH = '', wSeen = 0;

// Surligne MES touches en rythme pendant que la BORNE joue la mélodie (démo).
let _jpDemoAt = 0, _jpRaf = 0, _jpWrongAt = 0;
function detectPianoDemo(s){
  // Le piano peut venir du Monde 3 (s.piano) OU de l'activité (s.activity).
  const p = (s && s.piano) || (s && s.activity && s.activity.type==='piano' ? s.activity : null);
  if (!p || p.myPos < 0) return;
  if (p.demo && p.demo.at && p.demo.at !== _jpDemoAt){
    _jpDemoAt = p.demo.at;
    startKeyDemoHighlight(p.demo.seq);
  }
  if (p.wrongAt && p.wrongAt !== _jpWrongAt){
    _jpWrongAt = p.wrongAt;
    flashKeysWrong();
  }
}
function startKeyDemoHighlight(seq){
  cancelAnimationFrame(_jpRaf);
  // Tempo réel : chaque note dure n.dur secondes (rythme Mario).
  const starts = []; let t = 0;
  seq.forEach(n => { starts.push(t); t += (n.dur || 0.42) * 1000; });
  const total = t, start = performance.now();
  let last = -1;
  const clearAll = () => { document.querySelectorAll('[id^="pk-"]').forEach(e=>{ e.style.boxShadow=''; e.style.filter=''; }); };
  const tick = () => {
    const el = performance.now() - start;
    if (el > total){ clearAll(); return; }
    let idx = 0; while (idx+1 < starts.length && starts[idx+1] <= el) idx++;
    if (idx !== last){
      clearAll();
      const k = document.getElementById('pk-' + (seq[idx] && seq[idx].off)); // n'existe que si la note est sur MON clavier
      if (k){ k.style.boxShadow='0 0 0 4px #ffe600,0 0 22px #ffe600'; k.style.filter='brightness(1.2)'; }
      last = idx;
    }
    _jpRaf = requestAnimationFrame(tick);
  };
  tick();
}
// Erreur d'un joueur → flash rouge de mes touches (la séquence repart de zéro).
function flashKeysWrong(){
  cancelAnimationFrame(_jpRaf);
  if (window.SFX && SFX.wrong) SFX.wrong();
  if (navigator.vibrate) navigator.vibrate(180);
  const keys = document.querySelectorAll('[id^="pk-"]');
  keys.forEach(e=>{ e.style.boxShadow='0 0 0 4px #ff2e3e,0 0 22px #ff2e3e'; e.style.filter='brightness(1.1)'; });
  setTimeout(()=> keys.forEach(e=>{ e.style.boxShadow=''; e.style.filter=''; }), 500);
}

      🔗 ${esc(s.source)}</a>`).join('');

      <div id="enqdoc-${d.id}" style="display:${_enqOpenDocs[d.id]?'block':'none'};padding:10px">

      </div>
    </div>`).join('');
  const wrong = act.lastWrong && (Date.now()-act.lastWrong < 3000)
    ? '<p class="pixel" style="font-size:11px;color:var(--danger)">✘ Code refusé — recoupez encore !</p>' : '';
  return `<div class="card glow-box">
    <div class="pill neon-pink">🕵️ ENQUÊTE — ACTE ${a.num}/${act.total}</div>
    <h2 class="neon-cyan">${esc(a.title||'')}</h2>
    <p class="muted" style="font-size:13px">📍 ${esc(a.place||'')}</p>
    <p style="font-size:15px"><b class="neon-pink">Énigme :</b> ${esc(a.riddle||'')}</p>
    ${srcLinks ? `<div style="margin-top:8px"><div class="pill neon-cyan" style="font-size:11px">🔗 ARTICLES SOURCES</div>${srcLinks}</div>` : ''}
    ${docs ? `<div class="pill neon-cyan mt">🗂️ TES DOCUMENTS — ouvre-les et lis-les à voix haute</div>${docs}
      <p class="muted" style="font-size:12px">Aucun joueur n'a tout : c'est en recoupant VOS documents que le code apparaît.</p>` : ''}
    ${frags ? `<div class="pill neon-cyan mt">🔍 TES INDICES</div>${frags}
      ${(act.myFragmentsPending>0)
        ? `<p class="muted" style="font-size:12px">🔒 Il te reste <b>${act.myFragmentsPending}</b> indice(s) à venir — le MJ les dévoile un par un. Lis ceux-ci à voix haute !</p>`
        : `<p class="muted" style="font-size:12px">Partage tes indices à voix haute : c'est en recoupant ceux de toute la table que le code apparaît.</p>`}`
      : (act.fragmentsHidden && act.myFragmentsPending>0
          ? `<div class="card center" style="border-color:var(--neon4);background:#100a02;margin-top:8px">

              <p style="font-size:13px">Le MJ les dévoilera un par un. Reste attentif·ve à la borne et à la table !</p>
            </div>`
          : (docs ? '' : `<p class="muted mt">Tu n'as pas d'indice sur cet acte — écoute les autres et aide à trouver le code. 👂</p>`))}
    ${hints ? `<div class="pill neon-pink mt" style="font-size:11px">💡 INDICES DU MJ</div>${hints}` : ''}
    ${(!act.fragmentsHidden && (act.hintsLeft||0) > 0) ? (() => {
      const rem = Math.max(0, (act.hintUnlockAt||0) - Date.now());
      if (rem > 0) {

// Vincent (ou l'hôte) demande un indice d'enquête. Verrou de 3 min géré côté serveur.
function heroEnqueteHint(){
  api('/api/gm/hero', { action:'enqueteHint' }).then(r=>{
    const m = document.getElementById('enqHintMsg');
    if (m && r && r.reason === 'locked') m.innerHTML = `<span style="color:var(--danger)">⏳ Indices dispo dans ${Math.ceil((r.remaining||0)/1000)}s</span>`;
    poll();
  });
}
// Minuterie : met à jour le bouton « Donner un indice » (compte à rebours 3 min).
function updateEnqHintBtn(){
  const btn = document.getElementById('enqHintBtn');
  if (!btn || !STATE || !STATE.activity || STATE.activity.type!=='enquete') return;
  const a = STATE.activity;
  const remaining = Math.max(0, (a.hintUnlockAt||0) - Date.now());
  const left = a.hintsLeft || 0;
  if (left <= 0){ btn.disabled = true; btn.textContent = '✔ Tous les indices donnés'; return; }
  if (remaining > 0){
    btn.disabled = true;
    const s = Math.ceil(remaining/1000);
    const mm = Math.floor(s/60), ss = String(s%60).padStart(2,'0');
    btn.textContent = `⏳ Indice dispo dans ${mm}:${ss}`;
  } else {
    btn.disabled = false;
    btn.textContent = '💡 Donner un indice';
  }
}

      alert(`⏳ Indice disponible dans ${m}:${String(s%60).padStart(2,'0')}`);

function enqueteCode(){

      : `<span class="pixel" style="font-size:10px;color:var(--danger)">${esc(r.reason||'NON')}</span>`;

}

function quizController(act) {
  const letters = ['A','B','C','D','E'];
  const title = act.type==='blindtest' ? '🎵 BLIND-TEST' : act.type==='quiz_vincent' ? '🎭 QUIZ VINCENT' : '❓ QUIZ';
  // Fin de manche blind-test : classement + perdant
  if (act.sub === 'final') {
    const board = act.finalBoard || [];
    const losers = act.loserNames || [];
    const winners = act.winnerNames || [];
    const iLost = losers.length && board.some(b=>b.id===STATE.me.id && losers.includes(b.name));
    return `<div class="card glow-box">
      <div class="pill neon-yellow">🏁 BLIND-TEST TERMINÉ</div>
      ${winners.length ? `<p class="center neon-cyan mt">🏆 Vainqueur : ${winners.map(esc).join(' & ')}</p>` : ''}
      <div class="leaderboard mt">
        ${board.map((p,i)=>`<div>${['🥇','🥈','🥉'][i]||(i+1+'.')} ${esc(p.name)} <span class="coins">${p.pts} pts</span></div>`).join('')}
      </div>
      ${losers.length
        ? `<p class="center mt ${iLost?'neon-pink':''}">💔 ${losers.map(esc).join(', ')} perd une vie${iLost?' (toi !)':''}</p>`
        : `<p class="center muted mt">Égalité — personne ne perd de vie.</p>`}
    </div>`;
  }
  const reveal = act.sub === 'reveal';
  const free = act.freeAnswer;
  const my = free ? act.myAnswerText : act.myAnswer;
  const myAnswerSet = free ? (my && my.length > 0) : (my !== null);

  let inputHtml = '';
  let status = '';
  if (free) {
    if (reveal) {
      const good = myAnswerSet; // le serveur détermine si c'est correct ; ici on le voit dans act
      const correctText = act.correctAnswerText || '';
      status = !myAnswerSet ? '<p class="muted">Pas de réponse… 😬</p>'
        : '<p class="neon-cyan pixel" style="font-size:12px">✔ Réponse envoyée !</p>';
      // Montrer la réponse correcte et ce que le joueur a tapé
      inputHtml = `<div style="margin:12px 0;background:#f8f9fb;border-radius:9px;padding:16px;color:#1f2430">
        <p style="margin:0 0 4px;font-size:13px;color:#666">Ta réponse :</p>
        <p style="margin:0 0 12px;font-size:18px;font-weight:700">${esc(my || '—')}</p>
        <p style="margin:0 0 4px;font-size:13px;color:#666">Bonne réponse :</p>
        <p style="margin:0;font-size:18px;font-weight:700;color:#059669">${esc(correctText)}</p>
      </div>`;
    } else if (myAnswerSet) {
      status = '<p class="neon-cyan">Réponse enregistrée. Regarde la BORNE…</p>';
      inputHtml = `<div style="margin:12px 0;background:#f8f9fb;border-radius:9px;padding:16px;color:#1f2430">
        <p style="margin:0 0 4px;font-size:13px;color:#666">Ta réponse :</p>
        <p style="margin:0;font-size:18px;font-weight:700">${esc(my)}</p>
      </div>`;
    } else {
      status = '<p>Question ' + (act.qIndex+1) + '/' + act.total + ' — tape ta réponse !</p>';
      inputHtml = `<div style="display:flex;gap:8px;margin-top:12px">
        <input type="text" id="freeAnswerInput" placeholder="Tape ta réponse…" autocomplete="off"
          style="flex:1;padding:12px;border-radius:10px;border:2px solid #3b6ef5;background:#fff;color:#1f2430;font-size:16px;outline:none"
          onkeydown="if(event.key==='Enter'){document.getElementById('freeAnswerBtn').click()}">
        <button id="freeAnswerBtn" class="btn" onclick="answerFree()" style="white-space:nowrap">✅ OK</button>
      </div>`;
    }
  } else {
    const choices = (act.choices||[]).map((c,i)=>{
      let cls = 'btn';
      if (reveal) {
        if (i === act.answer) cls = 'btn secondary';
        else if (i === my) cls = 'btn danger';
        else cls = 'btn';
      } else if (i === my) {
        cls = 'btn warn';
      }
      const dis = (reveal || my!==null) ? 'disabled' : '';
      return `<button class="${cls}" ${dis} onclick="answer(${i},this)">${letters[i]}. ${esc(c)}</button>`;
    }).join('');

    if (reveal) {
      const good = my !== null && my === act.answer;
      status = my===null ? '<p class="muted">Pas de réponse… 😬</p>'
        : good ? '<p class="neon-cyan pixel" style="font-size:12px">✔ BONNE RÉPONSE !</p>'
               : '<p class="pixel" style="font-size:11px;color:var(--danger)">✘ Raté !</p>';
    } else if (my !== null) {
      status = '<p class="neon-cyan">Réponse enregistrée. Regarde la BORNE…</p>';
    } else {
      status = '<p>Question ' + (act.qIndex+1) + '/' + act.total + ' — réponds vite !</p>';
    }
    inputHtml = `<div>${choices}</div>`;
  }

  const joueurPhoto = act.photo ? (`<img src="${esc(act.photo)}" style="width:140px;height:140px;object-fit:cover;border-radius:10px;border:2px solid #fff3;margin:8px auto;display:block">`) : ``;
  const btHint = (act.type === "blindtest" && !reveal)
    ? (!STATE.hasBorne && STATE.isGM ? `<p class="muted">🔊 L'extrait joue sur ce téléphone (connecte une enceinte Bluetooth).</p>`
       : !STATE.hasBorne ? `<p class="muted">🔊 Écoute l'extrait joué sur le téléphone du GM.</p>`
       : `<p class="muted">🔊 Écoute l'extrait joué sur la BORNE.</p>`)
    : ``;
  return `<div class="card glow-box">
    <div class="pill neon-cyan">${title} — Q${act.qIndex+1}/${act.total}</div>
    ${joueurPhoto}
    <h2 class="neon-pink">${esc(act.prompt)}</h2>
    ${btHint}
    ${inputHtml}
    <div class="center mt">${status}</div>
  </div>`;
}

function photoVoteView(me) {
  const challenges = STATE.photoChallenges || [];

  if (!allPhotos.length) return `<div class="card center"><div class="pill neon-yellow">📸 VOTE PHOTO</div><p>Pas encore de photos à voter…</p></div>`;
  const blocks = challenges.map((ch, idx) => {

    if (!photos.length) {

// --- Relance photo : 1 h après le début de la fête, si des photos manquent ---
let _photoRemindSnoozeUntil = 0;
function checkPhotoReminder(s) {
  const photoOn = !!(window.__EVENT__ && window.__EVENT__.activities && window.__EVENT__.activities.photo);
  const me = s && s.me;
  const started = s && s.partyStartAt;
  const box = document.getElementById('photoRemind');
  // Conditions pour montrer la relance
  const missions = (me && me.photoMissions) || [];
  const done = (me && me.myPhotos) || [];
  const missing = missions.length - done.length;
  const inVote = s && (s.photoPhase === 'vote' || s.photoPhase === 'results');
  const remindMs = ((s && s.photoRemindMinutes != null) ? s.photoRemindMinutes : 60) * 60000; // 0 = désactivée
  const due = photoOn && me && started && remindMs > 0 && !inVote && missing > 0 && (Date.now() - started >= remindMs) && Date.now() >= _photoRemindSnoozeUntil;
  if (!due) { if (box) box.remove(); return; }
  if (box) return; // déjà affichée
  const el = document.createElement('div');
  el.id = 'photoRemind';
  el.style.cssText = 'position:fixed;left:50%;bottom:16px;transform:translateX(-50%);z-index:9999;max-width:420px;width:calc(100% - 24px);background:linear-gradient(90deg,#7c2d12,#9d174d);color:#fff;border:1px solid #ffb020;border-radius:14px;padding:12px 14px;box-shadow:0 10px 30px rgba(0,0,0,.5);font-size:14px';
  el.innerHTML = `<div style="display:flex;align-items:flex-start;gap:10px">
      <div style="font-size:26px;line-height:1">📸</div>
      <div style="flex:1">
        <b>Il te reste ${missing} défi${missing > 1 ? 's' : ''} photo !</b>
        <div style="font-size:12.5px;opacity:.9;margin-top:2px">La fête bat son plein — pense à prendre tes photos avant le vote. 😉</div>
        <div style="margin-top:8px;display:flex;gap:8px">
          <button class="btn" style="font-size:12px;padding:8px 12px" onclick="document.getElementById('photoRemind')?.remove();document.querySelector('#photo-btn-'+(${done.length}))?.scrollIntoView({block:'center'})">📸 J'y vais</button>
          <button class="btn secondary" style="font-size:12px;padding:8px 12px" onclick="_photoRemindSnoozeUntil=Date.now()+20*60000;document.getElementById('photoRemind')?.remove()">Plus tard</button>
        </div>
      </div>
    </div>`;
  document.body.appendChild(el);
}

// BOUCHE-TROU !? — sélection locale de cartes + envoi.
let cartonSel = [];
let _cartonRound = -1;
function cartonToggle(i, blanks, btn){
  const pos = cartonSel.indexOf(i);
  if (pos >= 0) cartonSel.splice(pos, 1);
  else { if (cartonSel.length >= blanks) cartonSel.shift(); cartonSel.push(i); }
  if (blanks === 1 && cartonSel.length === 1){ cartonSubmit(btn); return; }
  render();
}
function cartonSubmit(btn){
  if (!cartonSel.length) return;

// Remplit les trous : question sobre, RÉPONSE mise en couleur (jaune).
function cartonFillHtml(prompt, cards){
  let i = 0;
  const hi = (c)=>`<span class="neon-yellow" style="font-weight:800">« ${esc(c)} »</span>`;
  let html = esc(prompt||'').replace(/___/g, ()=>{ const c=(cards&&cards[i]!=null)?cards[i]:'___'; i++; return hi(c); });
  if (i===0 && cards && cards.length) html = esc(prompt||'') + ' → ' + hi(cards.join(' + '));
  return html;
}

// SANS FILTRE !? — manette du joueur : réponse secrète puis pari.
function privacyController(act){
  const head = `<div class="pill ${act.level==='trash'?'neon-pink':'neon-cyan'}">🤫 SANS FILTRE !? · ${esc(act.levelLabel||'')} · ${act.asked}/${act.total}</div>`;
  // Phase 1 : réponse SECRÈTE
  if (act.sub === 'answer') {
    const mine = act.myAnswered;
    return `<div class="card center glow-box">
      ${head}
      <p class="big" style="margin:14px 0">${esc(act.prompt||'')}</p>
      <p class="muted">Réponse 100% SECRÈTE — personne ne saura jamais qui a dit quoi.</p>
      <div class="row">
        <button class="btn ${mine && act.myAnswer===true?'secondary':''}" onclick="privacyAnswer(true,this)">OUI 😏</button>
        <button class="btn ${mine && act.myAnswer===false?'secondary':''}" onclick="privacyAnswer(false,this)">NON 😇</button>
      </div>
      ${mine?'<p class="neon-cyan mt">Réponse enregistrée ✔ (modifiable tant que tout le monde n\'a pas répondu)</p>':''}
      <p class="muted mt">${act.answeredCount}/${act.playerCount} ont répondu…</p>
    </div>`;
  }
  // Phase 2 : pari sur le nombre de OUI
  if (act.sub === 'guess') {
    const btns = [];
    for (let i = 0; i <= (act.maxGuess||0); i++) {
      const sel = act.myGuess === i;
      btns.push(`<button class="btn ${sel?'secondary':''}" style="min-width:64px;flex:0 1 auto" onclick="privacyGuess(${i},this)">${i}</button>`);
    }
    return `<div class="card center glow-box">
      ${head}
      <p style="margin:10px 0"><i>${esc(act.prompt||'')}</i></p>
      <h2 class="neon-yellow">Combien ont répondu OUI ?</h2>
      <div class="row" style="justify-content:center;flex-wrap:wrap;gap:8px">${btns.join('')}</div>
      ${act.myGuess!=null?'<p class="neon-cyan mt">Pari enregistré ✔ (modifiable)</p>':''}
      <p class="muted mt">Pari exact = 3 pts + 1 pièce · à ±1 = 1 pt</p>
      <p class="muted">${act.guessedCount}/${act.playerCount} ont parié…</p>
    </div>`;
  }
  // Phase 3 : révélation
  if (act.sub === 'reveal') {
    const me = (act.roundResults||[]).find(r=>r.id===STATE.me.id);
    return `<div class="card center glow-box" style="border-color:var(--neon3)">
      ${head}
      <p style="margin:10px 0"><i>${esc(act.prompt||'')}</i></p>
      <h2 class="neon-pink">${act.yesCount} OUI ${act.yesCount>1?'':''} sur ${act.maxGuess}</h2>
      ${me ? `<p class="big">${me.exact?'🎯 PARI EXACT ! +3 pts +1 🪙':(me.gain?'👌 À une unité près : +1 pt':'❌ Raté — ton pari : '+me.guess)}</p>` : '<p class="muted">Tu n\'avais pas parié.</p>'}
      <p class="muted">Regarde la BORNE pour le détail 📺</p>
    </div>`;
  }
  // Fin de partie
  if (act.sub === 'final') {
    const board = act.finalBoard || [];
    const myRank = board.findIndex(b=>b.id===STATE.me.id);
    return `<div class="card center glow-box" style="border-color:var(--neon3)">
      ${head}
      <h2 class="neon-yellow">🏁 TERMINÉ !</h2>
      ${myRank>=0?`<p class="big">Tu finis ${myRank===0?'🥇 PREMIER(E)':myRank+1+'ᵉ'} avec ${board[myRank].pts} pts</p>`:''}
      <p class="muted">Classement complet sur la BORNE 📺</p>
    </div>`;
  }
  return `<div class="card center"><h2>🤫 SANS FILTRE !?</h2><p>Regarde la BORNE.</p></div>`;
}

// BOUCHE-TROU !? — manette du joueur : joue une carte de ta main ; si tu es
// l'arbitre, choisis la plus drôle.
function cartonController(act){
  // Réinitialise la sélection quand la manche change.
  if (act.round !== _cartonRound){ _cartonRound = act.round; cartonSel = []; }
  const adulte = act.level==='adulte';
  const head = `<div class="pill ${adulte?'neon-pink':'neon-cyan'}">🃏 BOUCHE-TROU !? · ${esc(act.levelLabel||'')} · manche ${act.round}/${act.totalRounds}</div>`;
  const promptHtml = `<p class="big" style="margin:12px 0">${esc(act.prompt||'')}</p>`;

  // ---- Fin de partie ----
  if (act.sub==='final'){
    const board = act.finalBoard||[];
    const myRank = board.findIndex(b=>b.id===STATE.me.id);
    return `<div class="card center glow-box" style="border-color:var(--neon3)">
      ${head}
      <h2 class="neon-yellow">🏁 TERMINÉ !</h2>
      ${myRank>=0?`<p class="big">Tu finis ${myRank===0?'🥇 PREMIER(E)':(myRank+1)+'ᵉ'} avec ${board[myRank].pts} pt(s)</p>`:''}
      <p class="muted">Classement complet sur la BORNE 📺</p>
    </div>`;
  }

  // ---- Je suis l'ARBITRE ----
  if (act.iAmJudge){
    if (act.sub==='judge'){
      const subs = act.submissions||[];
      const btns = subs.map(s=>`<button class="btn" style="text-align:left;white-space:normal;height:auto;padding:12px 14px;margin:6px 0" onclick="cartonPick(${s.i},this)">${cartonFillHtml(act.prompt, s.cards)}</button>`).join('');
      return `<div class="card center glow-box" style="border-color:var(--neon3)">
        ${head}
        <div class="pill neon-yellow">👑 TU ES L'ARBITRE</div>
        ${promptHtml}
        <p class="muted">Choisis la réponse la plus drôle :</p>
        <div style="display:flex;flex-direction:column;gap:2px">${btns||'<p class="muted">Aucune carte.</p>'}</div>
      </div>`;
    }
    if (act.sub==='reveal'){
      return `<div class="card center glow-box" style="border-color:var(--neon3)">
        ${head}
        <div class="pill neon-yellow">👑 TU ES L'ARBITRE</div>
        <h2 class="neon-cyan">🏆 ${esc(act.winnerName||'')}</h2>
        <p class="big">${cartonFillHtml(act.prompt, act.winningCards)}</p>
        <p class="muted">Manche suivante dans un instant… 📺</p>
      </div>`;
    }
    // pick : l'arbitre attend
    return `<div class="card center glow-box">
      ${head}
      <div class="pill neon-yellow">👑 TU ES L'ARBITRE</div>
      ${promptHtml}
      <p class="neon-cyan blink">En attente des cartes des joueurs… 📱</p>
      <p class="muted mt">${act.submittedCount}/${act.neededCount} ont joué</p>
    </div>`;
  }

  // ---- Je suis un JOUEUR ----
  if (act.sub==='reveal'){
    const iWon = act.leaderboard && act.winnerName && STATE.me && (act.winnerName===STATE.me.name);
    return `<div class="card center glow-box" style="border-color:var(--neon3)">
      ${head}
      <h2 class="neon-pink">🏆 ${esc(act.winnerName||'')} gagne la manche</h2>
      <p class="big">${cartonFillHtml(act.prompt, act.winningCards)}</p>
      ${iWon?'<p class="big neon-yellow">C\'est TOI ! +1 pt +1 🪙 🎉</p>':''}
      <p class="muted">Regarde la BORNE 📺</p>
    </div>`;
  }
  if (act.sub==='judge'){
    const mine = act.mySubmission ? act.mySubmission.map(c=>'« '+esc(c)+' »').join(' + ') : null;
    return `<div class="card center glow-box">
      ${head}
      ${promptHtml}
      <p class="neon-cyan blink">👑 ${esc(act.judgeName||'')} choisit la meilleure carte…</p>
      ${mine?`<p class="muted mt">Ta carte : <b>${mine}</b></p>`:'<p class="muted mt">Tu n\'as pas joué cette manche.</p>'}
    </div>`;
  }
  // pick : je choisis ma carte
  if (act.mySubmitted){
    const mine = act.mySubmission ? act.mySubmission.map(c=>'« '+esc(c)+' »').join(' + ') : '';
    return `<div class="card center glow-box">
      ${head}
      ${promptHtml}
      <p class="neon-cyan">Carte jouée ✔</p>
      <p class="big">${mine}</p>
      <p class="muted mt">En attente des autres… ${act.submittedCount}/${act.neededCount}</p>
    </div>`;
  }
  const hand = act.myHand||[];
  if (!hand.length){
    return `<div class="card center glow-box">
      ${head}
      ${promptHtml}
      <p class="muted">Tu rejoins à la prochaine manche — regarde la BORNE 📺</p>
    </div>`;
  }
  const blanks = act.blanks||1;
  const cards = hand.map(c=>{
    const sel = cartonSel.includes(c.i);
    const badge = sel && blanks>1 ? `<span class="neon-yellow">${cartonSel.indexOf(c.i)+1}. </span>` : '';
    return `<button class="btn ${sel?'secondary':''}" style="text-align:left;white-space:normal;height:auto;padding:12px 14px;margin:6px 0" onclick="cartonToggle(${c.i},${blanks},this)">${badge}${esc(c.text)}</button>`;
  }).join('');
  const validate = blanks>1
    ? `<button class="btn ${cartonSel.length===blanks?'':'ghost'}" ${cartonSel.length===blanks?'':'disabled'} onclick="cartonSubmit(this)">✅ Jouer ${cartonSel.length}/${blanks}</button>`
    : '';
  return `<div class="card center glow-box">
    ${head}
    <div class="pill neon-yellow">👤 Arbitre : ${esc(act.judgeName||'')}</div>
    ${promptHtml}
    <p class="muted">${blanks>1?`Choisis ${blanks} cartes (dans l'ordre) :`:'Choisis ta carte la plus drôle :'}</p>
    <div style="display:flex;flex-direction:column;gap:2px">${cards}</div>
    ${validate}
  </div>`;
}
