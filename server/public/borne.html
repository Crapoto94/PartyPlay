<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PartyPlay — Borne</title>
<meta name="robots" content="noindex, nofollow">
<meta property="og:title" content="Borne PartyPlay — Écran partagé">
<meta property="og:type" content="website">
<meta property="og:site_name" content="PartyPlay">
<meta name="twitter:card" content="summary">
<script src="/static/sound.js"></script>
<script src="/static/fullscreen.js"></script>
<script src="/static/pacman-render.js"></script>
<script src="/static/ttcq-board.js"></script>
<script src="https://www.youtube.com/iframe_api"></script>
<style>
  #soundhint { position: fixed; top: 8px; left: 8px; z-index: 100000; cursor: pointer;
    background: rgba(3,1,10,.7); color: var(--neon3); border: 2px solid var(--neon3);
    border-radius: 8px; padding: 8px 12px; font-size: 12px; }
  /* iPad 4:3 — la borne tient TOUJOURS dans l'écran, sans scroll */
  html, body { height: 100%; }
  body { font-size: 26px; overflow: hidden; }
  .stage { max-width: 1100px; margin: 0 auto; padding: 14px 18px; box-sizing: border-box;
           height: calc(100vh - 46px); display: flex; flex-direction: column;
           justify-content: center; overflow: hidden; }
  .stage > * { max-height: 100%; }
  .big { font-size: clamp(26px, 4.2vh, 50px); }
  .huge { font-size: clamp(40px, 9vh, 88px); }
  /* tailles fluides en hauteur pour les blocs denses (quiz, classements) */
  .leaderboard { max-height: 46vh; overflow: auto; }
  .ticker { position: fixed; bottom: 0; left: 0; right: 0; background:#000; border-top:3px solid var(--neon);
            white-space: nowrap; overflow: hidden; }
  .ticker span { display: inline-block; padding: 10px 0; font-family: var(--pixel); font-size: 16px;
            color: var(--neon3); animation: scroll 60s linear infinite; }
  @keyframes scroll { from { transform: translateX(100%);} to { transform: translateX(-100%);} }
  @keyframes spin { from { transform: rotate(0);} to { transform: rotate(360deg);} }
  .leaderboard div { font-size: clamp(16px, 2.6vh, 28px); padding: clamp(3px,0.7vh,8px); border-bottom: 1px solid #fff2; }
  .hpbar { height: 34px; background:#300; border:3px solid #000; border-radius:6px; overflow:hidden; }
  .hpbar > div { height:100%; background:linear-gradient(90deg,var(--danger),var(--neon3)); transition:width .3s; }
  .wheel { font-size: 70px; }
  .qchoice { font-size: clamp(18px, 2.9vh, 30px); padding: clamp(6px,1.1vh,14px) 18px; margin: clamp(5px,1vh,10px) 0;
             border:3px solid #fff3; border-radius:10px; box-shadow:0 4px 0 #0008; }
  .padgrid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; max-width:360px;
             margin:16px auto; }
  .pad { aspect-ratio:1; border-radius:14px; border:5px solid #000; cursor:pointer;
         box-shadow:0 6px 0 #0009; transition:filter .1s, transform .05s; filter:brightness(.45); }
  .pad.lit { filter:brightness(1.6); }
  .pad:active { transform:translateY(4px); }
  .pad0{background:#ff2e88} .pad1{background:#2effd5} .pad2{background:#7a5cff}
  .pad3{background:#ffe600} .pad4{background:#3c9cff} .pad5{background:#ff6b3c}
</style>
</head>
<body class="scanlines">
<div id="yt-amb"   style="position:fixed;width:1px;height:1px;top:-9px;left:-9px"></div>
<div id="yt-brief" style="position:fixed;width:1px;height:1px;top:-9px;left:-9px"></div>
<div id="yt-enq"     style="position:fixed;width:1px;height:1px;top:-9px;left:-9px"></div>
<div id="yt-debrief" style="position:fixed;width:1px;height:1px;top:-9px;left:-9px"></div>
<div id="yt-bt"    style="position:fixed;width:1px;height:1px;top:-9px;left:-9px"></div>
<div id="yt-pac"       style="position:fixed;width:1px;height:1px;top:-9px;left:-9px"></div>
<div id="yt-pac-intro" style="position:fixed;width:1px;height:1px;top:-9px;left:-9px"></div>
<div id="soundhint" class="pixel">🔊 Activer le son</div>
<div class="stage" id="stage"><div class="center huge pixel blink">INSERT COIN</div></div>
<div class="ticker"><span id="ticker">PartyPlay</span></div>

<script>
const stage = document.getElementById('stage');
const tickerEl = document.getElementById('ticker');
const EVENT = window.__EVENT__ || {};
const API = '/e/' + EVENT.id;            // base event-scopée pour toutes les requêtes
let STATE = null;

let lastSse = 0;
let _lastBorneJson = null;
function applyState(s){
  STATE = s; detectSounds(STATE); checkBorneEnqHint(STATE); detectMusic(STATE); detectPiano(STATE); syncYT(STATE); syncBlindtest(STATE);
  // On ne reconstruit le DOM que si l'état a changé (évite le clignotement à chaque poll).
  const j = JSON.stringify(s);
  if (j !== _lastBorneJson) { _lastBorneJson = j; render(); }
}
const es = new EventSource(API + '/events');
es.onmessage = (e) => { lastSse = Date.now(); applyState(JSON.parse(e.data)); };
function pollBorne(){ fetch(API + '/api/state').then(r=>r.json()).then(applyState).catch(()=>{}); }
pollBorne();
setInterval(() => { if (Date.now() - lastSse > 1500) pollBorne(); }, 1000);
function esc(s){ return String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

// --- Activation du son au 1er clic n'importe où (obligatoire sur navigateur) ---
let SOUND_ON = false;
function enableSound(){
  if (SOUND_ON) return;
  if (window.SFX) { SFX.unlock(); SFX.coin(); if (SFX.pacPreload) SFX.pacPreload(); }
  SOUND_ON = true;
  const h = document.getElementById('soundhint'); if (h) h.style.display = 'none';
  if (ytAmb) { try { ytAmb.unMute(); } catch(_){} } // déjà en train de jouer, on retire juste le mute
  else initYT(); // API pas encore prête, on démarre normalement
  if (ytBrief) { try { ytBrief.unMute(); } catch(_){} }
  if (ytEnq) { try { ytEnq.unMute(); } catch(_){} }
  if (dzAudio) { try { dzAudio.muted = false; dzAudio.play().catch(()=>{}); } catch(_){} } // extrait Deezer en cours
}
document.getElementById('soundhint').addEventListener('click', enableSound);
['click','touchstart','keydown'].forEach(ev => document.addEventListener(ev, enableSound, { once: false }));

// --- Ting enquête (borne) ---
let _borneEnqCount = -1, _borneCtx = null;
function _getBorneCtx(){
  if (!_borneCtx && SOUND_ON) try { _borneCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(_){}
  if (_borneCtx && _borneCtx.state === 'suspended') _borneCtx.resume().catch(()=>{});
  return _borneCtx;
}
function borneTing(){
  if (!SOUND_ON) return;
  try {
    const ctx = _getBorneCtx(); if (!ctx) return;
    const osc = ctx.createOscillator(); const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(1047, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1568, ctx.currentTime + 0.04);
    gain.gain.setValueAtTime(0.6, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.4);
    osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 1.4);
  } catch(_){}
}
function checkBorneEnqHint(s){
  const a = s && s.activity;
  if (!a || a.type !== 'enquete'){ _borneEnqCount = -1; return; }
  const eq = a.enquete;
  if (!eq){ _borneEnqCount = -1; return; }
  const cur = (eq.hintsRevealedCount || 0);
  if (_borneEnqCount >= 0 && cur > _borneEnqCount) borneTing();
  _borneEnqCount = cur;
}

// --- Déclenche les bruitages sur les transitions d'état ---
let _p = { phase: null, world: null, gageId: null, act: null, sub: null };
function detectSounds(s){
  if (!SOUND_ON || !window.SFX) return;
  const w = s.world ? s.world.num : null;
  const act = s.activity ? s.activity.type : null;
  const sub = s.activity ? s.activity.sub : null;
  const gageId = s.currentGage ? (s.currentGage.id + '-' + (s.currentGage.at || '')) : null;
  if (_p.phase === null) { _p = { phase: s.phase, world: w, gageId, act, sub }; return; }
  try {
    if (s.phase === 'win' && _p.phase !== 'win') SFX.win();
    else if (s.phase === 'world' && _p.phase === 'lobby') SFX.start();
    else if (w && w !== _p.world) { (s.world && s.world.isTwist) ? SFX.twist() : SFX.level(); }
    if (s.phase === 'vote' && _p.phase !== 'vote') SFX.vote();
    if (act && act !== _p.act) SFX.start();
    if ((act === 'quiz' || act === 'blindtest') && sub === 'reveal' && _p.sub !== 'reveal') SFX.correct();
    if (gageId && gageId !== _p.gageId) SFX.gage();
  } catch (_) {}
  _p = { phase: s.phase, world: w, gageId, act, sub };
}

let kidsKey = null;
let pacKey = null;
let tronKey = null;
let pongKey = null;
let drawKey = null;
let pacEventSeen = 0;
let briefKey = null, briefTimer = null, briefSlides = null, briefIdx = 0;
let winBuilt = false, ytWin = null, winPhotoTriggered = false;
let privacyCountTimer = null; // décompte visible d'auto-passage « Sans Filtre »
function buildWinVideo(){
  const el = document.getElementById('win-video-player');
  if (!el) return;
  try { document.documentElement.requestFullscreen(); } catch(_){}
  // Coupe tout le son de fond — la vidéo anniversaire prend la main.
  try { if (ytAmb){ytAmb.pauseVideo();ytAmb.mute();} if (ytBrief){ytBrief.pauseVideo();ytBrief.mute();} if (ytEnq){ytEnq.pauseVideo();ytEnq.mute();} if (ytBt){ytBt.pauseVideo();ytBt.mute();} if (ytPac){ytPac.pauseVideo();ytPac.mute();} } catch(_){}
  if (window.YT && YT.Player){
    ytWin = new YT.Player('win-video-player', {
      height:'100%', width:'100%', videoId:'6EEGmdH9Vu0',
      playerVars:{ autoplay:1, controls:1, playsinline:1, rel:0, modestbranding:1, fs:1 },
      events:{
        onReady(e){ try{ e.target.unMute(); e.target.setVolume(100); e.target.playVideo(); }catch(_){} },
        // À la FIN de la vidéo finale : « c'est pas fini » puis vote des photos.
        onStateChange(e){ if (e.data === YT.PlayerState.ENDED) winVideoEnded(); }
      }
    });
  } else {
    el.outerHTML = `<iframe width="100%" height="100%" style="border:0"
      src="https://www.youtube.com/embed/6EEGmdH9Vu0?autoplay=1&playsinline=1&rel=0"
      allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>`;
  }
}
// Après la vidéo finale : message « c'est pas fini » → ouverture du vote photo.
function winVideoEnded(){
  if (winPhotoTriggered) return;
  winPhotoTriggered = true;
  try { if (ytWin){ ytWin.destroy(); ytWin = null; } } catch(_){ ytWin = null; }
  try { if (document.fullscreenElement) document.exitFullscreen(); } catch(_){}
  stage.innerHTML = `<div class="center glow-box" style="min-height:60vh;display:flex;flex-direction:column;justify-content:center">
    <h1 class="huge neon-pink blink">⚠️ ATTENTION, C'EST PAS FINI !</h1>
    <p class="big neon-yellow">Nous devons voter pour les PHOTOS 📸</p>
  </div>`;
  tickerEl.textContent = "⚠️ C'EST PAS FINI — place au vote des photos !";
  // Laisse le message à l'écran quelques secondes, puis ouvre le vote photo.
  setTimeout(()=>{
    try { fetch(API + '/api/photo/openvote', { method:'POST', headers:{'Content-Type':'application/json'}, body:'{}' }); } catch(_){}
  }, 6000);
}
function render(){
  if(!STATE) return;
  // Décompte d'auto-passage « Sans Filtre » : on l'arrête à chaque rendu ;
  // il n'est relancé que si l'on est en phase de révélation (voir plus bas).
  if (privacyCountTimer){ clearInterval(privacyCountTimer); privacyCountTimer = null; }
  // Victoire (fin du Monde 6) : lecteur vidéo PLEIN ÉCRAN, construit UNE SEULE FOIS.
  // On laisse toutefois passer le rendu si un vote photo est ouvert (après la vidéo).
  if (STATE.phase === 'win'){ if (winBuilt && !STATE.photoPhase) return; }
  else if (winBuilt){
    winBuilt = false; winPhotoTriggered = false;
    try { if (ytWin){ ytWin.destroy(); ytWin = null; } } catch(_){ ytWin = null; }
    try { if (document.fullscreenElement) document.exitFullscreen(); } catch(_){}
  }
  // --- Vidéo-INDICE demandée par un joueur : overlay borne (construit UNE fois) ---
  if (STATE.hintVideo){ renderHintVideo(STATE.hintVideo); return; }
  if (hintKey){ hintKey = null; destroyHintPlayer(); }
  // Nettoyage du briefing si on en sort
  if (briefTimer && !(STATE.activity && STATE.activity.type==='briefing')){
    clearInterval(briefTimer); briefTimer = null; briefKey = null;
  }
  // Nettoyage du diaporama d'enquête si on n'est plus dans sa phase « briefing »
  if (enqBriefIv && !(STATE.activity && STATE.activity.type==='enquete' && STATE.activity.sub==='briefing')){
    clearInterval(enqBriefIv); enqBriefIv = null; enqBriefKey = null;
  }
  // --- BRIEFING : déroulé scénario + attendus par joueur ---
  if (STATE.phase==='activity' && STATE.activity && STATE.activity.type==='briefing'){
    setupBriefing(); return;
  }
  // --- PAC-MAN : prend le contrôle de la borne ---
  if (STATE.phase==='activity' && STATE.activity && STATE.activity.type==='pacman' && STATE.pacman){
    renderPacmanBorne(); return;
  }
  pacKey = null;
  // --- TETRIS : les 2 meilleurs encore en vie ---
  if (STATE.phase==='activity' && STATE.activity && STATE.activity.type==='tetris' && STATE.tetris){
    renderTetrisBorne(); return;
  }
  // --- TRON : arène centrale ---
  if (STATE.phase==='activity' && STATE.activity && STATE.activity.type==='tron' && STATE.tron){
    renderTronBorne(); return;
  }
  tronKey = null;
  // --- 2048 : les 2 meilleurs ---
  if (STATE.phase==='activity' && STATE.activity && STATE.activity.type==='2048' && STATE.g2048){
    render2048Borne(); return;
  }
  // --- PONG : arène centrale ---
  if (STATE.phase==='activity' && STATE.activity && STATE.activity.type==='pong' && STATE.pong){
    renderPongBorne(); return;
  }
  pongKey = null;
  // --- DESSINE-MOI : le dessin en direct ---
  if (STATE.phase==='activity' && STATE.activity && STATE.activity.type==='draw'){
    renderDrawBorne(); return;
  }
  drawKey = null;
  // --- Séquence musicale ---
  if (STATE.phase==='activity' && STATE.activity && STATE.activity.type==='music_seq'){
    renderMusicBorne(STATE.activity); return;
  }
  if (STATE.phase==='activity' && STATE.activity && STATE.activity.type==='piano'){
    renderPianoBorne(STATE.activity); return;
  }
  // --- Enquête collaborative (Cold Case Saint-Maur) ---
  if (STATE.phase==='activity' && STATE.activity && STATE.activity.type==='enquete'){
    renderEnqueteBorne(STATE.activity); return;
  }

  // --- Anecdote « BREAKING NEWS » : diffusion vidéo (YouTube ou upload) ---
  if (STATE.phase==='activity' && STATE.activity && STATE.activity.type==='anecdote'){
    renderAnecdoteBorne(STATE.activity); return;
  }
  if (anecKey){ anecKey = null; destroyAnec(); document.body.classList.add('scanlines'); }
  // --- Hero-quiz (Anecdote 3) : vidéo puis Vincent devine, puis BRAVO VINCENT ---
  if (STATE.phase==='activity' && STATE.activity && STATE.activity.type==='heroquiz'){
    renderHeroQuiz(STATE.activity); return;
  }
  if (hqKey){ hqKey = null; destroyHeroQuiz(); }
  // --- Diffusion vidéo (danse des canards, anecdotes…) ---
  if (STATE.phase==='activity' && STATE.activity && STATE.activity.type==='videoshow'){
    renderVideoBorne(STATE.activity); return;
  }
  if (videoKey){ videoKey = null; destroyShowPlayer(); document.body.classList.add('scanlines'); } // on a quitté : coupe le son + rétablit l'effet CRT
  // --- Mosaïque de téléphones ---
  if (STATE.phase==='activity' && STATE.activity && STATE.activity.type==='mosaic'){
    const a = STATE.activity;
    const q = (a.rows||1) > 1;
    if (a.solved){
      stage.innerHTML = `<div class="center glow-box">
        <h1 class="huge neon-cyan pixel">✅ RÉSOLU !</h1>
        <p class="big">Mot reconstitué :</p>
        <div class="huge pixel neon-yellow" style="letter-spacing:8px">${esc(a.answer||'')}</div>
        ${a.solvedBy?`<p class="big neon-cyan">Trouvé par ${esc(a.solvedBy)} 🎉</p>`:''}
      </div>`;
      tickerEl.textContent = 'MOSAÏQUE — résolue !';
      return;
    }
    if (a.failed){
      stage.innerHTML = `<div class="center glow-box">
        <h1 class="huge neon-pink pixel">⏱ TROP D'ERREURS</h1>
        <p class="big">La réponse était :</p>
        <div class="huge pixel neon-yellow" style="letter-spacing:8px">${esc(a.answer||'')}</div>
      </div>`;
      tickerEl.textContent = 'MOSAÏQUE — réponse révélée.';
      return;
    }
    stage.innerHTML = `<div class="center">
      <h1 class="big neon-cyan">🧩 MOSAÏQUE${a.round>1?` · MANCHE ${a.round}`:''}</h1>
      ${q ? `
        <p class="big">Chaque écran affiche <b>${a.rows} lignes</b>… mais <b>UNE SEULE est la bonne</b> (celle qui s'allume en COULEUR).</p>
        <div class="huge">📱↗️📱↘️📱</div>
        <p class="big neon-yellow">Disposez vos <b>${a.n}</b> téléphones EN QUINCONCE (en escalier) pour aligner les lignes colorées en un seul mot.</p>`
      : `
        <p class="big">Posez vos <b>${a.n}</b> téléphones côte à côte, dans le BON ORDRE, pour reconstituer le mot secret.</p>
        <div class="huge">📱📱📱</div>`}
      <p class="big neon-yellow blink">Tapez la réponse sur un téléphone 👇</p>
      <p class="muted">Erreurs : ${a.wrongCount||0}/${a.maxWrong||3} (réponse révélée au-delà).</p>
    </div>`;
    tickerEl.textContent = q ? 'MOSAÏQUE — placez vos téléphones EN QUINCONCE et devinez le mot !' : 'MOSAÏQUE — alignez vos téléphones et devinez le mot !';
    return;
  }
  // --- Défi des enfants : prend le contrôle de la borne (insensible au SSE) ---
  if (STATE.phase==='activity' && STATE.activity && STATE.activity.type==='pixel_pad'){
    if (kidsKey !== STATE.activity.startedAt){ kidsKey = STATE.activity.startedAt; buildKidsPad(); }
    tickerEl.textContent = "LES PIXELS À L'HONNEUR — Robin & Juliette !";
    return;
  }
  kidsKey = null;

  // --- Galerie photo (vote ou résultats) ---
  if (STATE.photoPhase) { renderPhotoBorne(); return; }

  const connected = STATE.players.filter(p=>p.connected).length;
  let html = '';

  if (STATE.phase === 'lobby') {
    html = `
      <div class="center">
        <div class="huge pixel neon-pink blink">INSERT COIN</div>
        <p class="big">Scanne ton QR pour rejoindre la partie</p>
        <div class="grid-players mt">
          ${STATE.players.map(p=>`<div class="pcard ${p.connected?'':'off'}">
            <div class="emoji">${avatarEmoji(p.avatar)}</div>
            <div>${esc(p.name)}</div>
            <div class="pill ${p.ready?'neon-cyan':''}">${p.connected?(p.ready?'PRÊT':'…'):'OFF'}</div>
          </div>`).join('')}
        </div>
        <p class="muted mt">${connected} joueur(s) connecté(s)</p>
      </div>`;
  }

  else if (STATE.phase === 'activity' && STATE.activity) {
    html = activityView(STATE.activity);
  }

  else if (STATE.phase === 'scoreboard') {
    html = scoreboardView();
  }

  else if (STATE.phase === 'win') {
    html = `<div style="position:fixed;inset:0;z-index:9000;background:#000">
      <div id="win-video-player" style="width:100%;height:100%"></div>
    </div>`;
  }

  else if (STATE.world) {
    const w = STATE.world;
    const body = w.konamiGate ? w6BorneBody()
               : (w.pianoWorld && STATE.piano) ? pianoBorneBody(STATE.piano)
               : (w.pianoWorld) ? pianoBorneLocked(w)
               : '';
    html = `<div>
      ${w.isTwist ? `<div class="center huge pixel neon-yellow glow-box">⚡ PLAYER ONE ⚡</div>`:''}
      <div class="pill neon-yellow">MONDE ${w.num}/${STATE.worldCount}</div>
      <h1 class="big neon-pink">${esc(w.titre)}</h1>
      <p>${esc(w.intro)}</p>
      ${body}
      ${STATE.currentGage ? gageBanner(STATE.currentGage) : ''}
      <div class="mt">${scoresStrip()}</div>
    </div>`;
  }

  stage.innerHTML = html;
  // Décompte visible d'auto-passage « Sans Filtre » (phase de révélation).
  const _pa = STATE.activity;
  if (_pa && (_pa.type==='privacy'||_pa.type==='carton'||_pa.type==='justone') && _pa.sub==='reveal' && _pa.revealAt){
    const total = _pa.autoNextSeconds || 20;
    const el = document.getElementById('privacyCountdown');
    const tick = ()=>{ const left=Math.max(0,Math.ceil((_pa.revealAt+total*1000-Date.now())/1000)); const e=document.getElementById('privacyCountdown'); if(e)e.textContent=left; };
    if (el){ tick(); privacyCountTimer=setInterval(tick,500); }
  }
  // Décompte 4-3-2-1-0 de la page interstitielle entre 2 morceaux de blind-test.
  if (_pa && _pa.type==='blindtest' && _pa.sub==='intermission' && _pa.intermissionAt){
    const total = _pa.intermissionSeconds || 5;
    const tick = ()=>{
      const elapsedS = Math.floor((Date.now()-_pa.intermissionAt)/1000);
      const left = Math.max(0, total-1-elapsedS);
      const e=document.getElementById('btIntermissionCountdown'); if(e) e.textContent = left;
    };
    const el = document.getElementById('btIntermissionCountdown');
    if (el){ tick(); privacyCountTimer=setInterval(tick,300); }
  }
  if (STATE.phase === 'win' && !winBuilt){ winBuilt = true; buildWinVideo(); }
  tickerEl.textContent = (STATE.log||[]).map(l=>l.msg).join('   ◆   ') || (window.__EVENT__&&window.__EVENT__.name) || 'PartyPlay';
}

// Tableau des scores (phase 'scoreboard').
function scoreboardView(){
  const board = STATE.scoreboard || [];
  const medal = ['🥇','🥈','🥉'];
  tickerEl.textContent = 'CLASSEMENT';
  return `<div class="center">
    <h1 class="huge pixel neon-yellow">🏆 CLASSEMENT</h1>
    <div style="max-width:760px;margin:18px auto 0">
      ${board.length ? board.map((p,i)=>`
        <div class="card" style="display:flex;align-items:center;gap:14px;text-align:left;${i===0?'border-color:var(--neon3)':''}">
          <div class="big pixel" style="width:54px">${medal[i]||(i+1)}</div>
          <div style="font-size:40px">${avatarEmoji(p.avatar)}</div>
          <div style="flex:1">

        <h1 class="huge neon-yellow">🔦 VERDICT ?</h1>

        <div class="big">${name}</div>
        <p class="big">${defi}</p>

      </div>`;
    }
    return `<div class="center glow-box">
      <h1 class="huge neon-yellow">🔦 SPOTLIGHT</h1>
      <div class="big neon-pink">${name}</div>
      <p class="big">${defi}</p>
      <p class="big neon-yellow blink">À toi de jouer ! 🎤</p>

// Remplit les trous d'une question — la QUESTION reste sobre, la RÉPONSE est
// mise en couleur (jaune) pour bien la distinguer.
function cartonFillHtml(prompt, cards){
  let i = 0;
  const hi = (c)=>`<span class="neon-yellow" style="font-weight:800">« ${esc(c)} »</span>`;
  let html = esc(prompt||'').replace(/___/g, ()=>{ const c=(cards&&cards[i]!=null)?cards[i]:'___'; i++; return hi(c); });
  if (i===0 && cards && cards.length) html = esc(prompt||'') + ' → ' + hi(cards.join(' + '));
  return html;
}
// Affiche UNIQUEMENT la/les carte(s)-réponse (la question est déjà affichée une
// seule fois au-dessus) — évite de répéter toute la phrase pour chaque proposition.
function cartonCardsHtml(cards){
  const c = cards||[];
  return `<span class="neon-yellow" style="font-weight:800">${c.map(x=>'« '+esc(x)+' »').join(' + ')||'—'}</span>`;
}
// Bandeau de scores permanent (points de la manche en cours) affiché sur la borne.
function cartonScores(board){
  const b = board||[];
  if (!b.length) return '';
  return `<div class="card leaderboard" style="max-width:720px;margin:16px auto 0;text-align:left">
    <div class="pixel neon-yellow center" style="font-size:13px;margin-bottom:6px">SCORES</div>
    ${b.map((p,i)=>`<div>${['🥇','🥈','🥉'][i]||(i+1+'.')} ${esc(p.name)} <span class="coins">${p.pts} pt${p.pts>1?'s':''}</span></div>`).join('')}
  </div>`;
}

  const themeHtml = `<div class="card glow-box" style="display:inline-block;max-width:800px;margin:8px auto">

    const cats = act.availableCategories || [];

  }
  else if (act.sub==='bet'){
    body = `${pill}${themeHtml}
      <p class="big neon-cyan blink">Chaque joueur mise sur son téléphone 📱</p>`;
  }
  else if (act.sub==='answer'){
    body = `${pill}${themeHtml}
      <p class="big neon-cyan blink">Questions en cours — répondez sur vos téléphones 📱</p>`;
  }
  else if (act.sub==='reveal'){
    const res = act.results||{};
    const lines = Object.entries(res).map(([id,r])=>{
      const p = (act.leaderboard||[]).find(x=>x.id===id);
      const nm = esc(p?.name||'?');
      const ic = r.correct ? '✅' : '❌';
      const mv = r.gained > 0 ? `+${r.gained}` : '0';
      return `<div style="margin:8px 0;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,.06)">
        <div>${ic} <b>${nm}</b> — misé ${r.bet} · avance <b class="neon-cyan">${mv}</b> · case ${r.position}</div>
        <div class="muted" style="font-size:12px;margin-top:2px"><i>${esc(r.question||'')}</i> → <b class="neon-yellow">${esc(r.correctAnswer||'')}</b> ${!r.correct?'<span style="opacity:.7">(réponse donnée : « '+esc(r.given||'—')+' »)</span>':''}</div>
      </div>`;
    }).join('');
    body = `${pill}${themeHtml}
      <div class="card" style="max-width:760px;margin:10px auto;text-align:left">${lines}</div>
      <p class="muted">Prochaine manche dans <span id="privacyCountdown" class="neon-yellow">${act.autoNextSeconds||20}</span>s</p>`;
  }
  else if (act.sub==='final'){
    const board = act.finalBoard||[];
    return `<div class="center">
      ${pill}
      <h1 class="huge neon-yellow pixel">🏁 TTCQ — TERMINÉ !</h1>
      <div class="card leaderboard" style="max-width:640px;margin:14px auto;text-align:left">
        ${board.map((p,i)=>`<div>${['🥇','🥈','🥉'][i]||(i+1+'.')} ${esc(p.name)} <span class="coins">case ${p.position} 🪙${p.coins}</span></div>`).join('')||'<div class="muted center">Pas de classement.</div>'}
      </div>
      ${board.length?`<p class="big neon-cyan">Bravo ${esc(board[0].name)} — le roi du TTCQ ! 🎯</p>`:''}
    </div>`;

// Détection sonore du piano réparti (démo, note jouée, victoire)
let _pn = { demoAt: 0, step: 0, win: false, wrongAt: 0 };
// Surligne, en rythme, la note courante de la partition pendant que la borne
// joue la mélodie (les téléphones font de même de leur côté). Le tempo suit
// désormais la durée (n.dur) de chaque note → vrai rythme Mario.
let _bdRaf = 0;
function startBorneDemoHighlight(seq){
  cancelAnimationFrame(_bdRaf);
  const starts = []; let t = 0;
  seq.forEach(n => { starts.push(t); t += (n.dur || 0.42) * 1000; });
  const total = t, start = performance.now();
  let last = -1;
  const clearAll = () => { for (let i = 0; i < seq.length; i++){ const e = document.getElementById('btnote-'+i); if (e){ e.style.boxShadow=''; e.style.transform=''; } } };
  const tick = () => {
    const el = performance.now() - start;
    if (el > total){ clearAll(); return; }
    let idx = 0; while (idx+1 < starts.length && starts[idx+1] <= el) idx++;
    if (idx !== last){
      clearAll();
      const c = document.getElementById('btnote-'+idx);
      if (c){ c.style.boxShadow='0 0 0 3px #ffe600,0 0 18px #ffe600'; c.style.transform='scale(1.25)'; }
      last = idx;
    }
    _bdRaf = requestAnimationFrame(tick);
  };
  tick();
}
// Flash rouge de toute la partition quand les joueurs se trompent (retour à zéro).
function flashBorneWrong(){
  cancelAnimationFrame(_bdRaf);
  const notes = document.querySelectorAll('[id^="btnote-"]');
  notes.forEach(e => { e.style.boxShadow='0 0 0 3px #ff2e3e,0 0 18px #ff2e3e'; e.style.transform='scale(1.1)'; });
  setTimeout(() => notes.forEach(e => { e.style.boxShadow=''; e.style.transform=''; }), 500);
}
function detectPiano(s){
  // Piano = activité OU intégré au Monde 3 (s.piano). Même forme de données.
  const a = (s.activity && s.activity.type==='piano') ? s.activity : (s.piano || null);
  if(!a){ _pn = { demoAt:0, step:0, win:false, wrongAt:0 }; return; }
  // La BORNE joue UNIQUEMENT la mélodie de référence (démo / rejouer séquence).
  // Les notes pressées par les joueurs sont jouées par LEUR smartphone, pas ici.
  // Le SURLIGNAGE est toujours actif ; le SON seulement si le son est activé.
  if(a.demo && a.demo.at && a.demo.at!==_pn.demoAt){
    _pn.demoAt = a.demo.at;
    if(SOUND_ON && window.SFX){ let t = 0; a.demo.seq.forEach(n => { SFX.note(n.freq, t, Math.max(0.18,(n.dur||0.42)*0.9)); t += (n.dur||0.42); }); }
    startBorneDemoHighlight(a.demo.seq); // touches qui s'allument en rythme
  }
  if(a.wrongAt && a.wrongAt!==_pn.wrongAt){
    _pn.wrongAt = a.wrongAt;
    if(SOUND_ON && window.SFX && SFX.wrong) SFX.wrong();
    flashBorneWrong();
  }
  if(a.status==='win' && !_pn.win){ if(SOUND_ON && window.SFX) SFX.win(); _pn.win = true; }
  _pn.step = a.step;
}

function startHintPlayer(vid, start){

// Feux d'artifice (canvas) — particules colorées qui éclatent en boucle.
function startFireworks(){
  const cv = document.getElementById('fxcanvas'); if (!cv) return;
  const ctx = cv.getContext('2d');
  const resize = () => { cv.width = cv.clientWidth; cv.height = cv.clientHeight; };
  resize();
  const COL = ['#ff2e88','#2effd5','#ffe600','#7a5cff','#38ff9c','#ff6b3c','#3c9cff'];
  let parts = [];
  const burst = () => {
    const x = Math.random()*cv.width, y = Math.random()*cv.height*0.6 + cv.height*0.05;
    const c = COL[Math.floor(Math.random()*COL.length)];
    const n = 38 + Math.floor(Math.random()*22);
    for (let i=0;i<n;i++){ const ang=(Math.PI*2*i)/n, sp=1.6+Math.random()*3.4;
      parts.push({x,y,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp,life:1,c}); }
  };
  let t=0;
  const tick = () => {
    if (_fxStop) return;
    ctx.fillStyle = 'rgba(8,2,20,0.28)'; ctx.fillRect(0,0,cv.width,cv.height);
    if ((t++ % 26) === 0) burst();
    parts.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.vy+=0.04; p.life-=0.012;
      ctx.globalAlpha=Math.max(0,p.life); ctx.fillStyle=p.c;
      ctx.fillRect(p.x,p.y,3,3); });
    ctx.globalAlpha=1;
    parts = parts.filter(p=>p.life>0);
    _fxRaf = requestAnimationFrame(tick);
  };
  tick();
}
function startShowPlayer(intro, main){
  // Sans l'API YouTube : on saute le sting et on joue la vidéo principale.
  if (!(window.YT && YT.Player)){

      src="https://www.youtube.com/embed/${main}?autoplay=1&playsinline=1&loop=1&playlist=${main}&rel=0"
      allow="autoplay; encrypted-media; fullscreen" allowfullscreen></iframe>`;
    return;
  }
  destroyShowPlayer();
  // intro=null (skipIntro) → on démarre DIRECTEMENT sur la vidéo principale.
  ytShow = new YT.Player('ytshow', {
    height:'100%', width:'100%', videoId: intro || main,
    playerVars:{ autoplay:1, controls:0, playsinline:1, rel:0, modestbranding:1, fs:0 },
    events:{
      onReady(e){ try{ e.target.unMute(); e.target.setVolume(100); e.target.playVideo(); }catch(_){} },
      onStateChange(e){
        if (e.data === YT.PlayerState.ENDED){

  });
}

// =================== BRIEFING D'ENQUÊTE (slides sur la borne) ===================
// Les slides défilent (12 s chacune, ambiance mystérieuse). Le passage à l'acte 1 est
// piloté par le SERVEUR (minuterie) ; ici on ne fait que dérouler l'affichage,
// calé sur l'horloge LOCALE de la borne (pas de décalage serveur/client).
let enqBriefIv = null, enqBriefKey = null, enqBriefStart = 0;
function setupEnqueteBrief(a){
  const slides = a.briefSlides || [];
  if (!slides.length) return;
  if (enqBriefKey === a.briefAt) return;          // déjà lancé pour CE briefing
  enqBriefKey = a.briefAt;
  enqBriefStart = performance.now();
  if (enqBriefIv) clearInterval(enqBriefIv);
  const total = slides.reduce((s, sl) => s + (sl.sec || 8), 0);
  const draw = () => {
    const el = (performance.now() - enqBriefStart) / 1000;
    let acc = 0, idx = slides.length - 1;
    for (let i = 0; i < slides.length; i++){ const d = slides[i].sec || 8; if (el < acc + d){ idx = i; break; } acc += d; }
    renderEnqueteSlide(slides[idx], idx, slides.length, Math.min(1, el / total));
  };
  draw();
  enqBriefIv = setInterval(draw, 500);
}
function renderEnqueteSlide(s, idx, n, prog){
  const dots = Array.from({length:n}, (_,i) =>
    `<span style="display:inline-block;width:9px;height:9px;border-radius:50%;margin:0 3px;background:${i<=idx?'var(--neon)':'#ffffff22'}"></span>`).join('');
  stage.innerHTML = `<div class="center" style="min-height:80vh;display:flex;flex-direction:column;justify-content:center;align-items:center">
    <div class="pill" style="color:#fff;background:#7a1020;border:1px solid #ff2e3e">🗂️ DOSSIER 94100 — OUVERTURE</div>
    <h1 class="huge neon-pink pixel" style="margin:20px 0 14px;letter-spacing:2px">${esc(s.title||'')}</h1>
    <p style="max-width:1040px;line-height:1.6;font-size:30px;color:#e8e8ff">${esc(s.text||'')}</p>
    <div style="margin-top:28px">${dots}</div>
    <div style="width:60%;max-width:760px;height:6px;background:#ffffff22;border-radius:4px;margin-top:14px;overflow:hidden">
      <div style="height:100%;width:${Math.round(prog*100)}%;background:linear-gradient(90deg,#ff2e88,#2effd5);transition:width .5s linear"></div>
    </div>
    <p class="muted" style="margin-top:10px;font-size:14px">${idx+1}/${n}</p>
  </div>`;
  tickerEl.textContent = "MEURTRE À SAINT-MAUR — le dossier s'ouvre…";
}

// Plan stylisé de Saint-Maur : la Marne + les sites publics remarquables.
// On NE trace PAS le parcours (c'est aux joueurs de relier les points dans
// l'ordre de leurs indices pour faire apparaître la lettre).
function enqueteMapSvg(map){
  const L = map.landmarks || [];
  const river = map.river ? `
    <path d="M2,40 C18,8 50,6 70,16 C92,28 100,55 88,78 C74,98 34,98 20,82 C8,68 2,55 2,40 Z"
      fill="none" stroke="#1b6fb8" stroke-width="2.4" opacity="0.55"/>
    <path d="M2,40 C18,8 50,6 70,16 C92,28 100,55 88,78 C74,98 34,98 20,82 C8,68 2,55 2,40 Z"
      fill="#0a2a44" opacity="0.18"/>` : '';
  const dots = L.map((m)=>`
    <circle cx="${m.x}" cy="${m.y}" r="2.4" fill="#ffe600" stroke="#ff2e88" stroke-width="0.9"/>
    <circle cx="${m.x}" cy="${m.y}" r="4.2" fill="none" stroke="#ffe600" stroke-width="0.4" opacity="0.5"/>
  `).join('');
  // étiquettes : côté explicite par site (lbl) pour éviter les chevauchements
  const labels = L.map((m)=>{
    const side = m.lbl || (m.x > 55 ? 'l' : 'r');
    let tx = m.x, ty = m.y + 1.1, anchor = 'middle';
    if (side === 'r') { tx = m.x + 5; anchor = 'start'; }
    else if (side === 'l') { tx = m.x - 5; anchor = 'end'; }
    else if (side === 't') { ty = m.y - 5; anchor = 'middle'; }
    else if (side === 'b') { ty = m.y + 6.5; anchor = 'middle'; }
    return `<text x="${tx}" y="${ty}" font-size="2.7" fill="#dffaff"
      text-anchor="${anchor}" style="font-family:var(--term)">${esc(m.short||m.name)}</text>`;
  }).join('');
  return `<div class="card" style="text-align:center;border-color:var(--neon4);margin-top:14px;background:#03020c">
    <div class="pill neon-cyan">🗺️ PLAN DE SAINT-MAUR — sites publics remarquables</div>
    <p class="muted" style="font-size:17px">${esc(map.instruction||'')}</p>
    <svg viewBox="0 0 100 100" style="width:100%;max-width:760px;height:auto;background:#03020c;border:2px solid #ffffff22;border-radius:10px">
      ${river}${dots}${labels}
    </svg>
    <p class="neon-yellow" style="font-size:18px">Reliez les 7 sites dans l'ordre de vos indices : le tracé dessine une lettre.</p>
  </div>`;
}

// Bandeau de déchiffrement César : alphabet numéroté + cryptogramme.
function enqueteCipherStrip(c){
  const A = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
  const alpha = A.map((ch,i)=>`<span style="display:inline-block;width:30px;text-align:center;border:1px solid #ffffff22;padding:3px 0">
    <div class="neon-cyan" style="font-size:18px">${ch}</div><div class="muted" style="font-size:11px">${i+1}</div></span>`).join('');
  const crypto = (c.ciphertext||'').split('').map(ch=>`<span style="display:inline-block;width:42px;height:52px;line-height:52px;text-align:center;margin:3px;border:3px solid var(--neon);border-radius:8px;background:#1a0b2e" class="neon-yellow">${esc(ch)}</span>`).join('');
  return `<div class="card glow-box" style="text-align:center;border-color:var(--neon);margin-top:14px">
    <div class="pill neon-pink">🔐 MESSAGE CODÉ — clé : « ${esc(c.keyLetter||'?')} »</div>
    <div style="margin:10px 0">${crypto}</div>
    <p class="muted" style="font-size:17px">${esc(c.help||'')}</p>
    <div style="display:flex;flex-wrap:wrap;justify-content:center;gap:2px;margin-top:8px">${alpha}</div>
  </div>`;
}

// Détection sonore de la séquence musicale (démo, note jouée, erreur, victoire)
let _m = { demoAt: 0, step: 0, wrongAt: 0, win: false };
function detectMusic(s){
  if(!SOUND_ON || !window.SFX) return;
  const a = s.activity;
  if(!a || a.type!=='music_seq'){ _m = { demoAt:0, step:0, wrongAt:0, win:false }; return; }
  if(a.demo && a.demo.at && a.demo.at!==_m.demoAt){
    _m.demoAt = a.demo.at; let t = 0;
    // thème Mario : tempo plus vif pour qu'on le reconnaisse
    a.demo.seq.forEach(n=>{ SFX.note(n.freq, t, 0.2); t += 0.26; });
  }
  if(a.step>_m.step && a.slots[a.step-1] && a.slots[a.step-1].freq){ SFX.note(a.slots[a.step-1].freq); }
  if(a.wrongAt && a.wrongAt!==_m.wrongAt){ SFX.wrong(); }
  if(a.status==='win' && !_m.win){ SFX.win(); _m.win = true; }
  _m.step = a.step; _m.wrongAt = a.wrongAt || 0;
}

// =================== PAC-MAN (affichage borne) ===================
function pacIcon(e){ return e.role==='ghost' ? '👻' : (e.role==='mr' ? '🟡' : '🌸'); }
// Sons Pac-Man branchés au CONTEXTE : waka à chaque gomme, super-gomme,
// fantôme mangé, mort, élimination, victoire/défaite. (fichiers si présents,
// sinon recréations 8-bit — cf. SFX.pac dans sound.js)
let _pacAudio = { dots: null, fright: false, status: 'playing' };
function detectPacAudio(pm){
  if (!SOUND_ON || !window.SFX || !SFX.pac || !pm) return;
  // waka-waka : une gomme de moins → un chomp (throttlé à 1 par tick)
  if (_pacAudio.dots != null && pm.dotsLeft < _pacAudio.dots && pm.status === 'playing') SFX.pac.chomp();
  _pacAudio.dots = pm.dotsLeft;
  // super-gomme : entrée en mode fantômes bleus
  if (pm.frightened && !_pacAudio.fright) SFX.pac.power();
  _pacAudio.fright = !!pm.frightened;
  // événements transitoires (non rejoués)
  if (pm.events && pm.events.length){
    let maxAt = pacEventSeen;
    pm.events.forEach(ev=>{
      if (ev.at > pacEventSeen){
        if (ev.type === 'ghost_eaten') SFX.pac.eatGhost();
        else if (ev.type === 'pac_caught') SFX.pac.death();
        else if (ev.type === 'eliminated') SFX.pacOut();
      }
      if (ev.at > maxAt) maxAt = ev.at;
    });
    pacEventSeen = maxAt;
  }
  // fin de partie : jingle de victoire (Pac) ou de défaite
  if (pm.status !== 'playing' && _pacAudio.status === 'playing'){
    if (pm.status === 'pacwin') SFX.pac.win(); else SFX.pac.lose();
  }
  _pacAudio.status = pm.status;
}

// =================== TETRIS (affichage borne) ===================
const TCOLORS = ['#15092e','#2effd5','#ffe600','#b15cff','#38ff9c','#ff2e88','#3a7bff','#ff9a3c'];
function tetrisGrid(cells, cellPx){
  let html = `<div style="display:inline-grid;grid-template-columns:repeat(10,${cellPx}px);grid-template-rows:repeat(20,${cellPx}px);gap:1px;background:#0a0420;padding:4px;border:3px solid var(--neon4);border-radius:8px">`;
  for(const row of (cells||[])){
    for(const ch of row){ const v=+ch; html += `<div style="background:${TCOLORS[v]||'#15092e'};border-radius:2px"></div>`; }
  }
  return html + '</div>';
}
function tetMiniB(next, cell){
  if(!next || !next.mat) return '';
  const cols = next.mat[0].length;
  let html = `<div style="display:inline-grid;grid-template-columns:repeat(${cols},${cell}px);gap:1px;padding:2px;background:#0a0420;border-radius:6px;vertical-align:middle">`;
  for(const row of next.mat){ for(const v of row){ html += `<div style="width:${cell}px;height:${cell}px;background:${v?TCOLORS[next.color]:'transparent'};border-radius:2px"></div>`; } }
  return html + '</div>';
}
function renderTetrisBorne(){
  const t = STATE.tetris;
  if (t.status!=='playing' && t.ranking){
    stage.innerHTML = `<div class="center">
      <h1 class="huge neon-yellow pixel">🧱 TETRIS TERMINÉ</h1>
      ${t.ranking[0]?`<p class="big neon-cyan">🏆 ${esc(t.ranking[0].name)} — ${t.ranking[0].lines} lignes (+1 vie ❤️)</p>`:''}
      <div class="card leaderboard" style="max-width:520px;margin:auto;text-align:left">
        ${t.ranking.map((p,i)=>`<div>${['🥇','🥈','🥉'][i]||(i+1+'.')} ${esc(p.name)} <span class="coins">${p.lines} lignes</span> ${i===0?'❤️':'💔'} ${p.eliminated?'☠️':''}</div>`).join('')}
      </div></div>`;
    tickerEl.textContent='TETRIS — manche terminée !';
    return;
  }
  // Les 2 MEILLEURES parties (lignes puis score) encore en vie, en temps réel.
  const alive = t.players.filter(p=>!p.eliminated).sort((a,b)=>b.lines-a.lines||b.score-a.score);
  const show = (alive.length?alive:t.players.slice().sort((a,b)=>b.lines-a.lines)).slice(0,2);
  const board = (p,i)=>`<div style="text-align:center">
    <div class="big" style="color:#fff">${['🥇','🥈'][i]||''} ${esc(p.name)} ${p.eliminated?'☠️':''}</div>
    <div class="muted" style="font-size:15px;display:flex;align-items:center;justify-content:center;gap:8px">
      <span>${p.lines} lignes · ${p.score} pts</span>
      ${p.next?'<span style="font-size:11px">SUIVANT</span>'+tetMiniB(p.next,7):''}
    </div>
    ${tetrisGrid(p.cells, 20)}
  </div>`;
  const others = t.players.filter(p=>!show.includes(p));
  stage.innerHTML = `<div class="center">
    <h1 class="big neon-cyan">🧱 TETRIS — TOP 2 &nbsp;·&nbsp; ⚡ Niveau ${t.level||1} &nbsp;·&nbsp; ⏱ ${t.timeLeft}s</h1>
    <div class="row" style="gap:30px;justify-content:center;align-items:flex-start;flex-wrap:wrap">${show.map(board).join('')}</div>
    ${others.length?`<p class="muted mt">Autres : ${others.map(p=>`${esc(p.name)} ${p.eliminated?'☠️':'('+p.lines+'L)'}`).join(' · ')}</p>`:''}
  </div>`;
  tickerEl.textContent='TETRIS — survivez le plus longtemps !';
}

// =================== 2048 (affichage borne) ===================
const T2COL = {0:'#1d1133',2:'#3a2bd0',4:'#5a3bd0',8:'#ff9a3c',16:'#ff7a2c',32:'#ff5b6e',64:'#ff2e88',128:'#2effd5',256:'#38ff9c',512:'#ffe600',1024:'#ffd000',2048:'#ff00aa'};
function tile2048(v){ const col=T2COL[v]||'#ff00aa'; const fs=v>=1024?'17px':v>=128?'20px':'24px'; return `<div style="width:54px;height:54px;display:flex;align-items:center;justify-content:center;background:${col};border-radius:6px;color:#0a0420;font-weight:900;font-size:${fs}">${v||''}</div>`; }
function grid2048(board){ let h='<div style="display:inline-grid;grid-template-columns:repeat(4,54px);gap:6px;background:#0a0420;padding:6px;border:3px solid var(--neon4);border-radius:8px">'; for(const row of board){ for(const v of row){ h+=tile2048(v); } } return h+'</div>'; }
function render2048Borne(){

  const order = t.players.slice().sort((a,b)=>(b.eliminated?0:1)-(a.eliminated?0:1)||b.score-a.score);
  const show = order.slice(0,2);
  const board=(p,i)=>`<div style="text-align:center">

  </div>`;
  tickerEl.textContent='2048 — fusionnez pour le meilleur score !';
}

// =================== PONG (affichage borne) ===================
function pongDraw(ctx, S, t){
  const k = S/t.size;
  ctx.fillStyle='#05010f'; ctx.fillRect(0,0,S,S);
  ctx.strokeStyle='#1b1060'; ctx.lineWidth=2; ctx.strokeRect(2,2,S-4,S-4);
  const m = t.margin*k, pad = t.pad*k;
  const sideOf = (s)=> t.players.find(p=>p.side===s);
  // murs (côtés sans joueur vivant)
  ['top','bottom','left','right'].forEach(s=>{
    const pl=sideOf(s);
    if(!pl || !pl.alive){ ctx.strokeStyle='#3a2bd0'; ctx.lineWidth=6;
      ctx.beginPath();
      if(s==='top'){ctx.moveTo(0,m);ctx.lineTo(S,m);} if(s==='bottom'){ctx.moveTo(0,S-m);ctx.lineTo(S,S-m);}
      if(s==='left'){ctx.moveTo(m,0);ctx.lineTo(m,S);} if(s==='right'){ctx.moveTo(S-m,0);ctx.lineTo(S-m,S);}
      ctx.stroke();
    }
  });
  // raquettes
  t.players.forEach(p=>{
    if(!p.alive) return;
    ctx.fillStyle=p.color; const c=p.pos*k;
    if(p.side==='top') ctx.fillRect(c-pad/2, m-3, pad, 6);
    if(p.side==='bottom') ctx.fillRect(c-pad/2, S-m-3, pad, 6);
    if(p.side==='left') ctx.fillRect(m-3, c-pad/2, 6, pad);
    if(p.side==='right') ctx.fillRect(S-m-3, c-pad/2, 6, pad);
  });
  // balle
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(t.ball.x*k, t.ball.y*k, t.ballr*k, 0, 7); ctx.fill();
}

// =================== DESSINE-MOI (affichage borne) ===================
function drawStrokes(ctx, W, H, strokes){
  ctx.fillStyle='#fdf6e3'; ctx.fillRect(0,0,W,H);
  ctx.lineCap='round'; ctx.lineJoin='round';
  for(const s of (strokes||[])){
    const pts=s.p||[]; if(!pts.length) continue;
    ctx.strokeStyle=s.c||'#160a2e'; ctx.lineWidth=(s.w||3);
    ctx.beginPath(); ctx.moveTo(pts[0][0]*W, pts[0][1]*H);
    for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i][0]*W, pts[i][1]*H);
    if(pts.length===1) ctx.lineTo(pts[0][0]*W+0.1, pts[0][1]*H+0.1);
    ctx.stroke();
  }
}

  // tirets par lettre, espaces conservés ; révèle le mot à la fin
  if(a.phase==='reveal' && a.word) return esc(a.word.toUpperCase());
  return Array.from({length:a.wordLen}).map(()=>'_').join(' ');
}

// =================== DÉFI DES PIXELS (enfants, sur la borne) ===================
// Simon-says PROGRESSIF : la séquence s'allonge à chaque réussite et il faut
// atteindre une longueur cible. Plus dur (mémoire + vitesse) pour les enfants.
function buildKidsPad(){
  const d = STATE.activity.data || {};
  const NPADS = 6;                 // 6 cases / 6 couleurs
  const startLen = d.len || 4;     // longueur de départ
  const target = d.target || 10;   // longueur à atteindre pour gagner (jusqu'à 10)
  // Séquence cible complète ; on en révèle de plus en plus.
  let full = Array.from({length:target}, ()=>Math.floor(Math.random()*NPADS));
  let round = startLen;            // longueur du tour courant
  let input = [];
  let accepting = false;
  let flashDur = 360;              // plus rapide que l'ancienne version (450)

  stage.innerHTML = `
    <div class="center">
      <h1 class="big neon-yellow">👾 LE DÉFI DES PIXELS</h1>
      <p class="big" id="kidsmsg">Robin & Juliette : regardez bien les couleurs…</p>
      <p class="neon-cyan" id="kidsprog"></p>
      <div class="padgrid">
        ${Array.from({length:NPADS},(_,i)=>`<div class="pad pad${i}" id="pad${i}"></div>`).join('')}
      </div>
      <button class="btn warn" style="max-width:320px;margin:0 auto" id="kidsreplay">🔁 REVOIR</button>
    </div>`;

  const msg = document.getElementById('kidsmsg');
  const prog = document.getElementById('kidsprog');
  const pads = Array.from({length:NPADS},(_,i)=>document.getElementById('pad'+i));

  function flash(i, dur){
    return new Promise(r=>{
      pads[i].classList.add('lit');
      if(window.SFX) SFX.pad(i);
      setTimeout(()=>{ pads[i].classList.remove('lit'); setTimeout(r, 120); }, dur);
    });
  }
  function showProg(){ prog.textContent = `Niveau ${round - startLen + 1} — ${round} couleurs à retenir`; }
  async function playSequence(){
    accepting = false; input = [];
    showProg();
    msg.textContent = 'Regardez bien…';
    await new Promise(r=>setTimeout(r, 600));
    // accélère légèrement à mesure que ça s'allonge
    const dur = Math.max(220, flashDur - (round - startLen) * 30);
    for(let k=0;k<round;k++){ await flash(full[k], dur); }
    msg.textContent = 'À VOUS ! Refaites la suite 👆';
    accepting = true;
  }
  function win(){
    accepting = false;
    if(window.SFX) SFX.padOk();
    stage.innerHTML = `<div class="center glow-box">
      <h1 class="huge neon-yellow">👾 BRAVO LES PIXELS !</h1>
      <p class="big">Robin & Juliette ont réveillé l'Élu.</p>
      <p class="big neon-pink blink">👑 Remettez la CARTE DORÉE à Vincent !</p>
    </div>`;
    fetch('/api/kids/done',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});
  }
  function tap(i){
    if(!accepting) return;
    if(window.SFX) SFX.pad(i);
    pads[i].classList.add('lit'); setTimeout(()=>pads[i].classList.remove('lit'),180);
    input.push(i);
    const idx = input.length-1;
    if(input[idx]!==full[idx]){
      // erreur : on recommence le MÊME tour (sans rallonger)
      accepting = false;
      msg.textContent = 'Presque ! On recommence ce niveau… 😊';
      setTimeout(playSequence, 900);
      return;
    }
    if(input.length===round){
      // tour réussi → on rallonge, ou victoire si on atteint la cible
      if(round >= target){ win(); return; }
      accepting = false;
      round += 1;
      msg.textContent = '👍 Bien joué ! Encore une couleur de plus…';
      setTimeout(playSequence, 900);
    }
  }

  pads.forEach((p,i)=>p.addEventListener('click', ()=>tap(i)));
  document.getElementById('kidsreplay').addEventListener('click', playSequence);
  playSequence();
}

// Récupère TOUTE la playlist rock d'un coup : getPlaylist() renvoie la liste
// complète des IDs chargés ; le serveur en tire les titres via oEmbed. Aucun
// défilement, aucune gêne pour la lecture. On retente car la liste met parfois
// 1-2 s à se peupler, et on rafraîchit (les mix radio s'allongent en jouant).
let BT_LISTS = {};          // { theme: listId } depuis /api/ytconfig
let _btHarvesters = {};     // un lecteur dédié par thème (évite toute contamination)
// Moissonne les IDs d'UN lecteur (lié à UN thème fixe) → serveur (titrage oEmbed).
function harvestFrom(player, theme){
  let n = 0;
  const grab = () => {
    let ids = [];
    try { ids = player.getPlaylist() || []; } catch(_){}
    if (ids && ids.length) {
      fetch(API + '/api/blindtest/playlist', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ theme, ids })
      }).catch(()=>{});
    }
  };
  setTimeout(grab, 1000);
  const iv = setInterval(() => { grab(); if (++n >= 8) { clearInterval(iv); try{ player.pauseVideo(); }catch(_){} } }, 3000);
}

// =================== BLIND-TEST DYNAMIQUE ===================
// Le serveur a pioché une vidéo au hasard (a.playVideoId) : la borne la charge
// et la joue. playRequestedAt change à chaque nouvelle chanson (même id rejouable).
let _lastPlayReq = 0;
let dzAudio = null; // élément <audio> pour les extraits Deezer 30 s
function syncBlindtest(s) {
  const a = s.activity;
  if (!a || a.type !== 'blindtest') {
    _lastPlayReq = 0;
    if (dzAudio) { try { dzAudio.pause(); } catch(_){} } // stoppe l'extrait Deezer hors blind-test
    return;
  }
  // Condition sur a.sub retirée : trop stricte (juste 'question'), un état
  // reçu avec un peu de retard (SSE) peut arriver alors que la révélation a
  // déjà eu lieu — playRequestedAt qui change reste le signal fiable, il ne
  // bouge QUE quand le serveur pioche vraiment un nouveau morceau.
  if (a.playRequestedAt && a.playRequestedAt !== _lastPlayReq) {
    _lastPlayReq = a.playRequestedAt;
    try {
      if (a.playAudioUrl) {
        // DEEZER : lecture de l'extrait MP3 30 s via un <audio> natif.
        if (ytBt) { try { ytBt.stopVideo(); } catch(_){} }
        if (ytAmb) ytAmb.pauseVideo();
        if (!dzAudio) { dzAudio = new Audio(); dzAudio.preload = 'auto'; }
        dzAudio.src = a.playAudioUrl;
        dzAudio.currentTime = 0;
        dzAudio.play().catch((err)=>{ try{ console.warn('[blindtest] dzAudio.play() refusé :', err && err.name); }catch(_){} });
      } else if (a.playVideoId) {
        // YOUTUBE : lecture de la vidéo piochée.
        if (dzAudio) { try { dzAudio.pause(); } catch(_){} }
        if (ytBt) { ytBt.loadVideoById(a.playVideoId); ytBt.unMute(); ytBt.playVideo(); }
        if (ytAmb) ytAmb.pauseVideo();
      }
    } catch(_) {}
  }
}

let ytAmb = null, ytBrief = null, ytEnq = null, ytDebrief = null, ytBt = null, ytPac = null, ytPacIntro = null, ytApiReady = false, ytInited = false;
let _pacIntroPlaying = false;

window.onYouTubeIframeAPIReady = function(){ ytApiReady = true; initYT(); }; // démarre muet sans attendre de clic

function initYT(){
  if (ytInited || !ytApiReady) return;
  ytInited = true;
  fetch(API + '/api/ytconfig').then(r=>r.json()).then(cfg=>{
    if (cfg.ambiance) {
      ytAmb = new YT.Player('yt-amb', {
        height:'1', width:'1',
        playerVars:{ listType:'playlist', list:cfg.ambiance, autoplay:1, loop:1, controls:0, disablekb:1, fs:0, modestbranding:1, mute:1 },
        events:{
          onReady(e){ e.target.setShuffle(true); e.target.setVolume(50); e.target.playVideo(); }, // muet jusqu'au 1er clic
          onStateChange(e){ if(e.data===YT.PlayerState.ENDED) e.target.nextVideo(); }
        }
      });
    }
    // Ambiance dédiée au BRIEFING (vidéo unique en boucle, muette jusqu'au 1er clic).
    if (cfg.briefing && cfg.briefing.id) {
      const bid = cfg.briefing.id, bstart = cfg.briefing.start || 0;
      ytBrief = new YT.Player('yt-brief', {
        height:'1', width:'1', videoId: bid,
        playerVars:{ autoplay:1, loop:1, playlist:bid, controls:0, disablekb:1, fs:0, modestbranding:1, mute:1, start:bstart },
        events:{
          onReady(e){ try{ e.target.mute(); }catch(_){} }, // prêt, muet ; lancé pendant le briefing
          onStateChange(e){ if(e.data===YT.PlayerState.ENDED){ try{ e.target.seekTo(bstart); e.target.playVideo(); }catch(_){} } }
        }
      });
    }
    if (cfg.enquete && cfg.enquete.id) {

        events:{
          onReady(e){ try{ e.target.mute(); }catch(_){} }, // prêt, muet ; lancé pendant l'enquête
          onStateChange(e){ if(e.data===YT.PlayerState.ENDED){ try{ e.target.seekTo(estart); e.target.playVideo(); }catch(_){} } }
        }
      });
    }
    // Blind-tests multi-thèmes : cfg.blindtest = { rock, francais, dessins }
    BT_LISTS = (cfg.blindtest && typeof cfg.blindtest === 'object') ? cfg.blindtest : {};
    // Un MOISSONNEUR caché et dédié par thème : il charge SA playlist (muette),

    const host = document.createElement('div');

        events:{
          onReady(e){ try{ e.target.setShuffle(true); e.target.mute(); e.target.playVideo(); }catch(_){}; harvestFrom(e.target, theme); },
          onStateChange(e){
            // Titre collecté tagué avec le thème FIXE de ce moissonneur (pas de contamination)
            if (e.data === YT.PlayerState.PLAYING) {
              try {

    // Lecteur de LECTURE (joue la chanson piochée par le serveur, via son id).

        events:{
          onReady(e){ try{ e.target.mute(); }catch(_){} },
          onStateChange(e){ if(e.data===YT.PlayerState.ENDED){ try{ e.target.seekTo(dstart); e.target.playVideo(); }catch(_){} } }

        events:{

          onStateChange(e){ if(e.data===YT.PlayerState.ENDED){ try{ e.target.seekTo(pstart); e.target.playVideo(); }catch(_){} } }
        }
      });

    // Jingle intro Pac-Man (10 premières secondes) — joué une fois au lancement

      events:{ onReady(e){ e.target.mute(); } }
    });
  }).catch(()=>{});
}

let _lastAmbRestart = 0;
function syncYT(s){
  if (s.ambientRestartAt && s.ambientRestartAt !== _lastAmbRestart) {
    _lastAmbRestart = s.ambientRestartAt;
    try { if (ytAmb) { ytAmb.playVideoAt(0); if (SOUND_ON) { ytAmb.unMute(); ytAmb.setVolume(50); } } } catch(_){}
  }
  const a = s.activity;
  const pauseBrief = () => { try { if (ytBrief) ytBrief.pauseVideo(); } catch(_){} };
  const pauseEnq = () => { try { if (ytEnq) ytEnq.pauseVideo(); } catch(_){} };
  // 🎹 Piano (Monde 3) en cours : silence total — la borne joue la mélodie elle-même.
  if (s.piano) {
    pauseBrief(); pauseEnq();
    try { if (ytAmb) ytAmb.pauseVideo(); if (ytBt) ytBt.mute(); if (ytPac) ytPac.pauseVideo(); } catch(_){}
    return;
  }
  // 💡 Vidéo-indice à l'écran (ex. Monde 1) : on met la musique de fond en sourdine
  //    UNIQUEMENT tant que l'indice JOUE vraiment (sinon, vidéo en pause/arrêtée,
  //    on laisse l'ambiance reprendre — pas de borne muette).
  if (s.hintVideo && _hintPlaying) {
    pauseBrief();
    try { if (ytAmb) ytAmb.pauseVideo(); if (ytBt) ytBt.mute(); if (ytPac) ytPac.pauseVideo(); } catch(_){}
    return;
  }
  // Musique d'activité UNIQUEMENT pendant la phase 'activity' et tant qu'elle
  // n'est pas terminée — sinon le son (blind-test, Pac-Man) continue après
  // « STOP activité » (activity.state='done', phase='world').
  const live = s.phase === 'activity' && !!a && a.state !== 'done';
  const isBrief = live && a.type === 'briefing';
  const isBT = live && a.type === 'blindtest';
  const isPac = live && a.type === 'pacman';
  // Une chanson blind-test est posée uniquement quand le QCM est affiché.
  const songOn = isBT && a.sub === 'question' && !!a.playVideoId;
  const isEnq = live && a.type === 'enquete';
  // 🎬 BRIEFING : ambiance sonore dédiée (si configurée) à la place de l'ambiance normale.
  if (isBrief && ytBrief) {
    pauseEnq();
    try { ytBrief.unMute(); ytBrief.playVideo(); if (ytAmb) ytAmb.pauseVideo(); if (ytBt) ytBt.mute(); if (ytPac) ytPac.pauseVideo(); } catch(_){}
    return;
  }
  // 🔓 DÉBRIEF ou ATTENTE FINALE : musique de révélation dès que l'enquête est résolue.
  const isResolved = live && a.type === 'enquete' && (a.sub === 'debrief' || (a.done && !a.sub));
  if (isResolved) {
    pauseBrief();
    try {
      if (ytDebrief) { ytDebrief.unMute(); ytDebrief.playVideo(); if (ytEnq) ytEnq.pauseVideo(); }
      else if (ytEnq) { ytEnq.unMute(); ytEnq.playVideo(); }
      if (ytAmb) ytAmb.pauseVideo(); if (ytBt) ytBt.mute(); if (ytPac) ytPac.pauseVideo();
    } catch(_){}
    return;
  }
  // 🕵️ ENQUÊTE en cours : musique dédiée (si configurée) à la place de l'ambiance normale.
  if (isEnq && ytEnq) {
    pauseBrief();
    try { ytEnq.unMute(); ytEnq.playVideo(); if (ytAmb) ytAmb.pauseVideo(); if (ytBt) ytBt.mute(); if (ytPac) ytPac.pauseVideo(); if (ytDebrief) ytDebrief.pauseVideo(); } catch(_){}
    return;
  }
  // Hero-quiz (Anecdote 3) : la vidéo / la fête fournissent le son → on coupe le reste.
  if (live && a.type === 'heroquiz') {
    pauseBrief(); pauseEnq();
    try { if (ytAmb) ytAmb.pauseVideo(); if (ytBt) ytBt.mute(); if (ytPac) ytPac.pauseVideo(); } catch(_){}
    return;
  }
  // Diffusion vidéo : l'iframe fournit le son → on coupe tout le reste.
  if (live && a.type === 'videoshow') {
    pauseBrief(); pauseEnq();
    try { if (ytAmb) ytAmb.pauseVideo(); if (ytBt) ytBt.mute(); if (ytPac) ytPac.pauseVideo(); } catch(_){}
    return;
  }
  pauseBrief(); pauseEnq();
  try {
    if (isPac) {
      // 🟡 PAC-MAN : jingle intro 10 s, puis musique dédiée
      if (_pacIntroPlaying) {
        if (ytAmb) ytAmb.pauseVideo();
        if (ytBt) ytBt.mute();
      } else {
        if (ytPac) { ytPac.unMute(); ytPac.playVideo(); }
        if (ytAmb) ytAmb.pauseVideo();
        if (ytBt) ytBt.mute();
      }
    } else if (songOn) {
      if (ytPac) ytPac.pauseVideo();
      if (ytBt) { ytBt.unMute(); ytBt.playVideo(); }
      if (ytAmb) ytAmb.pauseVideo();
    } else {
      if (ytPac) ytPac.pauseVideo();
      if (ytBt) ytBt.mute();
      if (s.ambientPaused) { if (ytAmb) ytAmb.pauseVideo(); }
      else { if (ytAmb) { if (SOUND_ON) { ytAmb.unMute(); ytAmb.setVolume(50); } ytAmb.playVideo(); } }
    }
  } catch(_){}
}

function avatarEmoji(a){ return EMOJI[a] || '🎮'; }
