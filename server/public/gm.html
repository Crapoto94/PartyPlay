<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PIXEL PANIC — GM</title>
<link rel="stylesheet" href="/static/arcade.css" />
<script src="/static/fullscreen.js"></script>
<style>
  body{font-size:18px}
  .btn{font-size:11px;padding:10px}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  select{width:100%;padding:8px;font-family:var(--term);font-size:18px;background:#03010a;color:var(--ink);border:2px solid var(--neon2);border-radius:6px}
  code{color:var(--neon3)}
</style>
</head>
<body class="scanlines">
<div class="wrap" id="app">
  <div class="card">
    <h2 class="neon-pink pixel" style="font-size:16px">GAME MASTER</h2>
    <input id="pwd" type="text" placeholder="MOT DE PASSE GM" />
    <button class="btn mt" onclick="connect()">ENTRER</button>
  </div>
</div>

<script>
let PWD = null, S = null, timer = null;
const app = document.getElementById('app');
function esc(s){ return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

function connect(pwd){
  const el = document.getElementById('pwd');
  PWD = (pwd !== undefined) ? pwd : (el ? el.value : '');
  refresh().then(ok=>{ if(ok){ if(timer) clearInterval(timer); timer=setInterval(refresh,1500); } });
}
function loginForm(msg){
  app.innerHTML = `<div class="card"><h2 class="neon-pink pixel" style="font-size:16px">GAME MASTER</h2>
    ${msg?`<p class="neon-pink">${msg}</p>`:''}
    <input id="pwd" type="text" placeholder="MOT DE PASSE GM" />
    <button class="btn mt" onclick="connect()">ENTRER</button></div>`;
}
function refresh(){
  return fetch('/api/gm/state?password='+encodeURIComponent(PWD||''))
    .then(r=> r.ok ? r.json() : Promise.reject())
    .then(s=>{ S=s; render(); return true; })
    .catch(()=>{ loginForm('Mot de passe refusé.'); return false; });
}
function act(action, payload={}){
  return fetch('/api/gm/action',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({password:PWD,action,payload})}).then(r=>r.json()).then(r=>{ refresh(); return r; });
}

function render(){
  if(!S) return;

  // Don't re-render while user is interacting with a dropdown (avoids closing it mid-selection)
  const ae = document.activeElement;
  if (ae && (ae.id === 'spotTarget' || ae.id === 'spotDefi' || ae.id === 'gagePool' || ae.id === 'gageTarget')) {
    return;
  }

  // Persist select values across re-renders
  const _saved = {};
  ['spotTarget','spotDefi','gagePool','gageTarget'].forEach(id => {
    const el = document.getElementById(id);
    if (el) _saved[id] = el.value;
  });

  const w = S.world;
  const targets = S.players.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('');
  app.innerHTML = `
  <div class="card">
    <div class="row">
      <div><b>Phase</b><br><code>${S.phase}</code></div>
      <div><b>Monde</b><br><code>${w?('#'+w.num+' '+esc(w.titre)):'—'}</code></div>
    </div>
    ${w ? `<div class="mt" style="background:#021a16;border:1px solid var(--neon2);border-radius:6px;padding:8px">
      <b class="neon-cyan">🔑 SOLUTION (réservé hôte) :</b>
      ${S.worldEnquete
        ? '<code>— se résout en élucidant LA GRANDE ENQUÊTE —</code>'
        : `<code style="color:var(--neon3);font-size:20px">${esc(S.worldCode||'?')}</code>`}
      ${w && w.konamiGate ? `<div class="muted" style="font-size:12px;margin-top:4px">🎮 Monde 6 : TOUS les joueurs doivent saisir le Konami (manette) — ${(S.w6&&S.w6.doneCount)||0}/${(S.w6&&S.w6.total)||0}. Puis la commande <code>${esc(S.worldCode||'R38007')}</code> = REBOOT en LEET (REBOOT en clair → indice « LEET »).</div>` : ''}
      <div class="muted" style="font-size:12px;margin-top:4px">${S.worldEnquete ? 'La résolution de l\'enquête valide le monde. (Ou « ✅ Valider monde » pour forcer.)' : 'Un joueur tape ce code sur son téléphone → le monde se valide. (Ou « ✅ Valider monde » pour forcer.)'}</div>
    </div>`:''}
    <div class="mt">${S.heroAwakened?'<span class="pill neon-yellow">👑 Vincent éveillé (Game Master)</span>':''}</div>
  </div>

  <div class="card">
    <div class="pixel neon-cyan" style="font-size:11px">DÉROULÉ</div>
    <div class="grid mt">
      <button class="btn secondary" onclick="startAct('briefing')">📖 BRIEFING</button>
      <button class="btn secondary" onclick="act('start')">▶ DÉMARRER</button>
      <button class="btn warn" onclick="act('completeWorld')">✅ Valider monde →</button>
      ${S.hintVideo ? `<button class="btn" onclick="act('clearHint')">⏹ Couper l'indice 💡</button>` : ''}
      <button class="btn danger" onclick="if(confirm('Tout réinitialiser ?'))act('reset')">⟲ RESET</button>
    </div>
    <div class="grid mt" style="border-top:1px solid #222;padding-top:10px;margin-top:10px">
      <button class="btn ${S.ambientPaused ? 'warn' : 'secondary'}" onclick="act('ambientPlay')" ${S.ambientPaused ? '' : 'disabled'}>▶ Musique fond</button>
      <button class="btn ${!S.ambientPaused ? '' : 'secondary'}" onclick="act('ambientStop')" ${!S.ambientPaused ? '' : 'disabled'} style="${!S.ambientPaused ? 'background:#3a1200;border-color:#c04000;color:#ffaa00' : ''}">⏸ Couper</button>
    </div>
  </div>

  ${S.activity && S.activity.type === 'blindtest' && S.activity.dynamicBlindtest ? `
  <div class="card" style="border-color:var(--neon3)">
    <div class="pixel neon-yellow" style="font-size:11px">🎵 BLIND-TEST ${({rock:'ROCK',francais:'CHANSONS FR',dessins:'DESSINS ANIMÉS',annees83:'ANNÉES 83'})[S.activity.theme]||''} · ${S.playlistTrackCount||0} titres · manche ${Math.min(S.activity.asked||0,S.activity.total||15)}/${S.activity.total||15}</div>
    ${S.activity.sub === 'final'
      ? `<div class="mt">🏁 Manche terminée.
          ${(S.activity.winnerNames&&S.activity.winnerNames.length) ? '<br>🏆 Vainqueur : <b>'+S.activity.winnerNames.map(esc).join(', ')+'</b>' : ''}
          ${(S.activity.loserNames&&S.activity.loserNames.length)
            ? '<br>Dernier(s) : <b>'+S.activity.loserNames.map(esc).join(', ')+'</b> (−1 vie 💔)'
            : '<br>Égalité — personne ne perd de vie.'}
          <button class="btn mt" onclick="act('stopActivity')">⏹ Terminer</button></div>`
      : (!S.quizMaster
          ? ((S.playlistTrackCount||0) < 4
              ? `<div class="mt muted">⏳ La BORNE collecte les titres (patientez ~30 s)…</div>`
              : `<button class="btn warn mt" onclick="act('blindtestAsk')">🎵 Lancer la 1ère chanson (15 au total)</button>`)
          : `<div class="mt muted">🎶 Chanson en cours — les joueurs répondent. Enchaînement auto.</div>`)
    }
  </div>` : ''}

  <div class="card">
    <div class="pixel neon-cyan" style="font-size:11px">ACTIVITÉS BORNE</div>
    <div class="grid3 mt">
      <button class="btn secondary" onclick="startAct('reaction_race')">⚡ Réaction</button>
      <button class="btn secondary" onclick="startAct('quiz',{deck:'videogame'})">❓ Quiz JV</button>
      <button class="btn" style="background:#7a5cff;color:#fff" onclick="startAct('blindtest',{theme:'rock'})">🎸 Blind-test Rock</button>
      <button class="btn" style="background:#7a5cff;color:#fff" onclick="startAct('blindtest',{theme:'francais'})">🎤 Blind-test Chansons FR</button>
      <button class="btn" style="background:#7a5cff;color:#fff" onclick="startAct('blindtest',{theme:'dessins'})">📺 Blind-test Dessins animés</button>
      <button class="btn" style="background:#7a5cff;color:#fff" onclick="startAct('blindtest',{theme:'annees83'})">🕺 Blind-test 83</button>
      <button class="btn secondary" onclick="startAct('roue_des_gages')">🎰 Roue</button>
      <button class="btn secondary" onclick="startAct('boss_final',{hp:100})">👾 Boss</button>
      <button class="btn warn" onclick="startAct('pixel_pad',{len:4,target:10})">🧒 Défi Pixels</button>
      <button class="btn warn" onclick="startAct('pacman',{seconds:120})">🟡 Pac-Man</button>
      <button class="btn warn" onclick="startAct('tetris',{seconds:240})">🧱 Tetris</button>
      <button class="btn warn" onclick="startAct('tron')">🟦 Tron</button>
      <button class="btn warn" onclick="startAct('2048',{seconds:180})">🔢 2048</button>
      <button class="btn warn" onclick="startAct('pong',{seconds:180})">🏓 Pong</button>
      <button class="btn warn" onclick="startAct('draw')">🎨 Dessine-moi</button>
      <button class="btn warn" onclick="startAct('music_seq')">🎵 Séquence</button>
      <button class="btn warn" onclick="startAct('piano')">🎹 Piano réparti</button>
      <button class="btn warn" onclick="mosaic()">🧩 Mosaïque</button>
      <button class="btn danger" onclick="startAct('enquete')">🕵️ Enquête</button>
      <button class="btn warn" onclick="duckDance()">🦆 Danse des canards</button>
      <button class="btn warn" onclick="lambada()">💃 Lambada</button>
      <button class="btn" style="background:#1a1a4a;border-color:#7a5cff;color:#fff" onclick="bohemian()">🎸 Bohemian Rhapsody</button>
      <button class="btn" style="background:#5a2d00;border-color:#ff9500;color:#fff" onclick="indignite(1,'WzDo0Rq8WnQ')">😱 Quelle indignité 1</button>
      <button class="btn" style="background:#5a2d00;border-color:#ff9500;color:#fff" onclick="indignite(2,'xKlK1nZp-2M')">😱 Quelle indignité 2</button>
      <button class="btn" style="background:#e91e8c;border-color:#ff6ec7;color:#fff" onclick="anecdote(1,'C3oIfqyEcJo')">💡 Anecdote 1</button>
      <button class="btn" style="background:#e91e8c;border-color:#ff6ec7;color:#fff" onclick="anecdote(2,'wN_-cmnOAfs')">💡 Anecdote 2</button>
      <button class="btn" style="background:#e91e8c;border-color:#ff6ec7;color:#fff" onclick="anecdote(3,'tslKyngY0zg')">💡 Anecdote 3</button>
      <button class="btn" style="background:#e91e8c;border-color:#ff6ec7;color:#fff" onclick="anecdote(4,'WDlKntyIfPk')">💡 Anecdote 4</button>
      <button class="btn" style="background:#e91e8c;border-color:#ff6ec7;color:#fff" onclick="anecdote(5,'b5KKHhlWR5c')">💡 Anecdote 5</button>
      <button class="btn" style="background:#e91e8c;border-color:#ff6ec7;color:#fff" onclick="anecdote(6,'l-r6pi1X3dk')">💡 Anecdote 6</button>
      <button class="btn" style="background:#e91e8c;border-color:#ff6ec7;color:#fff" onclick="anecdote(7,'VV4Z5Yer5yQ')">💡 Anecdote 7</button>
      <button class="btn" style="background:#e91e8c;border-color:#ff6ec7;color:#fff" onclick="anecdote(8,'mXKSAgfNy8w')">💡 Anecdote 8</button>
      <button class="btn" style="background:#e91e8c;border-color:#ff6ec7;color:#fff" onclick="anecdote(9,'2XuMGnIxZTA')">💡 Anecdote 9</button>
      <button class="btn" style="background:#5b1fa8;border-color:#9b59b6;color:#fff" onclick="act('startActivity',{type:'videoshow',opts:{video:'6EEGmdH9Vu0',topLabel:'🎬 ANNIVERSAIRE',chyron:'Bonne fête Vincent !',skipIntro:true,borneOnly:true}})">🎬 Vidéo anniversaire (borne)</button>
      <button class="btn" style="background:#c026d3;color:#fff" onclick="anecdote3()">🎬 Anecdote JFO ★ (Vincent devine)</button>
      <button class="btn" style="background:#c026d3;color:#fff" onclick="fete(1)">🎉 Fête 1</button>
      <button class="btn" style="background:#c026d3;color:#fff" onclick="fete(2)">🎉 Fête 2</button>
      <button class="btn" style="background:#c026d3;color:#fff" onclick="fete(3)">🎉 Fête 3</button>
    </div>
    <div class="pixel mt" style="font-size:11px;color:#ff6a00">🔥 HELL — LECTURE DIRECTE (borne + téléphones)</div>
    <div class="grid3 mt">
      <button class="btn" style="background:#7f0000;border-color:#ff3d00;color:#ffcc00" onclick="hell(1,'tofASIZJeIc')">🔥 HELL1</button>
      <button class="btn" style="background:#7f0000;border-color:#ff3d00;color:#ffcc00" onclick="hell(2,'zCKDQNJH7d0')">🔥 HELL2</button>
      <button class="btn" style="background:#7f0000;border-color:#ff3d00;color:#ffcc00" onclick="hell(3,'4k7Z9mj4zu4')">🔥 HELL3</button>
      <button class="btn" style="background:#7f0000;border-color:#ff3d00;color:#ffcc00" onclick="hell(4,'rX6cEb--QAU')">🔥 HELL4</button>
      <button class="btn" style="background:#7f0000;border-color:#ff3d00;color:#ffcc00" onclick="hell(5,'aY0Or8STsPc')">🔥 HELL5</button>
      <button class="btn" style="background:#7f0000;border-color:#ff3d00;color:#ffcc00" onclick="hell(6,'PdPydkpaSBE')">🔥 HELL6</button>
      <button class="btn" style="background:#7f0000;border-color:#ff3d00;color:#ffcc00" onclick="hell(7,'L8ga6tvWDmc')">🔥 HELL7</button>
      <button class="btn" style="background:#7f0000;border-color:#ff3d00;color:#ffcc00" onclick="hell(8,'Cltpjo6vmAk')">🔥 HELL8</button>
      <button class="btn" style="background:#7f0000;border-color:#ff3d00;color:#ffcc00" onclick="hell(9,'CIx0tZ8TwLI')">🔥 HELL9</button>
      <button class="btn" style="background:#7f0000;border-color:#ff3d00;color:#ffcc00" onclick="hell(10,'4CN5pMucY4c')">🔥 HELL10</button>
      <button class="btn" style="background:#7f0000;border-color:#ff3d00;color:#ffcc00" onclick="hell(11,'vbvkZZZCw3s')">🔥 HELL11</button>
      <button class="btn" style="background:#7f0000;border-color:#ff3d00;color:#ffcc00" onclick="hell(12,'_a1NXpp5-h8')">🔥 HELL12</button>
      <button class="btn" style="background:#7f0000;border-color:#ff3d00;color:#ffcc00" onclick="hell(13,'T3VtAOflJVA')">🔥 HELL13</button>
      <button class="btn" style="background:#7f0000;border-color:#ff3d00;color:#ffcc00" onclick="hell(14,'a-TlvrP22A4')">🔥 HELL14</button>
      <button class="btn" style="background:#7f0000;border-color:#ff3d00;color:#ffcc00" onclick="hell(15,'QBZtnFhYyNs')">🔥 HELL15</button>
      <button class="btn" style="background:#7f0000;border-color:#ff3d00;color:#ffcc00" onclick="hell(16,'YKAcRwHWlQw')">🔥 HELL16</button>
      <button class="btn" style="background:#7f0000;border-color:#ff3d00;color:#ffcc00" onclick="hell(17,'36s1DWf4DOA')">🔥 HELL17</button>
      <button class="btn" style="background:#7f0000;border-color:#ff3d00;color:#ffcc00" onclick="hell(18,'KyFAe9Yr_oI')">🔥 HELL18</button>
      <button class="btn" style="background:#7f0000;border-color:#ff3d00;color:#ffcc00" onclick="hell(19,'s9OBfkos7Is')">🔥 HELL19</button>
      <button class="btn" style="background:#7f0000;border-color:#ff3d00;color:#ffcc00" onclick="hell(20,'2rhP6Mphitc')">🔥 HELL20</button>
      <button class="btn" style="background:#7f0000;border-color:#ff3d00;color:#ffcc00" onclick="hell(21,'-Q4eZPv5PjY')">🔥 HELL21</button>
      <button class="btn" style="background:#3a0000;border-color:#ff6a00;color:#ffe600" onclick="hell('VINCE','hXSsp2d-a54')">🔥 HELLVINCE</button>
    </div>
    <div class="pixel neon-cyan mt" style="font-size:11px">QUIZ — THÈMES</div>
    <div class="grid3 mt">
      <button class="btn secondary" onclick="startAct('quiz',{deck:'videogame'})">🎮 Jeu vidéo</button>
      <button class="btn secondary" onclick="startAct('quiz',{deck:'eighties'})">📼 Années 80</button>
      <button class="btn secondary" onclick="startAct('quiz',{deck:'nineties'})">💿 Années 90</button>
      <button class="btn secondary" onclick="startAct('quiz',{deck:'anime'})">🍙 Animés</button>
      <button class="btn secondary" onclick="startAct('quiz',{deck:'cultureT'})">🏛️ Culture T</button>
      <button class="btn secondary" onclick="startAct('quiz',{deck:'saintmaur'})">🏘️ Saint-Maur</button>
      <button class="btn" style="background:#e91e8c;border-color:#ff6ec7;color:#fff" onclick="startAct('quiz_vincent')">🎭 Quiz Vincent</button>
    </div>
    ${S.activity && S.activity.type === 'heroquiz' && S.activity.sub === 'play'
      ? `<button class="btn mt" style="background:#c026d3;color:#fff" onclick="act('heroQuizReveal')">❓ Poser la question maintenant</button>` : ''}
    <button class="btn danger mt" onclick="act('stopActivity')">⏹ STOP activité</button>
    <div class="mt"><a href="/print-enquete" target="_blank" style="color:var(--neon3);font-size:13px">🖨️ Imprimer le matériel d'enquête (cartes + plan + solution MJ)</a></div>
  </div>

  ${(() => {
    const conn = S.players.filter(p=>p.connected);
    const connOpts = conn.length
      ? conn.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('')
      : '<option value="">(aucun joueur connecté)</option>';
    const defiOpts = SPOT_DEFIS.map((d,i)=>`<option value="${i}">${esc(d.length>58?d.slice(0,58)+'…':d)}</option>`).join('');
    const sp = (S.activity && S.activity.type==='spotlight') ? S.activity : null;
    let ctrl = '';
    if (sp){
      const d = sp.data||{};
      if (sp.sub==='challenge'){
        ctrl = `<div class="mt"><span class="pill neon-yellow">🔦 ${esc(d.targetName||'?')}</span>
          <div class="muted" style="font-size:13px;margin:6px 0">${esc(d.defi||'')}</div>
          <button class="btn warn" onclick="act('spotlightOpenVote')">🗳️ Ouvrir le vote</button></div>`;
      } else if (sp.sub==='vote'){
        const ok = Object.values(sp.votes||{}).filter(v=>v==='ok').length;
        const ko = Object.values(sp.votes||{}).filter(v=>v==='ko').length;
        ctrl = `<div class="mt"><span class="pill neon-cyan">VOTE EN COURS</span>
          <div class="mt">👏 <code>${ok}</code> &nbsp;·&nbsp; 💀 <code>${ko}</code></div>
          <button class="btn warn mt" onclick="act('spotlightTally')">✅ Clôturer & verdict</button></div>`;
      } else if (sp.sub==='result'){
        ctrl = `<div class="mt"><span class="pill ${sp.verdict==='ok'?'neon-cyan':'neon-pink'}">${sp.verdict==='ok'?'👏 RÉUSSI':'💀 RATÉ'}</span>
          <div class="muted mt">👏 ${sp.okCount||0} · 💀 ${sp.koCount||0}</div>
          <button class="btn mt" onclick="act('stopActivity')">⏹ Terminer</button></div>`;
      }
    }
    return `<div class="card">
      <div class="pixel neon-cyan" style="font-size:11px">🔦 SPOTLIGHT</div>
      <div class="muted mt" style="font-size:13px">Choisis qui passe sur la sellette, et un défi (ou laisse au hasard).</div>
      <select id="spotTarget" class="mt" onchange="_spotSel.target=this.value">${connOpts}</select>

      </select>
      <button class="btn secondary mt" onclick="launchSpotlight()">🔦 Lancer le Spotlight</button>
      ${ctrl}
    </div>`;
  })()}

  <div class="card">
    <div class="pixel neon-cyan" style="font-size:11px">📸 DÉFIS PHOTO</div>
    <div class="muted mt" style="font-size:13px">Photos : <code>${S.photos ? S.photos.length : 0}</code> soumises</div>
    <div class="mt" style="display:flex;flex-wrap:wrap;gap:6px">
      ${S.players.map(p=>{
        const c = p.photoCount||0, t = p.photoTotal||0, full = t>0 && c>=t;
        return `<span class="pill ${full?'neon-cyan':''}" style="font-size:12px;${full?'':'background:#1a1a2a'}">${esc(p.name)} <b>${c}/${t}</b></span>`;
      }).join('')}
    </div>
    <div class="grid3 mt">
      <button class="btn warn" onclick="act('setPhotoPhase',{phase:'vote'})">📸 Ouvrir vote</button>
      <button class="btn secondary" onclick="act('setPhotoPhase',{phase:'results'})">🏆 Résultats</button>
      <button class="btn" onclick="act('setPhotoPhase',{phase:null})">⏹ Fermer galerie</button>
    </div>
    ${S.photoPhase ? `<div class="mt"><span class="pill neon-yellow">Phase : ${S.photoPhase}</span></div>` : ''}
  </div>

  ${S.activity && S.activity.type === 'draw' ? `
  <div class="card" style="border-color:var(--neon3)">
    <div class="pixel neon-yellow" style="font-size:11px">🎨 DESSINE-MOI — manche ${S.activity.round||1}</div>
    <div class="mt">✏️ Dessinateur : <code>${esc(S.activity.drawerName||'?')}</code> · catégorie <code>${esc(S.activity.category||'')}</code></div>
    <div class="mt">🔑 Mot : <code style="color:var(--neon3)">${esc(S.drawWord||S.activity.word||'(secret)')}</code>
      ${S.activity.phase==='reveal' && S.activity.winnerName ? `<span class="pill neon-cyan">trouvé par ${esc(S.activity.winnerName)}</span>`:''}</div>
    <div class="grid mt">
      <button class="btn warn" onclick="act('drawReveal')">💡 Révéler le mot</button>
      <button class="btn secondary" onclick="act('drawNext')">⏭ Dessinateur suivant</button>
    </div>
  </div>`:''}

  ${S.activity && S.activity.type === 'music_seq' ? `

    <div class="pixel neon-yellow" style="font-size:11px">🎵 SÉQUENCE MUSICALE</div>
    <div class="mt">Progression : <code>${S.activity.step}/${S.activity.len}</code> · indices : <code>${S.activity.revealed}</code> ${S.activity.status==='win'?'<span class="pill neon-cyan">RÉUSSI</span>':''}</div>
    <div class="grid mt">
      <button class="btn secondary" onclick="act('musicDemo')">🎶 Jouer la démo</button>
      <button class="btn warn" onclick="act('musicHint')">💡 Indice (+1 note)</button>
    </div>
  </div>`:''}

  ${(() => {
    // Piano : soit en ACTIVITÉ, soit intégré au Monde 3 (S.piano).
    const pn = (S.activity && S.activity.type === 'piano') ? S.activity : (S.piano || null);
    if (!pn) return '';
    return `
  <div class="card" style="border-color:var(--neon3)">
    <div class="pixel neon-yellow" style="font-size:11px">🎹 PIANO RÉPARTI · ${pn.nPhones||0} téléphone(s)</div>
    <div class="mt">Progression : <code>${pn.step}/${pn.len}</code> ${pn.status==='win'?'<span class="pill neon-cyan">RÉUSSI</span>':(pn.nextName?`· prochaine : <code>${esc(pn.nextName)}</code> (tél. N°${pn.nextPos})`:'')}</div>
    <div class="muted mt" style="font-size:12px">Ordre des téléphones (gauche→droite) : ${(pn.placement||[]).map(p=>`<b>${p.pos}.</b> ${esc(p.name)}`).join(' · ') || '(aucun téléphone connecté)'}</div>
    <div class="grid mt">
      <button class="btn secondary" onclick="act('pianoDemo')">🎶 Jouer la démo</button>
    </div>
  </div>`;
  })()}

  ${S.activity && S.activity.type === 'enquete' && S.enqueteMaster ? (()=>{
    const em = S.enqueteMaster;
    const btnFilm = `<button class="btn mt" style="background:#5b1fa8;border-color:#9b59b6;color:#fff" onclick="act('enquetePlayFinale')">🎬 Lancer le film anniversaire</button>`;
    if (em.sub === 'debrief') return `<div class="card" style="border-color:var(--ok)">
      <div class="pixel" style="font-size:11px;color:var(--ok)">🕵️ ENQUÊTE — DÉBRIEF — diapo ${(em.debriefSlide||0)+1}/${em.debriefTotal||9}</div>
      <div class="muted mt" style="font-size:13px">Les diapos défilent automatiquement (8 s). Avancez ou passez directement au film.</div>
      <div class="grid mt">
        <button class="btn warn" onclick="act('enqueteDebriefNext')">⏭ Diapo suivante</button>
        <button class="btn danger" onclick="act('enqueteDebriefSkip')">⏩ Passer les slides</button>
      </div>
      ${btnFilm}
    </div>`;
    if (em.done) {
      const secsLeft = em.finaleAt ? Math.max(0, 15 - Math.round((Date.now() - em.finaleAt) / 1000)) : null;
      const countdown = secsLeft !== null && secsLeft > 0
        ? `<div class="muted mt" style="font-size:13px">🎬 Film dans <b>${secsLeft} s</b>…</div>` : '';
      return `<div class="card" style="border-color:var(--ok)">
      <div class="pixel" style="font-size:11px;color:var(--ok)">🕵️ ENQUÊTE — RÉSOLUE ✔</div>
      <div class="mt">Affaire close. Coupable : <code>GUILLAUME</code>.</div>
      ${countdown}
      ${btnFilm}</div>`;
    }
    if (em.sub === 'briefing') return `<div class="card" style="border-color:var(--neon)">
      <div class="pixel neon-pink" style="font-size:11px">🗂️ ENQUÊTE — BRIEFING EN COURS</div>
      <div class="muted mt" style="font-size:13px">Les slides défilent sur la borne (12 s chacune). Les téléphones affichent « MEURTRE À SAINT-MAUR ». L'acte 1 démarrera automatiquement.</div>
      <button class="btn warn mt" onclick="act('enqueteSkip')">⏭ Passer le briefing → Acte 1</button>
    </div>`;
    return `<div class="card" style="border-color:var(--neon3)">
      <div class="pixel neon-yellow" style="font-size:11px">🕵️ ENQUÊTE — ACTE ${em.num}/${em.total} : ${esc(em.title||'')}</div>
      <div class="mt">✔ Code attendu : <code>${esc(em.answer||'')}</code></div>
      <div class="muted mt" style="font-size:13px">Indices révélés : ${em.hintsShown}/${em.hintsTotal} · tentatives ratées : ${em.attempts}</div>
      ${(()=>{ const rem=Math.max(0,(em.hintUnlockAt||0)-Date.now()); const locked=rem>0; const done=em.hintsShown>=em.hintsTotal;
        const s=Math.ceil(rem/1000);
        const lockBtn = locked
          ? `<button class="btn" style="background:#5a3b00;border-color:#c07000;color:#ffe600" title="Cliquer pour débloquer immédiatement" onclick="act('enqueteHintUnlock')">⏳ ${Math.floor(s/60)}:${String(s%60).padStart(2,'0')} — débloquer</button>`
          : done
            ? `<button class="btn" disabled>✔ Tous les indices donnés</button>`
            : `<button class="btn warn" onclick="act('enqueteHint')">💡 Donner un indice</button>`;
        return `<div class="grid mt">
        ${lockBtn}
        <button class="btn secondary" onclick="if(confirm('Débloquer cet acte sans le résoudre ?'))act('enqueteSkip')">⏭ Forcer l'acte</button>
      </div>`; })()}
    </div>`;
  })() : ''}

  ${S.activity && S.activity.type === 'mosaic' ? `
  <div class="card" style="border-color:var(--neon3)">
    <div class="pixel neon-yellow" style="font-size:11px">🧩 MOSAÏQUE — manche ${S.activity.round||1} · ${S.activity.rows||1} ligne(s)</div>
    <div class="mt">Mot à reconstituer : <code>${esc(S.mosaicWord||'?')}</code></div>
    <div class="muted mt" style="font-size:13px">${(S.activity.rows||1)>1?'Les joueurs placent les téléphones EN QUINCONCE (1 seule ligne correcte par écran).':'Téléphones côte à côte, dans le bon ordre.'}</div>
    ${(S.activity.rows||1)>1 ? `<div class="grid mt">
      <button class="btn ${S.activity.reveal?'secondary':'warn'}" onclick="act('mosaicReveal',{on:true})">💡 Révéler la ligne ${S.activity.reveal?'✔':''}</button>
      <button class="btn" onclick="act('mosaicReveal',{on:false})">🙈 Masquer l'aide</button>
    </div>`:''}
    <button class="btn warn mt" onclick="mosaic()">🔁 Relancer (manche suivante, +1 ligne)</button>
  </div>`:''}

  ${S.activity && S.activity.type === 'roue_des_gages' ? (()=>{
    const a = S.activity; const g = a.gage||{};
    const counts = {}; Object.values(a.votes||{}).forEach(t=>counts[t]=(counts[t]||0)+1);
    let ctrl = '';
    if (a.sub==='spin') ctrl = '<div class="muted mt">🎡 La roue tourne…</div>';
    else if (a.sub==='challenge') ctrl = `<div class="mt">⏱ Défi en cours (${a.challengeSeconds||20}s).
      <button class="btn warn mt" onclick="act('roueOpenVote')">🗳️ Ouvrir le vote maintenant</button></div>`;
    else if (a.sub==='vote') ctrl = `<div class="mt">Votes : <code>${esc(JSON.stringify(counts))}</code>
      <button class="btn warn mt" onclick="act('roueTally')">✅ Clôturer & attribuer les vies</button></div>`;
    else if (a.sub==='result') ctrl = `<div class="mt">🏆 Gagnant(s) : <code>${(a.winnerIds||[]).map(id=>{const p=S.players.find(x=>x.id===id);return p?p.name:id;}).join(', ')||'—'}</code>
      <button class="btn mt" onclick="act('stopActivity')">⏹ Terminer</button></div>`;
    return `<div class="card" style="border-color:var(--neon3)">
      <div class="pixel neon-yellow" style="font-size:11px">🎰 ROUE — ${esc((a.sub||'').toUpperCase())}</div>
      <div class="mt">Gage tiré : <code>${esc(g.titre||'—')}</code></div>
      ${ctrl}
    </div>`;
  })() : ''}

  ${S.quizMaster && S.activity && S.activity.sub !== 'final' ? `
  <div class="card" style="border-color:var(--neon3)">
    <div class="pixel neon-yellow" style="font-size:11px">🎙️ MJ — QUESTION ${(S.quizMaster.qIndex??0)+1}</div>
    <div class="mt">${esc(S.quizMaster.prompt)}</div>
    ${S.quizMaster.play ? `<div class="mt">🔊 À LANCER : <code>${esc(S.quizMaster.play)}</code></div>`:''}
    <div class="mt">✔ Réponse : <code>${esc(S.quizMaster.bonneReponse)}</code>
       <span class="pill ${S.quizMaster.sub==='reveal'?'neon-cyan':''}">${esc(S.quizMaster.sub||'')}</span></div>
    <div class="grid mt">
      <button class="btn warn" onclick="act('quizReveal')">💡 RÉVÉLER</button>
      <button class="btn secondary" onclick="act('quizNext')">⏭ SUIVANTE</button>
    </div>
  </div>`:''}

  <div class="card">
    <div class="pixel neon-cyan" style="font-size:11px">GAGES</div>
    <div class="row mt">
      <select id="gagePool">
        <option value="">(auto)</option>
        <option value="solo">solo</option><option value="collectif">collectif</option>
        <option value="duel">duel</option><option value="rock">rock</option>
        <option value="sport">sport</option><option value="vincent">vincent</option>
      </select>
      <select id="gageTarget"><option value="">— table —</option>${targets}</select>
    </div>
    <div class="grid mt">
      <button class="btn warn" onclick="drawGage()">🎲 Lancer gage</button>
      <button class="btn" onclick="act('clearGage')">Effacer gage</button>
    </div>
  </div>

  <div class="card">
    <div class="pixel neon-cyan" style="font-size:11px">VIES</div>
    <div class="grid3 mt">
      ${S.players.map(p=>`<button class="btn danger" onclick="act('loseLife',{playerId:'${p.id}'})">💔 ${esc(p.name)} (${p.lives})</button>`).join('')}
    </div>
  </div>

  <div class="card log">
    <div class="pixel" style="font-size:9px">JOURNAL</div>
    ${(S.log||[]).map(l=>`<div>${esc(l.msg)}</div>`).join('')}
  </div>`;

  // Restore select values after re-render
  Object.keys(_saved).forEach(id => {
    const el = document.getElementById(id);
    if (el && _saved[id] !== undefined && _saved[id] !== '') {
      if (el.querySelector(`option[value="${_saved[id]}"]`)) el.value = _saved[id];
    }
  });
  if (_saved.spotTarget !== undefined) _spotSel.target = _saved.spotTarget;
  if (_saved.spotDefi !== undefined) _spotSel.defi = _saved.spotDefi;
}

function startAct(type, opts={}){ act('startActivity',{type,opts}); }
function duckDance(){
  startAct('videoshow',{video:'7kyY29BHTZs',topLabel:'🔴 BREAKING NEWS',
    chyron:'CONCOURS DE DANSE 🦆<br>DANSEZ TOUS LA DANSE DES CANARDS !',
    footer:'À VOS PLUMES — TOUT LE MONDE DANSE ! 🪿'});
}
function lambada(){
  startAct('videoshow',{video:'YBa-SxJLs3A',topLabel:'💃 LAMBADA',
    chyron:'ON ENCHAÎNE AVEC LA LAMBADA 💃<br>TOUT LE MONDE SE DÉHANCHE !',
    footer:'CHAUD DEVANT — PLACE À LA LAMBADA ! 🕺'});
}
function bohemian(){
  startAct('videoshow',{video:'thyJOnasHVE',topLabel:'🎸 BOHEMIAN RHAPSODY',
    chyron:'BOHEMIAN RHAPSODY 🎸<br>TOUT LE MONDE CHANTE !',
    footer:'IS THIS THE REAL LIFE ? 🎤',landscape:true});
}

  startAct('videoshow',{video,skipIntro:true,topLabel:'😱 QUELLE INDIGNITÉ '+n,
    chyron:'QUELLE INDIGNITÉ ! 😱<br>'+n,
    footer:'OH NON… QUELLE INDIGNITÉ ! 🙀',landscape:true});
}
function anecdote(n,video){
  startAct('videoshow',{video,topLabel:'💡 ANECDOTE #'+n,
    chyron:'ANECDOTE #'+n+' 🍿<br>OUVREZ GRAND LES OREILLES !',
    footer:'Une petite histoire pour Vincent… 🎬'});
}
// Anecdote 3 : la borne joue la vidéo, PUIS Vincent doit deviner les initiales.
// Bonne réponse (JFO) → BRAVO VINCENT + feux d'artifice + musique.
function anecdote3(){
  act('startActivity',{type:'heroquiz',opts:{
    video:'EMWY25VsbNU',
    topLabel:'💡 ANECDOTE #3',
    question:'VINCENT : qui est-ce ?',
    hintLabel:'ses 3 INITIALES',
    answer:'JFO',
  }});
}
// HELL : lecture DIRECTE d'une vidéo (sans intro « breaking news »),
// diffusée sur la borne ET les téléphones (pas de borneOnly).
function hell(n,video){
  act('startActivity',{type:'videoshow',opts:{video,skipIntro:true,
    topLabel:'🔥 HELL '+n,
    chyron:'🔥 HELL '+n,
    footer:'🔥🔥🔥'}});
}
function fete(n){
  const videos = { 1:'HpCZqG7lxD8', 2:'NoxgPqw4rSY', 3:'dhCDATSf3Ss' };
  startAct('videoshow',{video:videos[n],topLabel:'🎉 FÊTE '+n,
    chyron:'FÊTE '+n+' 🎊<br>À LA SANTÉ DE VINCENT !',
    footer:'🥂 TCHIN TCHIN !'});
}
function mosaic(){
  // Vide = mot auto (lié au jeu vidéo, longueur selon le nb de joueurs). 1ʳᵉ manche = KONAMI.
  const w = prompt('Mot mosaïque (laisse VIDE = auto). 1ʳᵉ manche = KONAMI quoi qu\'il arrive :','');
  if (w === null) return; // annulé
  act('startActivity',{type:'mosaic',opts: w.trim()?{word:w.trim()}:{}});
}

// --- Spotlight : liste de défis chargée une fois, sélections persistées ---
let SPOT_DEFIS = [];
let _spotSel = { target:'', defi:'' };
fetch('/api/spotlight/defis').then(r=>r.json()).then(d=>{ SPOT_DEFIS = d.defis||[]; if(S) render(); }).catch(()=>{});
function launchSpotlight(){
  const t = document.getElementById('spotTarget');
  const targetId = (t && t.value) || _spotSel.target || null;
  if (!targetId) { alert('Choisis un joueur connecté.'); return; }
  const di = document.getElementById('spotDefi');
  const idx = (di && di.value !== '') ? di.value : _spotSel.defi;
  const defi = (idx !== '' && idx != null) ? (SPOT_DEFIS[Number(idx)] || '') : '';
  act('startActivity',{type:'spotlight',opts:{targetId,defi}});
}
function drawGage(){
  act('drawGage',{pool:document.getElementById('gagePool').value||null,
    targetId:document.getElementById('gageTarget').value||null});
}

// Auto-connexion : si aucun mot de passe n'est configuré côté serveur, accès direct.
connect('');
</script>
