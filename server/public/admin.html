<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Administration — Plateforme événements</title>
  <link rel="stylesheet" href="/static/admin.css">
</head>
<body>
  <div class="admin-wrap">
    <h1 class="neon-pink">🎛️ Administration générale</h1>
    <p class="muted">Créez et gérez vos événements. Chaque événement a sa propre console, ses joueurs et son thème.</p>

    <!-- Connexion (si mot de passe global configuré) -->
    <div class="card" id="loginCard" style="display:none">
      <div class="field">
        <label>Mot de passe administrateur</label>
        <input type="password" id="admPwd" placeholder="••••••••">
      </div>
      <button class="btn" onclick="login()">Entrer</button>
      <div id="loginErr" class="neon-pink" style="margin-top:8px"></div>
    </div>

    <div id="app" style="display:none">
      <!-- Création -->
      <div class="card">
        <h2 class="neon-cyan">➕ Nouvel événement</h2>
        <div class="field"><label>Nom de l'événement</label><input type="text" id="nName" placeholder="Anniversaire de Léa"></div>
        <div class="row">
          <div class="field"><label>Thème graphique</label>
            <select id="nTheme">
              <option value="retro">Rétro jeux vidéo</option>
              <option value="neon">Néon / Clubbing</option>
              <option value="chic">Chic / Élégant</option>
              <option value="kids">Anniversaire enfant</option>
              <option value="casino">Casino / Vegas</option>
            </select>
          </div>
          <div class="field"><label>Contenu de départ</label>
            <select id="nSeed">
              <option value="default">Pré-rempli (quiz, gages, anecdotes…)</option>
              <option value="empty">Vierge (tout à créer)</option>
            </select>
          </div>
          <div class="field"><label>Formule</label>
            <select id="nPlan">
              <option value="free">Gratuit</option>
              <option value="full">Fête complète</option>
              <option value="infinite">Illimité Premium</option>
            </select>
          </div>
        </div>
        <div class="row">
          <div class="field"><label>Mot de passe de la console (optionnel)</label><input type="password" id="nPwd" placeholder="laisser vide = libre"></div>
          <div class="field"><label>URL publique (pour les QR, optionnel)</label><input type="text" id="nUrl" placeholder="https://monevent.fr"></div>
        </div>
        <button class="btn secondary" onclick="createParty()">Créer l'événement</button>
        <div id="createErr" class="neon-pink" style="margin-top:8px"></div>
      </div>

      <!-- Liste -->
      <div class="card">
        <h2 class="neon-yellow">📋 Événements</h2>
        <table class="list"><tbody id="rows"><tr><td class="muted">Chargement…</td></tr></tbody></table>
      </div>

      <!-- Tarifs -->
      <div class="card">
        <h2>💶 Tarifs &amp; formules</h2>
        <p class="muted">Règle les prix et les limites de chaque formule. Devise :
          <input type="text" id="pCurrency" style="width:80px;display:inline-block" maxlength="4"></p>
        <div id="pricingEditor"></div>
        <button class="btn" onclick="savePricing()">💾 Enregistrer les tarifs</button>
        <span id="pSaved" class="muted"></span>
      </div>
    </div>
  </div>

<script>
const themeLabel = { retro:'Rétro', neon:'Néon', chic:'Chic', kids:'Enfant', casino:'Casino' };
const ALL_THEMES = ['retro','neon','chic','kids','casino'];
const PLAN_ORDER = ['free','full','infinite'];
let PWD = sessionStorage.getItem('admPwd') || '';
let PRICING = null;

function headers() { return { 'Content-Type':'application/json', 'x-admin-password': PWD }; }

async function boot() {
  const meta = await (await fetch('/api/admin/meta')).json();
  if (meta.needsPassword && !PWD) { document.getElementById('loginCard').style.display='block'; return; }
  await load();
}
async function login() {
  PWD = document.getElementById('admPwd').value;
  const r = await fetch('/api/admin/login', { method:'POST', headers: headers(), body:'{}' });
  if (!r.ok) { document.getElementById('loginErr').textContent = 'Mot de passe invalide.'; return; }
  sessionStorage.setItem('admPwd', PWD);
  document.getElementById('loginCard').style.display='none';
  await load();
}
async function load() {
  const r = await fetch('/api/admin/events', { headers: headers() });
  if (r.status === 403) { sessionStorage.removeItem('admPwd'); PWD=''; document.getElementById('loginCard').style.display='block'; document.getElementById('app').style.display='none'; return; }
  document.getElementById('app').style.display='block';
  // Tarifs (pour les libellés de plan + l'éditeur)
  try { PRICING = (await (await fetch('/api/admin/pricing', { headers: headers() })).json()).pricing; renderPricing(); } catch(_){}
  const { events } = await r.json();
  const rows = document.getElementById('rows');
  if (!events.length) { rows.innerHTML = '<tr><td class="muted">Aucun événement pour l\'instant.</td></tr>'; return; }
  rows.innerHTML = events.map(e => {
    const pay = e.paymentStatus==='paid' ? '<span class="tag" style="background:#e8f7ee;color:#1f9d57">payé</span>'
      : e.paymentStatus==='pending' ? '<span class="tag" style="background:#fdeecf;color:#a06a00">à payer</span>' : '';
    const payBtn = e.paymentStatus==='pending'
      ? `<button class="btn secondary" style="width:auto" onclick="markPaid('${e.id}')">Marquer payé</button>` : '';
    return `
    <tr>
      <td><strong>${esc(e.name)}</strong><br>
        <span class="tag">${themeLabel[e.theme]||e.theme}</span>
        <span class="tag">${esc(planLabel(e.plan))}</span> ${pay}
        <span class="muted">/e/${e.id}</span></td>
      <td class="inline" style="justify-content:flex-end">
        ${payBtn}
        <a class="btn" style="width:auto" href="/e/${e.id}/borne" target="_blank">Borne</a>
        <a class="btn secondary" style="width:auto" href="/e/${e.id}/admin" target="_blank">Console</a>
        <button class="btn danger" style="width:auto" onclick="del('${e.id}','${esc(e.name)}')">✕</button>
      </td>
    </tr>`; }).join('');
}
function planLabel(k){ return (PRICING && PRICING.plans[k] && PRICING.plans[k].label) || k || 'free'; }
async function markPaid(id){
  await fetch('/api/admin/events/'+id+'/payment', { method:'POST', headers: headers(), body: JSON.stringify({ status:'paid' }) });
  await load();
}
async function createParty() {
  const errEl = document.getElementById('createErr');
  const name = document.getElementById('nName').value.trim();
  if (!name) { errEl.textContent = 'Donne un nom à l\'événement.'; return; }
  const body = {
    name,
    theme: document.getElementById('nTheme').value,
    seed: document.getElementById('nSeed').value,
    plan: document.getElementById('nPlan').value,
    adminPassword: document.getElementById('nPwd').value,
    publicUrl: document.getElementById('nUrl').value,
  };
  errEl.textContent = '';
  let d;
  try {
    const r = await fetch('/api/admin/events', { method:'POST', headers: headers(), body: JSON.stringify(body) });
    d = await r.json();
    if (!r.ok) { errEl.textContent = d.error || ('Erreur '+r.status); return; }
  } catch (e) { errEl.textContent = 'Erreur réseau : ' + e.message; return; }
  document.getElementById('nName').value=''; document.getElementById('nPwd').value=''; document.getElementById('nUrl').value='';
  await load();
  // Pas de window.open (bloqué comme pop-up après un await) : on affiche des liens cliquables.
  errEl.style.color = 'var(--a-ok)';
  errEl.innerHTML = '✓ « '+esc(d.event.name)+' » créé — '
    + '<a href="/e/'+d.event.id+'/admin" target="_blank">ouvrir la console</a> · '
    + '<a href="/e/'+d.event.id+'/borne" target="_blank">ouvrir la borne</a>';
}
async function del(id, name) {
  if (!confirm('Supprimer définitivement « '+name+' » et toutes ses données ?')) return;
  await fetch('/api/admin/events/'+id, { method:'DELETE', headers: headers() });
  await load();
}
// ---- Éditeur de tarifs ----
function renderPricing(){
  if (!PRICING) return;
  document.getElementById('pCurrency').value = PRICING.currency || 'EUR';
  const ed = document.getElementById('pricingEditor');
  ed.innerHTML = PLAN_ORDER.filter(k=>PRICING.plans[k]).map(k=>{
    const p = PRICING.plans[k], lim = p.limits||{};
    const themesArr = (lim.themes==='all' || !Array.isArray(lim.themes)) ? ALL_THEMES : lim.themes;
    const themeChecks = ALL_THEMES.map(t=>`<label class="inline" style="width:auto"><input type="checkbox" class="pp_theme" data-plan="${k}" value="${t}" ${themesArr.includes(t)?'checked':''} style="width:auto"> ${themeLabel[t]}</label>`).join(' ');
    return `<div class="card" style="background:#fafbfc">
      <div class="row">
        <div class="field"><label>Formule (${k})</label><input type="text" class="pp_label" data-plan="${k}" value="${esc(p.label||'')}"></div>
        <div class="field"><label>Prix</label><input type="number" step="0.01" min="0" class="pp_price" data-plan="${k}" value="${p.price||0}"></div>
        <div class="field"><label>Type</label>
          <select class="pp_kind" data-plan="${k}">
            <option value="free" ${p.kind==='free'?'selected':''}>Gratuit</option>
            <option value="oneshot" ${p.kind==='oneshot'?'selected':''}>One-shot (par fête)</option>
            <option value="subscription" ${p.kind==='subscription'?'selected':''}>Abonnement</option>
          </select>
        </div>
      </div>
      <div class="field"><label>Accroche</label><input type="text" class="pp_tag" data-plan="${k}" value="${esc(p.tagline||'')}"></div>
      <div class="field"><label>Lien de paiement (SumUp / autre — laisser vide si gratuit)</label><input type="text" class="pp_link" data-plan="${k}" value="${esc(p.payLink||'')}" placeholder="https://pay.sumup.com/b2c/..."></div>
      <div class="row">
        <div class="field"><label>Joueurs max (0 = illimité)</label><input type="number" min="0" class="pp_maxp" data-plan="${k}" value="${lim.maxPlayers||0}"></div>
        <div class="field"><label>Activités max (0 = illimité)</label><input type="number" min="0" class="pp_maxa" data-plan="${k}" value="${lim.maxActivities||0}"></div>
      </div>
      <div class="field"><label>Thèmes autorisés</label><div class="inline" style="flex-wrap:wrap">${themeChecks}</div></div>
      <div class="inline">
        <label class="inline" style="width:auto"><input type="checkbox" class="pp_photo" data-plan="${k}" ${lim.photo!==false?'checked':''} style="width:auto"> Défi photo &amp; galerie</label>
        <label class="inline" style="width:auto"><input type="checkbox" class="pp_premium" data-plan="${k}" ${p.premium?'checked':''} style="width:auto"> Premium</label>
      </div>
    </div>`;
  }).join('');
}
async function savePricing(){
  const pricing = { currency: document.getElementById('pCurrency').value.trim() || 'EUR', plans: {} };
  const v = (sel,k)=>document.querySelector(`.${sel}[data-plan="${k}"]`);
  PLAN_ORDER.filter(k=>PRICING.plans[k]).forEach(k=>{
    const themes = [...document.querySelectorAll(`.pp_theme[data-plan="${k}"]:checked`)].map(c=>c.value);
    pricing.plans[k] = {
      label: v('pp_label',k).value, price: parseFloat(v('pp_price',k).value)||0,
      kind: v('pp_kind',k).value, premium: v('pp_premium',k).checked, tagline: v('pp_tag',k).value,
      payLink: v('pp_link',k).value.trim(),
      limits: {
        maxPlayers: parseInt(v('pp_maxp',k).value,10)||0,
        maxActivities: parseInt(v('pp_maxa',k).value,10)||0,
        themes: themes.length===ALL_THEMES.length ? 'all' : themes,
        photo: v('pp_photo',k).checked,
      },
    };
  });
  await fetch('/api/admin/pricing', { method:'POST', headers: headers(), body: JSON.stringify({ pricing }) });
  PRICING = pricing;
  const s = document.getElementById('pSaved'); s.textContent=' ✓ enregistré'; setTimeout(()=>s.textContent='',1500);
}
function esc(s){ return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
boot();
</script>
</body>
</html>
